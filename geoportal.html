<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>GeoPortal 국토부 지도</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- OpenLayers CSS & JS -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ol@7.5.2/ol.css">
  <script src="https://cdn.jsdelivr.net/npm/ol@7.5.2/dist/ol.js"></script>

  <style>
    /* ---------------------- 페이지 기본 ---------------------- */
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
    }

    /* ---------------------- 페이지 헤더 ---------------------- */
    .page-header {
      width:100%; height:60px;
      background:#1976d2; color:#fff;
      display:flex; align-items:center; justify-content:center;
      font-size:20px; font-weight:bold; margin:0;
    }

    /* ---------------------- 지도 영역 ---------------------- */
    #map {
      width:100%;
      height:calc(100vh - 60px); /* 헤더 높이를 제외한 전체 화면 */
      position: relative;
      z-index: 1; /* 다른 요소보다 위로 */
    }

    /* ---------------------- 레이어 선택 UI ---------------------- */
    .layer-switcher {
      position:absolute; top:70px; left:10px;
      background:#fff; padding:8px; border:1px solid #ccc;
      font-size:14px; z-index:1000;
    }

    /* ---------------------- 팝업 영역 ---------------------- */
    #infoPopup {
      display:none; position:absolute; top:80px; right:20px;
      background:#fff; border:2px solid #1976d2; padding:10px; z-index:1000;
      width:320px; max-width:90%; font-size:14px;
    }
    #infoPopup h3 { margin:0 0 6px 0; font-size:16px; color:#1976d2; }
    #infoPopup button { margin-top:8px; }
  </style>
</head>
<body>
  <!-- ✅ 상단 헤더 -->
  <header class="page-header">GeoPortal 국토부 지도</header>

  <!-- ✅ 지도 영역 -->
  <div id="map"></div>

  <!-- ✅ 레이어 선택 UI -->
  <div class="layer-switcher">
    <label><input type="checkbox" id="baseLayer" checked> 기본지도</label><br>
    <label><input type="checkbox" id="satLayer"> 항공사진</label><br>
    <label><input type="checkbox" id="cadLayer"> 지적도</label><br>
    <label><input type="checkbox" id="grayLayer"> Gray</label><br>
    <label><input type="checkbox" id="midnightLayer"> Midnight</label><br>
    <label><input type="checkbox" id="hybridLayer"> Hybrid</label><br>
    <label><input type="checkbox" id="terrainLayer"> Terrain</label>
  </div>

  <!-- ✅ 팝업 영역 -->
  <div id="infoPopup">
    <h3>조회 결과</h3>
    <div id="landBuildingInfo"></div>
    <div id="landUseInfo"></div>
    <div id="realEstateInfo"></div>
    <button onclick="closeInfoPopup()">닫기</button>
  </div>

  <!-- ✅ API Key 설정 -->
  <script src="config.js"></script>
  
  <script>
    // ✅ WMTS 공통 설정
    const projection = ol.proj.get('EPSG:3857');
    const projectionExtent = projection.getExtent();
    const size = ol.extent.getWidth(projectionExtent) / 256;
    const resolutions = new Array(19);
    const matrixIds = new Array(19);
    for (let z = 0; z < 19; ++z) {
      resolutions[z] = size / Math.pow(2, z);
      matrixIds[z] = z;
    }

    // ✅ 레이어 생성 함수
    function createLayer(layerName, format='image/png') {
      return new ol.layer.Tile({
        source: new ol.source.WMTS({
          url: `https://api.vworld.kr/req/wmts/1.0.0/${CONFIG.API_KEY}/${layerName}/{TileMatrix}/{TileRow}/{TileCol}.${format.split('/')[1]}`,
          layer: layerName,
          matrixSet: 'EPSG:3857',
          format: format,
          projection: projection,
          tileGrid: new ol.tilegrid.WMTS({
            origin: ol.extent.getTopLeft(projectionExtent),
            resolutions: resolutions,
            matrixIds: matrixIds
          }),
          style: 'default'
          requestEncoding: 'REST'   // ✅ 이 부분 추가
        }),
        visible: false
      });
    }

    // ✅ 주요 레이어들 정의
    const baseLayer = createLayer('Base'); baseLayer.setVisible(true);
    const satLayer = createLayer('Satellite','image/jpeg');
    const cadLayer = createLayer('Cadastral');
    const grayLayer = createLayer('Gray');
    const midnightLayer = createLayer('Midnight');
    const hybridLayer = createLayer('Hybrid');
    const terrainLayer = createLayer('Terrain');

    // ✅ 지도 초기화
    const map = new ol.Map({
      target: 'map',
      layers: [baseLayer, satLayer, cadLayer, grayLayer, midnightLayer, hybridLayer, terrainLayer],
      view: new ol.View({
        center: ol.proj.fromLonLat([127.0, 37.5]),
        zoom: 7
      })
    });

    // ✅ 체크박스 이벤트 → 레이어 on/off
    document.getElementById('baseLayer').addEventListener('change', e => baseLayer.setVisible(e.target.checked));
    document.getElementById('satLayer').addEventListener('change', e => satLayer.setVisible(e.target.checked));
    document.getElementById('cadLayer').addEventListener('change', e => cadLayer.setVisible(e.target.checked));
    document.getElementById('grayLayer').addEventListener('change', e => grayLayer.setVisible(e.target.checked));
    document.getElementById('midnightLayer').addEventListener('change', e => midnightLayer.setVisible(e.target.checked));
    document.getElementById('hybridLayer').addEventListener('change', e => hybridLayer.setVisible(e.target.checked));
    document.getElementById('terrainLayer').addEventListener('change', e => terrainLayer.setVisible(e.target.checked));

    // ✅ 팝업 닫기 함수
    function closeInfoPopup() {
      document.getElementById("infoPopup").style.display = "none";
    }

    // ✅ JSONP 콜백 함수들
    function landBuildingCallback(data) {
      if (data.response?.result?.featureCollection?.features?.length > 0) {
        const props = data.response.result.featureCollection.features[0].properties;
        document.getElementById("landBuildingInfo").innerHTML =
          `<b>건물명:</b> ${props.BLD_NM || '정보 없음'}<br>
           <b>용도지역:</b> ${props.USE_ZONE || '정보 없음'}`;
      } else {
        document.getElementById("landBuildingInfo").innerHTML = "토지·건축물 데이터 없음";
      }
    }

    function landUseCallback(data) {
      if (data.response?.result?.featureCollection?.features?.length > 0) {
        const props = data.response.result.featureCollection.features[0].properties;
        document.getElementById("landUseInfo").innerHTML =
          `<b>용도지역:</b> ${props.USE_ZONE || '정보 없음'}<br>
           <b>세부지역:</b> ${props.DETAIL_ZONE || '정보 없음'}`;
      } else {
        document.getElementById("landUseInfo").innerHTML = "토지이용계획 데이터 없음";
      }
    }

    function realEstateCallback(data) {
      if (data.response?.result?.featureCollection?.features?.length > 0) {
        const props = data.response.result.featureCollection.features[0].properties;
        document.getElementById("realEstateInfo").innerHTML =
          `<b>거래금액:</b> ${props.DEAL_AMOUNT || '정보 없음'}<br>
           <b>거래일자:</b> ${props.DEAL_YMD || '정보 없음'}<br>
           <b>건물명:</b> ${props.BLD_NM || '정보 없음'}`;
      } else {
        document.getElementById("realEstateInfo").innerHTML = "실거래가 데이터 없음";
      }
    }

    // ✅ JSONP 호출 함수들
    function loadLandBuilding(lon, lat) {
      const script = document.createElement("script");
      script.src = `https://api.vworld.kr/req/data?service=data&request=GetFeature&key=${CONFIG.API_KEY}&geometry=POINT(${lon} ${lat})&size=10&data=LT_P_BULD&output=jsonp&callback=landBuildingCallback`;
      document.body.appendChild(script);
    }

    function loadLandUse(lon, lat) {
      const script = document.createElement("script");
      script.src = `https://api.vworld.kr/req/data?service=data&request=GetFeature&key=${CONFIG.API_KEY}&geometry=POINT(${lon} ${lat})&size=10&data=LT_L_USEZONE&output=jsonp&callback=landUseCallback`;
      document.body.appendChild(script);
    }

    function loadRealEstate(lon, lat) {
      const script = document.createElement("script");
      script.src = `https://api.vworld.kr/req/data?service=data&request=GetFeature&key=${CONFIG.API_KEY}&geometry=POINT(${lon} ${lat})&size=10&data=RTMS_OBJS&output=jsonp&callback=realEstateCallback`;
      document.body.appendChild(script);
    }

    // ✅ 지도 클릭 이벤트 → JSONP 호출
    map.on('click', function(evt) {
      const coord = ol.proj.toLonLat(evt.coordinate);
      const lon = coord[0];
      const lat = coord[1];

      // ✅ JSONP 방식으로 각 조회 실행
      loadLandBuilding(lon, lat);   // 토지·건축물 조회
      loadLandUse(lon, lat);        // 토지이용계획 조회
      loadRealEstate(lon, lat);     // 실거래가 조회

      // ✅ 팝업 열기
      document.getElementById("infoPopup").style.display = "block";
    });
  </script>
</body>
</html>
