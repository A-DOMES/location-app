<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>GeoPortal 국토부 지도</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- ✅ OpenLayers CSS & JS -->
  <link rel="stylesheet" href="https://jsdelivr.net">
  <script src="https://jsdelivr.net"></script>

  <style>
    /* ✅ 페이지 기본 레이아웃 및 여백 제거 */
    html, body { margin:0; padding:0; width:100%; height:100%; overflow: hidden; font-family: sans-serif; }

    /* ✅ 상단 헤더 및 통합 주소 검색창 구성 */
    .page-header {
      position:fixed;   
      top:0; left:0;
      width:100%; height:48px;
      background:#1976d2; color:#fff;
      display:flex; align-items:center; justify-content: space-between;
      margin:0; padding:0 10px;
      box-sizing: border-box;
      z-index:2000;     
    }
    .header-left { display:flex; align-items:center; }

    /* 💡 검색 입력창 디자인 (헤더 중앙 가로폭 반응형 최적화) */
    .header-search {
      display: flex; align-items: center;
      background: #fff; padding: 2px 8px;
      border-radius: 20px; width: 220px; max-width: 55%;
    }
    #searchKeyword {
      border: none; outline: none; width: 100%;
      font-size: 13px; padding: 4px; border-radius: 20px; color: #333;
    }
    #searchBtn {
      background: none; border: none; cursor: pointer; font-size: 14px; padding: 0 2px;
    }

    /* ✅ 지도보기 항목 토글 버튼 */
    #mapToggleBtn {
      display:flex; align-items:center; gap:6px;
      background:#1976d2; color:#fff;
      border:none; padding:6px 12px;
      border-radius:12px; font-size:14px;
      cursor:pointer; opacity:0;
      transition:opacity 0.4s ease;
    }
    #mapToggleBtn.show { opacity:1; }

    /* ✅ 지도 영역 */
    #map {
      width:100%;
      height:calc(100vh - 48px); 
      margin-top:48px;           
      position:relative;
      z-index:1;
    }

    /* ✅ GPS 내 위치 버튼 (지도 내 고정 레이어) */
    #gpsBtn {
      position: absolute;
      bottom: 24px; right: 24px;
      width: 46px; height: 46px;
      background: #fff; border: 1px solid #ccc;
      border-radius: 50%; font-size: 22px;
      box-shadow: 0 3px 10px rgba(0,0,0,0.3);
      cursor: pointer; z-index: 999;
      display: flex; align-items: center; justify-content: center;
    }
    #gpsBtn:active { background: #f0f0f0; }

    /* ✅ 레이어 선택 모달창 */
    .layer-switcher {
      position:absolute;
      top:60px; left: 15px;
      background:rgba(255,255,255,0.9); 
      padding:12px;
      border:1px solid #ccc; border-radius:8px;
      font-size:14px; z-index:1000; width:120px;                   
    }    
    .layer-header { position:relative; margin-bottom:8px; } 
    .layer-title { text-align:center; font-weight:bold; color:#1976d2; display: block; }
    .close-btn {
      position:absolute; top:0; right:0; width:20px; height:20px;
      border-radius:50%; background:rgba(25,118,210,0.2);
      border:none; color:#1976d2; font-size:12px; font-weight:bold; cursor:pointer;
      display:flex; align-items:center; justify-content:center;
    }
    .layer-items label { display:flex; align-items:center; margin:5px 0; cursor: pointer; }
    .layer-items input[type="checkbox"] { transform:scale(1.1); margin-right:6px; }

    /* ✅ 조회결과 모달창 */
    #infoPopup {
      position: absolute; top: 60px; left: 50%; width: 320px;
      background: rgba(255, 255, 255, 0.95); border: 1px solid #ccc; border-radius: 8px;
      padding: 14px; box-shadow: 0 4px 15px rgba(0,0,0,0.25); z-index: 2000; box-sizing: border-box;
    }
    #infoPopup h3 { margin: 0 0 10px 0; font-size: 15px; color: #1976d2; border-bottom: 2px solid #1976d2; padding-bottom: 4px; }
    #infoPopup div { padding: 6px 0; font-size: 13px; border-bottom: 1px solid #eee; line-height: 1.45; color: #333; }
    #infoPopup div:last-child { border-bottom: none; }
    #addressInfo { background: #f5f5f5; padding: 6px !important; border-radius: 4px; margin-bottom: 6px; font-weight: bold; }
    #infoPopup .close-btn {
      position: absolute; top: 10px; right: 10px; width: 24px; height: 24px;
      border-radius: 50%; background: #f44336; color: #fff; border: none; font-weight: bold;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
    }
  </style>
</head>
<body>

  <!-- ✅ 상단 헤더 (주소 및 아파트명 검색창 레이아웃 포함) -->
  <header class="page-header">
    <div class="header-left">
      <button id="mapToggleBtn">
        <svg xmlns="http://w3.org" width="16" height="16" fill="#fff" viewBox="0 0 24 24">
          <path d="M9 3l-7 2v16l7-2 6 2 7-2V3l-7 2-6-2zm0 2.18l4 1.33v12.31l-4-1.33V5.18zm-2 .66v12.31l-3 1V6.84l3-1zm10 0v12.31l-3 1V6.84l3-1z"/>
        </svg>
        <span>지도보기</span>
      </button>
    </div>
    
    <!-- 💡 [해결포인트] 자바스크립트가 정상 구동하기 위해 필요한 실제 HTML 엘리먼트 정의 -->
    <div class="header-search">
      <input type="text" id="searchKeyword" placeholder="주소, 아파트명 입력">
      <button id="searchBtn">🔍</button>
    </div>
  </header>

  <!-- ✅ 지도 영역 -->
  <div id="map"></div>

  <!-- ✅ GPS 내 위치 찾기 버튼 추가 -->
  <button id="gpsBtn" title="내 위치 찾기">🎯</button>

  <!-- ✅ 항목선택 모달창 -->
  <div class="layer-switcher">
    <div class="layer-header">
      <span class="layer-title">항목선택</span>
      <button id="closeLayerBtn" class="close-btn">✕</button>
    </div>
    <div class="layer-items">
      <label><input type="checkbox" id="baseLayer" checked> 기본지도</label>
      <label><input type="checkbox" id="satLayer"> 항공사진</label>
      <label><input type="checkbox" id="cadLayer"> 지적도</label>
      <label><input type="checkbox" id="grayLayer"> Gray</label>
      <label><input type="checkbox" id="midnightLayer"> Midnight</label>
      <label><input type="checkbox" id="hybridLayer"> Hybrid</label>
      <label><input type="checkbox" id="terrainLayer"> Terrain</label>
    </div>
  </div>

  <!-- ✅ 조회결과 팝업 영역 -->
  <div id="infoPopup" style="display:none;">
    <button class="close-btn" onclick="closeInfoPopup()">×</button>
    <h3>📋 부동산 현황 조회 결과</h3>
    <div id="addressInfo"></div>
    <div id="landBuildingInfo"></div>
    <div id="landUseInfo"></div>
    <div id="realEstateInfo"></div>
  </div>

  <!-- ✅ API Key 인증 관리 파일 링크 -->
  <script src="config.js"></script>

<!-- ✅ 안전지대 맵 초기화 및 데이터 연동 통합 스크립트 -->
<script>
  document.addEventListener("DOMContentLoaded", () => {
    // ✅ 1. WMTS 그리드 공통 인프라 구축
    const projection = ol.proj.get('EPSG:3857');
    const projectionExtent = projection.getExtent();
    const size = ol.extent.getWidth(projectionExtent) / 256;
    const resolutions = new Array(19);
    const matrixIds = new Array(19);
    for (let z = 0; z < 19; ++z) {
      resolutions[z] = size / Math.pow(2, z);
      matrixIds[z] = "EPSG:3857:" + z;   // ◀ 브이월드 WMTS는 반드시 좌표계명 포함
    }

    // ✅ 2. WMTS 타일 레이어 생성 함수
    function createLayer(layerName, format='image/png') {
      return new ol.layer.Tile({
        source: new ol.source.WMTS({
          url: `https://api.vworld.kr/req/wmts/1.0.0/${CONFIG.API_KEY}/${layerName}/{TileMatrix}/{TileRow}/{TileCol}.${format.split('/')[1]}`,
          layer: layerName,
          matrixSet: 'EPSG:3857',
          format: format,
          projection: projection,
          tileGrid: new ol.tilegrid.WMTS({
            origin: ol.extent.getTopLeft(projectionExtent),
            resolutions: resolutions,
            matrixIds: matrixIds
          }),
          style: 'default',
          requestEncoding: 'REST'
        }),
        visible: false
      });
    }

    // ✅ 3. 주요 레이어 모듈 선언
    const baseLayer = createLayer('Base', 'image/png'); baseLayer.setVisible(true);
    const satLayer = createLayer('Satellite', 'image/jpg'); // 항공사진은 반드시 .jpg
    const grayLayer = createLayer('Gray', 'image/png');
    const midnightLayer = createLayer('Midnight', 'image/png');
    const hybridLayer = createLayer('Hybrid', 'image/png');
    const terrainLayer = createLayer('Terrain', 'image/png');

    const cadLayer = new ol.layer.Image({
      source: new ol.source.ImageWMS({
        url: 'https://api.vworld.kr/req/wms',
        params: {
          'LAYERS': 'LT_C_ADASRATODO',
          'STYLES': 'LT_C_ADASRATODO',
          'KEY': CONFIG.API_KEY,
          'FORMAT': 'image/png',
          'TRANSPARENT': 'TRUE'
        },
        serverType: 'geoserver',
        projection: projection
      }),
      visible: false
    });

    // ✅ 4. 지도 초기화
    const map = new ol.Map({
      target: 'map',
      layers: [baseLayer, satLayer, cadLayer, grayLayer, midnightLayer, hybridLayer, terrainLayer],
      view: new ol.View({
        center: ol.proj.fromLonLat([126.9780, 37.5665]),
        zoom: 7
      })
    });

    // ✅ 5. 검색 엔진 (도로명/지번/아파트명)
    function searchAddress() {
      const keywordEl = document.getElementById('searchKeyword');
      if (!keywordEl) return; // ◀ 존재하지 않는 DOM 참조 방지
      const keyword = keywordEl.value.trim();
      if (!keyword) { alert("검색어를 입력해 주세요."); return; }

      // 1차: 도로명 검색
      fetch(`https://api.vworld.kr/req/search?service=search&version=2.0&request=search&key=${CONFIG.API_KEY}&query=${encodeURIComponent(keyword)}&type=address&category=road&format=json`)
        .then(res => res.json())
        .then(data => {
          if (data.response?.status === "OK" && data.response.result?.items?.length > 0) {
            const item = data.response.result.items[0];
            map.getView().animate({
              center: ol.proj.fromLonLat([parseFloat(item.point.x), parseFloat(item.point.y)]),
              zoom: 17,
              duration: 700
            });
          } else {
            // 2차: 지번 검색
            return fetch(`https://api.vworld.kr/req/search?service=search&version=2.0&request=search&key=${CONFIG.API_KEY}&query=${encodeURIComponent(keyword)}&type=address&category=parcel&format=json`);
          }
        })
        .then(res => res ? res.json() : null)
        .then(data => {
          if (!data) return;
          if (data.response?.status === "OK" && data.response.result?.items?.length > 0) {
            const item = data.response.result.items[0];
            map.getView().animate({
              center: ol.proj.fromLonLat([parseFloat(item.point.x), parseFloat(item.point.y)]),
              zoom: 17,
              duration: 700
            });
          } else {
            alert("검색 결과가 없습니다. 도로명, 아파트명 혹은 지번을 정확히 적어주세요.");
          }
        })
        .catch(err => alert("검색 연동 실패: " + err.message));
    }

    // ✅ 6. 검색 버튼/엔터키 이벤트 연결
    const searchBtn = document.getElementById('searchBtn');
    const searchKeyword = document.getElementById('searchKeyword');
    if (searchBtn) searchBtn.addEventListener('click', searchAddress);
    if (searchKeyword) searchKeyword.addEventListener('keypress', (e) => { if (e.key === 'Enter') searchAddress(); });

    // ✅ 7. GPS 버튼 이벤트
    const gpsBtn = document.getElementById('gpsBtn');
    if (gpsBtn) {
      gpsBtn.addEventListener('click', () => {
        if (!navigator.geolocation) { alert("GPS 미지원 브라우저입니다."); return; }
        navigator.geolocation.getCurrentPosition((pos) => {
          map.getView().animate({
            center: ol.proj.fromLonLat([pos.coords.longitude, pos.coords.latitude]),
            zoom: 17,
            duration: 800
          });
        }, (err) => alert("위치 접근 실패: " + err.message), { enableHighAccuracy: true, timeout: 5000 });
      });
    }

    // ✅ 8. 사이드 패널 토글
    const closeLayerBtn = document.getElementById('closeLayerBtn');
    const mapToggleBtn = document.getElementById('mapToggleBtn');
    const layerSwitcher = document.querySelector('.layer-switcher');
    if (closeLayerBtn && mapToggleBtn && layerSwitcher) {
      closeLayerBtn.addEventListener('click', () => { layerSwitcher.style.display = 'none'; mapToggleBtn.classList.add('show'); });
      mapToggleBtn.addEventListener('click', () => { layerSwitcher.style.display = 'block'; mapToggleBtn.classList.remove('show'); });
    }

    // ✅ 9. 결과 팝업 드래그 제어
    const infoPopup = document.getElementById("infoPopup");
    if (infoPopup) {
      let isDraggingPopup = false, offsetXPopup, offsetYPopup;
      function startDrag(clientX, clientY) {
        isDraggingPopup = true;
        const rect = infoPopup.getBoundingClientRect();
        offsetXPopup = clientX - rect.left;
        offsetYPopup = clientY - rect.top;
      }
      function moveDrag(clientX, clientY) {
        if (!isDraggingPopup) return;
        infoPopup.style.left = (clientX - offsetXPopup) + 'px';
        infoPopup.style.top = (clientY - offsetYPopup) + 'px';
      }
      infoPopup.addEventListener('mousedown', (e) => { if(!e.target.classList.contains('close-btn')) startDrag(e.clientX, e.clientY); });
      document.addEventListener('mousemove', (e) => moveDrag(e.clientX, e.clientY));
      document.addEventListener('mouseup', () => isDraggingPopup = false);
      infoPopup.addEventListener('touchstart', (e) => { if(!e.target.classList.contains('close-btn')) startDrag(e.touches[0].clientX, e.touches[0].clientY); });
      document.addEventListener('touchmove', (e) => {
        if (isDraggingPopup) {
          if (e.cancelable) e.preventDefault();
          moveDrag(e.touches[0].clientX, e.touches[0].clientY);
        }
      }, { passive: false });
      document.addEventListener('touchend', () => isDraggingPopup = false);
    }
  });

    // ✅ 글로벌 팝업 닫기 핸들러
    function closeInfoPopup() { 
      const infoPopup = document.getElementById("infoPopup");
      if (infoPopup) {
        infoPopup.style.display = "none";
      }
    }
  </script>
</body>
</html>
