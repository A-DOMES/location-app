<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>GeoPortal 국토부 지도</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- ✅ OpenLayers CSS & JS -->
  <link rel="stylesheet" href="https://jsdelivr.net">
  <script src="https://jsdelivr.net"></script>

  <style>
    /* ✅ 페이지 기본 레이아웃 */
    html, body { margin:0; padding:0; width:100%; height:100%; overflow: hidden; }

    /* ✅ 상단 헤더 */
    .page-header {
      position:fixed;   /* 화면 최상단에 고정 */
      top:0; left:0;
      width:100%; height:48px;
      background:#1976d2; color:#fff;
      display:flex; align-items:center; justify-content: space-between;
      margin:0; padding:0 10px;
      box-sizing: border-box;
      z-index:2000;     /* 모달창보다 위에 표시 */
    }
    .header-left { display:flex; align-items:center; }

    /* ✅ 헤더 내 통합 주소 검색창 스타일 */
    .header-search {
      display: flex; align-items: center;
      background: #fff; padding: 2px 8px;
      border-radius: 20px; width: 200px; max-width: 50%;
    }
    #searchKeyword {
      border: none; outline: none; width: 100%;
      font-size: 13px; padding: 4px; border-radius: 20px;
    }
    #searchBtn {
      background: none; border: none; cursor: pointer; font-size: 14px; padding: 0;
    }

    /* ✅ 지도보기 버튼 */
    #mapToggleBtn {
      display:flex; align-items:center; gap:6px;
      background:#1976d2; color:#fff;
      border:none; padding:6px 12px;
      border-radius:12px; font-size:14px;
      cursor:pointer; opacity:0;
      transition:opacity 0.4s ease;
    }
    #mapToggleBtn.show { opacity:1; }
    #mapToggleBtn svg { flex-shrink:0; }

    /* ✅ 지도 영역 */
    #map {
      width:100%;
      height:calc(100vh - 48px); /* 헤더 높이만큼 빼줌 */
      margin-top:48px;           /* 헤더 밑에서 시작 */
      position:relative;
      z-index:1;
    }

    /* ✅ GPS 버튼 스타일 (지도 내 우측 하단 고정) */
    #gpsBtn {
      position: absolute;
      bottom: 20px; right: 20px;
      width: 46px; height: 46px;
      background: #fff; border: 1px solid #ccc;
      border-radius: 50%; font-size: 22px;
      box-shadow: 0 3px 10px rgba(0,0,0,0.3);
      cursor: pointer; z-index: 999;
      display: flex; align-items: center; justify-content: center;
    }
    #gpsBtn:active { background: #f0f0f0; }

    /* ✅ 레이어 선택 모달창 */
    .layer-switcher {
      position:absolute;
      top:60px;
      left: 75px;
      background:rgba(255,255,255,0.85); /* 반투명 */
      padding:12px;
      border:1px solid #ccc;
      border-radius:8px;
      font-size:15px;
      z-index:1000;
      width:130px;                   
    }    
    .layer-header { 
      position:relative; 
      margin-bottom:8px; 
    } 
    .layer-title {
      text-align:center;      
      font-weight:bold;
      font-size:16px;
      color:#1976d2;
      display: block;
    }

    .close-btn {
      position:absolute;
      top:0; right:0;   
      width:22px; height:22px;
      border-radius:50%;
      background:rgba(25,118,210,0.2);
      border:none; color:#1976d2;
      font-size:14px; font-weight:bold;
      cursor:pointer;
      display:flex; align-items:center; justify-content:center;
    }
    
    .layer-items label {
      display:flex; align-items:center;
      margin:4px 0;
      cursor: pointer;
    }
    
    .layer-items input[type="checkbox"] {
      transform:scale(1.2);
      margin-right:6px;
    }

    /* ✅ 조회결과 모달창 */
    #infoPopup {
      position: absolute;
      top: 60px;          
      left: 50%;
      width: 320px;
      background: rgba(255, 255, 255, 0.95); 
      border: 1px solid #ccc;
      border-radius: 8px;
      padding: 14px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.25);
      z-index: 2000;
      box-sizing: border-box;
    }

    #infoPopup h3 { margin: 0 0 10px 0; font-size: 16px; color: #333; }

    /* 팝업 내 정보 항목 공통 디자인 */
    #infoPopup div {
      padding: 6px 0;
      font-size: 13.5px;
      border-bottom: 1px solid #eee;
      line-height: 1.4;
    }
    #infoPopup div:last-child { border-bottom: none; }

    /* 주소 표시 영역 전용 스타일 강조 */
    #addressInfo { background: #f5f5f5; padding: 6px !important; border-radius: 4px; margin-bottom: 4px; }

    /* 조회결과 팝업용 닫기 버튼 */
    #infoPopup .close-btn {
      position: absolute;
      top: 8px; right: 8px;
      width: 26px; height: 26px;
      border-radius: 50%;          
      background: #f44336;         
      color: #fff;                 
      font-weight: bold; font-size: 14px;
      border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
    }
    #infoPopup .close-btn:hover { background: #d32f2f; }
  </style>
</head>
<body>

  <!-- ✅ 상단 헤더 (검색창 내장형) -->
  <header class="page-header">
    <div class="header-left">
      <button id="mapToggleBtn">
        <svg xmlns="http://w3.org" width="18" height="18" fill="#fff" viewBox="0 0 24 24">
          <path d="M9 3l-7 2v16l7-2 6 2 7-2V3l-7 2-6-2zm0 2.18l4 1.33v12.31l-4-1.33V5.18zm-2 .66v12.31l-3 1V6.84l3-1zm10 0v12.31l-3 1V6.84l3-1z"/>
        </svg>
        <span>지도보기</span>
      </button>
    </div>
    
    <!-- 💡 검색창 기능 추가 -->
    <div class="header-search">
      <input type="text" id="searchKeyword" placeholder="주소, 아파트명 검색">
      <button id="searchBtn">🔍</button>
    </div>
  </header>

  <!-- ✅ 지도 영역 -->
  <div id="map"></div>

  <!-- ✅ GPS 내 위치 찾기 버튼 -->
  <button id="gpsBtn" title="내 위치 찾기">🎯</button>

  <!-- ✅ 항목선택 모달창 -->
  <div class="layer-switcher">
    <div class="layer-header">
      <span class="layer-title">항목선택</span>
      <button id="closeLayerBtn" class="close-btn">✕</button>
    </div>
    <div class="layer-items">
      <label><input type="checkbox" id="baseLayer" checked> 기본지도</label>
      <label><input type="checkbox" id="satLayer"> 항공사진</label>
      <label><input type="checkbox" id="cadLayer"> 지적도</label>
      <label><input type="checkbox" id="grayLayer"> Gray</label>
      <label><input type="checkbox" id="midnightLayer"> Midnight</label>
      <label><input type="checkbox" id="hybridLayer"> Hybrid</label>
      <label><input type="checkbox" id="terrainLayer"> Terrain</label>
    </div>
  </div>

  <!-- ✅ 조회결과 팝업 영역 -->
  <div id="infoPopup" style="display:none;">
    <button class="close-btn" onclick="closeInfoPopup()">×</button>
    <h3>📋 토지/건물 조회 결과</h3>
    <div id="addressInfo"></div>
    <div id="landBuildingInfo"></div>
    <div id="landUseInfo"></div>
    <div id="realEstateInfo"></div>
  </div>

  <!-- ✅ API Key 설정 파일 호출 -->
  <script src="config.js"></script>

  <!-- ✅ 핵심 맵 엔진 스크립트 -->
  <script>
// ✅ WMTS 공통 설정 (원본 유지)
const projection = ol.proj.get('EPSG:3857');
const projectionExtent = projection.getExtent();
const size = ol.extent.getWidth(projectionExtent) / 256;
const resolutions = new Array(19);
const matrixIds = new Array(19);
for (let z = 0; z < 19; ++z) {
  resolutions[z] = size / Math.pow(2, z);
  matrixIds[z] = z;
}

// ✅ WMTS 레이어 생성 함수 (원본 유지)
function createLayer(layerName, format='image/png') {
  return new ol.layer.Tile({
    source: new ol.source.WMTS({
      url: `https://vworld.kr{CONFIG.API_KEY}/${layerName}/{TileMatrix}/{TileRow}/{TileCol}.${format.split('/')[1]}`,
      layer: layerName,
      matrixSet: 'EPSG:3857',
      format: format,
      projection: projection,
      tileGrid: new ol.tilegrid.WMTS({
        origin: ol.extent.getTopLeft(projectionExtent),
        resolutions: resolutions,
        matrixIds: matrixIds
      }),
      style: 'default',
      requestEncoding: 'REST'
    }),
    visible: false
  });
}

// ✅ 주요 레이어 정의 (원본 유지)
const baseLayer = createLayer('Base'); baseLayer.setVisible(true);
const satLayer = createLayer('Satellite', 'image/jpeg');
const cadLayer = new ol.layer.Image({
  source: new ol.source.ImageWMS({
    url: 'https://vworld.kr',
    params: {
      'LAYERS': 'LT_C_ADASRATODO',
      'STYLES': 'LT_C_ADASRATODO',
      'KEY': CONFIG.API_KEY,
      'FORMAT': 'image/png',
      'TRANSPARENT': 'TRUE'
    },
    serverType: 'geoserver',
    projection: projection
  }),
  visible: false
});
const grayLayer = createLayer('Gray');       
const midnightLayer = createLayer('Midnight'); 
const hybridLayer = createLayer('Hybrid');
const terrainLayer = createLayer('Terrain'); 

// ✅ 지도 초기화 (원본 유지)
const map = new ol.Map({
  target: 'map',
  layers: [baseLayer, satLayer, cadLayer, grayLayer, midnightLayer, hybridLayer, terrainLayer],
  view: new ol.View({
    center: ol.proj.fromLonLat([126.9780, 37.5665]), 
    zoom: 17 
  })
});

// ✅ 체크박스 이벤트 → 레이어 on/off (원본 유지)
document.getElementById('baseLayer').addEventListener('change', e => baseLayer.setVisible(e.target.checked));
document.getElementById('satLayer').addEventListener('change', e => satLayer.setVisible(e.target.checked));
document.getElementById('cadLayer').addEventListener('change', e => cadLayer.setVisible(e.target.checked));
document.getElementById('grayLayer').addEventListener('change', e => grayLayer.setVisible(e.target.checked));
document.getElementById('midnightLayer').addEventListener('change', e => midnightLayer.setVisible(e.target.checked));
document.getElementById('hybridLayer').addEventListener('change', e => hybridLayer.setVisible(e.target.checked));
document.getElementById('terrainLayer').addEventListener('change', e => terrainLayer.setVisible(e.target.checked));

// ✅ 팝업 닫기 함수 (원본 유지)
function closeInfoPopup() {
  document.getElementById("infoPopup").style.display = "none";
}

// ✅ 지도 클릭 이벤트 → 팝업 표시 및 데이터 요청 (한글 주소 호출 기능 추가)
map.on('click', function(evt) {
  const coord = ol.proj.toLonLat(evt.coordinate);
  const lon = coord[0];
  const lat = coord[1];

  const infoPopup = document.getElementById("infoPopup");
  infoPopup.style.display = "block";
  infoPopup.style.transform = "none";
  infoPopup.style.left = "calc(50% - 160px)"; 

  // 💡 HTML 영역에 <div id="addressInfo"></div>가 들어가 있다면 주소가 출력됩니다.
  const addrDiv = document.getElementById("addressInfo");
  if (addrDiv) addrDiv.innerHTML = "<b>📍 주소:</b> 조회 중...";
  
  document.getElementById("landBuildingInfo").innerHTML = "<b>🏢 건물 정보:</b> 조회 중...";
  document.getElementById("landUseInfo").innerHTML = "<b>📜 토지 이용:</b> 조회 중...";
  document.getElementById("realEstateInfo").innerHTML = "<b>💰 공시지가:</b> 조회 중...";

  // 💡 새롭게 추가된 한글 주소 변환 API 호출
  loadAddress(lon, lat);
  loadLandBuilding(lon, lat);
  loadLandUse(lon, lat);
  loadRealEstate(lon, lat);
});

// ✅ [신규 기능 1] 좌표를 활용한 실시간 한글 주소 변환 (R-Geocoding)
function loadAddress(lon, lat) {
  const addrDiv = document.getElementById("addressInfo");
  if (!addrDiv) return;

  fetch(`https://vworld.kr{CONFIG.API_KEY}&point=${lon},${lat}&type=both&format=json`)
    .then(res => res.json())
    .then(data => {
      if (data.response?.status === "OK" && data.response.result?.length > 0) {
        addrDiv.innerHTML = `<b>📍 주소:</b> ${data.response.result[0].text}`;
      } else {
        addrDiv.innerHTML = "<b>📍 주소:</b> 주소를 찾을 수 없는 위치입니다.";
      }
    })
    .catch(err => addrDiv.innerHTML = "<b>📍 주소 조회 실패:</b> " + err.message);
}

// ✅ 건물 정보 조회 (보내주신 완벽한 코드 구조 유지)
function loadLandBuilding(lon, lat) {
  fetch(`https://vworld.kr{CONFIG.API_KEY}&geometry=POINT(${lon} ${lat})&data=LT_C_BLDG&format=json`)
    .then(res => res.json())
    .then(data => {
      const features = data.response?.result?.featureCollection?.features;
      if (features && features.length > 0) {
        const props = features[0].properties;
        document.getElementById("landBuildingInfo").innerHTML =
          `<b>🏢 건물 정보</b><br>건물명: ${props.bldg_nm || '이름 없음'}<br>구조: ${props.bldg_st_nm || '-'}`;
      } else {
        document.getElementById("landBuildingInfo").innerHTML = "<b>🏢 건물 정보:</b> 해당 위치에 건물 없음";
      }
    })
    .catch(err => {
      document.getElementById("landBuildingInfo").innerHTML = "<b>🏢 건물 조회 실패:</b> " + err.message;
    });
}

// ✅ 토지이용 정보 조회 (보내주신 완벽한 코드 구조 유지)
function loadLandUse(lon, lat) {
  fetch(`https://vworld.kr{CONFIG.API_KEY}&geometry=POINT(${lon} ${lat})&data=LT_C_UQ111&format=json`)
    .then(res => res.json())
    .then(data => {
      const features = data.response?.result?.featureCollection?.features;
      if (features && features.length > 0) {
        const props = features[0].properties;
        document.getElementById("landUseInfo").innerHTML =
          `<b>📜 토지 이용</b><br>용도지역: ${props.dgm_nm || '-'}`;
      } else {
        document.getElementById("landUseInfo").innerHTML = "<b>📜 토지 이용:</b> 데이터 없음";
      }
    })
    .catch(err => {
      document.getElementById("landUseInfo").innerHTML = "<b>📜 토지 조회 실패:</b> " + err.message;
    });
}

// ✅ 부동산 정보 조회 (보내주신 완벽한 코드 구조 유지)
function loadRealEstate(lon, lat) {
  fetch(`https://vworld.kr{CONFIG.API_KEY}&geometry=POINT(${lon} ${lat})&data=LT_C_PD01&format=json`)
    .then(res => res.json())
    .then(data => {
      const features = data.response?.result?.featureCollection?.features;
      if (features && features.length > 0) {
        const props = features[0].properties;
        const formattedPrice = props.pblntf_pcl ? Number(props.pblntf_pcl).toLocaleString() + " 원" : "-";
        document.getElementById("realEstateInfo").innerHTML =
          `<b>💰 공시지가</b><br>기준년도: ${props.stdr_year || '-'}년<br>공시지가(㎡): ${formattedPrice}`;
      } else {
        document.getElementById("realEstateInfo").innerHTML = "<b>💰 공시지가:</b> 데이터 없음";
      }
    })
    .catch(err => {
      document.getElementById("realEstateInfo").innerHTML = "<b>💰 가격 조회 실패:</b> " + err.message;
    });
}

// ✅ 레이어 제어 UI 토글 기능 (보내주신 코드 유지)
const closeBtn = document.getElementById('closeLayerBtn');
const mapToggleBtn = document.getElementById('mapToggleBtn');
const layerSwitcher = document.querySelector('.layer-switcher');

closeBtn.addEventListener('click', () => {
  layerSwitcher.style.display = 'none';
  mapToggleBtn.classList.add('show');
});

mapToggleBtn.addEventListener('click', () => {
  layerSwitcher.style.display = 'block';
  mapToggleBtn.classList.remove('show');
});

// ✅ [신규 기능 2] GPS 기반 현재 내 위치 찾기 (애니메이션 이동)
const gpsButton = document.getElementById('gpsBtn');
if (gpsButton) {
  gpsButton.addEventListener('click', () => {
    if (!navigator.geolocation) {
      alert("이 장치에서는 GPS 기능을 활용할 수 없습니다.");
      return;
    }
    navigator.geolocation.getCurrentPosition((pos) => {
      const center = ol.proj.fromLonLat([pos.coords.longitude, pos.coords.latitude]);
      map.getView().animate({ center: center, zoom: 17, duration: 700 });
    }, (err) => alert("위치 정보를 가져올 수 없습니다: " + err.message), { enableHighAccuracy: true, timeout: 5000 });
  });
}

// ✅ [신규 기능 3] 주소 키워드 입력 검색 엔진 (Geocoding 통합)
function searchAddress() {
  const keyword = document.getElementById('searchKeyword')?.value.trim();
  if (!keyword) { alert("검색어를 입력해 주세요."); return; }

  // 1단계: 도로명 우선 통합 검색
  fetch(`https://vworld.kr{CONFIG.API_KEY}&query=${encodeURIComponent(keyword)}&type=address&category=road&format=json`)
    .then(res => res.json())
    .then(data => {
      if (data.response?.status === "OK" && data.response.result?.items?.length > 0) {
        const pt = data.response.result.items[0].point;
        map.getView().animate({ center: ol.proj.fromLonLat([parseFloat(pt.x), parseFloat(pt.y)]), zoom: 17, duration: 600 });
      } else {
        // 2단계: 실패 시 지번(parcel) 검색으로 자동 전환 연계
        return fetch(`https://vworld.kr{CONFIG.API_KEY}&query=${encodeURIComponent(keyword)}&type=address&category=parcel&format=json`);
      }
    })
    .then(res => res ? res.json() : null)
    .then(data => {
      if (!data) return;
      if (data.response?.status === "OK" && data.response.result?.items?.length > 0) {
        const pt = data.response.result.items[0].point;
        map.getView().animate({ center: ol.proj.fromLonLat([parseFloat(pt.x), parseFloat(pt.y)]), zoom: 17, duration: 600 });
      } else {
        alert("일치하는 검색 결과가 없습니다.");
      }
    })
    .catch(err => alert("검색 시스템 오류: " + err.message));
}

// ✅ 검색 버튼 클릭 및 엔터키 이벤트 바인딩 등록
function searchAddress() {
  const keyword = document.getElementById('searchKeyword').value.trim();
  if (!keyword) { 
    alert("검색어를 입력해 주세요."); 
    return; 
  }

  // 1단계: 도로명 주소(road) 기준으로 Vworld 통합 검색 API 호출
  fetch(`https://vworld.kr{CONFIG.API_KEY}&query=${encodeURIComponent(keyword)}&type=address&category=road&format=json`)
    .then(res => res.json())
    .then(data => {
      if (data.response?.status === "OK" && data.response.result?.items?.length > 0) {
        const firstResult = data.response.result.items[0];
        const lon = parseFloat(firstResult.point.x);
        const lat = parseFloat(firstResult.point.y);
        
        // 검색된 좌표 위치로 지도 뷰 부드럽게 이동 및 확대
        map.getView().animate({
          center: ol.proj.fromLonLat([lon, lat]),
          zoom: 17,
          duration: 600
        });
      } else {
        // 2단계: 도로명 검색 결과가 없으면 지번 주소(parcel) 타입으로 2차 재검색 시도
        return fetch(`https://vworld.kr{CONFIG.API_KEY}&query=${encodeURIComponent(keyword)}&type=address&category=parcel&format=json`);
      }
    })
    .then(res => res ? res.json() : null)
    .then(data => {
      if (!data) return; // 위에서 이미 처리된 경우 안전하게 차단
      
      if (data.response?.status === "OK" && data.response.result?.items?.length > 0) {
        const firstResult = data.response.result.items[0];
        const lon = parseFloat(firstResult.point.x);
        const lat = parseFloat(firstResult.point.y);
        
        map.getView().animate({ 
          center: ol.proj.fromLonLat([lon, lat]), 
          zoom: 17, 
          duration: 600 
        });
      } else {
        alert("검색 결과가 없습니다. 도로명이나 지번을 명확히 입력해 주세요.");
      }
    })
    .catch(err => {
      alert("검색 중 오류가 발생했습니다: " + err.message);
    });
}

// 💡 HTML의 검색 버튼 및 입력 창과 검색 기능 연동
document.getElementById('searchBtn').addEventListener('click', searchAddress);
document.getElementById('searchKeyword').addEventListener('keypress', (e) => {
  if (e.key === 'Enter') searchAddress();
});

// ✅ GPS 기반 내 위치 찾기 기능 등록 (모바일 최적화 고정밀 제어)
document.getElementById('gpsBtn').addEventListener('click', () => {
  if (!navigator.geolocation) {
    alert("이 브라우저나 기기는 GPS 위치 추적 기능을 지원하지 않습니다.");
    return;
  }
  
  navigator.geolocation.getCurrentPosition((position) => {
    const lon = position.coords.longitude;
    const lat = position.coords.latitude;
    
    // 사용자의 현재 실제 위경도 좌표로 지도를 서서히 이동시킴
    map.getView().animate({
      center: ol.proj.fromLonLat([lon, lat]),
      zoom: 17,
      duration: 800
    });
  }, (err) => {
    alert("현재 위치를 가져오지 못했습니다: " + err.message);
  }, {
    enableHighAccuracy: true, // LTE/Wi-Fi 기반 삼각측량 활용 오차 최소화
    timeout: 5000
  });
});

// ✅ 모바일 드래그 시 뒷배경 화면이 통째로 꿀렁이며 스크롤되는 현상 완전 방지
document.getElementById("infoPopup").addEventListener('touchmove', (e) => {
  if (isDraggingPopup && e.cancelable) {
    e.preventDefault(); // 조회 결과 모달창 내부 드래그 시 브라우저 기본 스크롤 차단
  }
}, { passive: false });

</script>
