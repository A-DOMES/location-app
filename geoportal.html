<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>GeoPortal 국토부 지도</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- OpenLayers CSS & JS -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ol@7.5.2/ol.css">
  <script src="https://cdn.jsdelivr.net/npm/ol@7.5.2/dist/ol.js"></script>

  <style>
  /* ---------------------- 페이지 기본 ---------------------- */
  html, body { margin:0; padding:0; width:100%; height:100%; }
  
  /* ---------------------- 페이지 헤더 ---------------------- */
  .page-header {
    width:100%; height:60px;
    background:#1976d2; color:#fff;
    display:flex; align-items:center; justify-content:space-between;
    font-size:20px; font-weight:bold; margin:0;
    padding:0 12px;
  }
  .header-left { display:flex; align-items:center; }
  .header-title { flex:1; text-align:center; }
  
  /* 지도 버튼 (헤더 좌측 상단) */
  #mapToggleBtn {
    display:flex; align-items:center; gap:6px;
    background:#1976d2; color:#fff;
    border:none;
    padding:8px 14px;
    border-radius:12px; /* 둥근 사각형 */
    font-size:14px;
    cursor:pointer;
    opacity:0;
    transition:opacity 0.4s ease;
  }
  #mapToggleBtn.show { display:flex; opacity:1; }
  #mapToggleBtn svg { flex-shrink:0; }
  
  /* ---------------------- 지도 영역 ---------------------- */
  #map {
    width:100%;
    height:calc(100vh - 60px);
    position:relative;
    z-index:1;
  }
  
  /* ---------------------- 레이어 선택 UI ---------------------- */
  .layer-switcher {
    position:absolute; top:70px; left:10px;
    background:rgba(255,255,255,0.95);
    padding:12px; border:1px solid #ccc; border-radius:8px;
    font-size:15px; z-index:1000;
    max-width:220px;
    opacity:1;
    transform:translateY(0) scale(1);
    transition:opacity 0.4s ease, transform 0.4s ease;
  }
  .layer-switcher.hide {
    opacity:0;
    transform:translateY(-10px) scale(0.95);
    pointer-events:none;
  }
  
  /* 상단 타이틀 + 닫기 버튼 */
  .layer-header {
    display:flex; justify-content:space-between; align-items:center;
    margin-bottom:8px;
  }
  .layer-title {
    font-weight:bold; color:#1976d2;
  }
  .close-btn {
    width:24px; height:24px;
    border-radius:50%;
    background:rgba(25,118,210,0.2); /* 반투명 동그라미 */
    border:none;
    color:#1976d2;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
    display:flex; align-items:center; justify-content:center;
  }
  
  /* 항목 리스트 */
  .layer-items label {
    display:flex; align-items:center;
    margin:4px 0;
  }
  .layer-items input[type="checkbox"] {
    transform:scale(1.2);
    margin-right:6px;
  }
  
  /* ---------------------- 팝업 영역 ---------------------- */
  #infoPopup {
    display:none; position:absolute; top:80px; right:20px;
    background:#fff; border:2px solid #1976d2; padding:10px; z-index:1000;
    width:320px; max-width:90%; font-size:14px;
  }
  #infoPopup h3 { margin:0 0 6px 0; font-size:16px; color:#1976d2; }
  #infoPopup button { margin-top:8px; }
      
  </style>
</head>
<body>
  <!-- ✅ 상단 헤더 -->
  <header class="page-header">
    <div class="header-left">
      <button id="mapToggleBtn" style="display:none;">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="#fff" viewBox="0 0 24 24">
          <path d="M9 3l-7 2v16l7-2 6 2 7-2V3l-7 2-6-2zm0 2.18l4 1.33v12.31l-4-1.33V5.18zm-2 .66v12.31l-3 1V6.84l3-1zm10 0v12.31l-3 1V6.84l3-1z"/>
        </svg>
        <span>지도</span>
      </button>
    </div>
    <div class="header-title">국토부 지도</div>
  </header>

  <!-- ✅ 지도 영역 -->
  <div id="map"></div>

  <!-- ✅ 항목선택 모달창 -->
  <div class="layer-switcher">
    <div class="layer-header">
      <span class="layer-title">항목선택</span>
      <button id="closeLayerBtn" class="close-btn">✕</button>
    </div>
    <div class="layer-items">
      <label><input type="checkbox" id="baseLayer" checked> 기본지도</label>
      <label><input type="checkbox" id="satLayer"> 항공사진</label>
      <label><input type="checkbox" id="cadLayer"> 지적도</label>
      <label><input type="checkbox" id="grayLayer"> Gray</label>
      <label><input type="checkbox" id="midnightLayer"> Midnight</label>
      <label><input type="checkbox" id="hybridLayer"> Hybrid</label>
      <label><input type="checkbox" id="terrainLayer"> Terrain</label>
    </div>
  </div>

  <!-- ✅ 팝업 영역 -->
  <div id="infoPopup">
    <h3>조회 결과</h3>
    <div id="landBuildingInfo"></div>
    <div id="landUseInfo"></div>
    <div id="realEstateInfo"></div>
    <button onclick="closeInfoPopup()">닫기</button>
  </div>

  <!-- ✅ API Key 설정 -->
  <script src="config.js"></script>
  
<script>
    // WMTS 공통 설정
    const projection = ol.proj.get('EPSG:3857');
    const projectionExtent = projection.getExtent();
    const size = ol.extent.getWidth(projectionExtent) / 256;
    const resolutions = new Array(19);
    const matrixIds = new Array(19);
    for (let z = 0; z < 19; ++z) {
      resolutions[z] = size / Math.pow(2, z);
      matrixIds[z] = z;
    }

    // WMTS 레이어 생성 함수
    function createLayer(layerName, format='image/png') {
      return new ol.layer.Tile({
        source: new ol.source.WMTS({
          url: `https://api.vworld.kr/req/wmts/1.0.0/${CONFIG.API_KEY}/${layerName}/{TileMatrix}/{TileRow}/{TileCol}.${format.split('/')[1]}`,
          layer: layerName,
          matrixSet: 'EPSG:3857',
          format: format,
          projection: projection,
          tileGrid: new ol.tilegrid.WMTS({
            origin: ol.extent.getTopLeft(projectionExtent),
            resolutions: resolutions,
            matrixIds: matrixIds
          }),
          style: 'default',
          requestEncoding: 'REST'
        }),
        visible: false
      });
    }

    // 주요 레이어 정의
    const baseLayer = createLayer('Base'); baseLayer.setVisible(true);
    const satLayer = createLayer('Satellite','image/jpeg');
    const cadLayer = new ol.layer.Image({
      source: new ol.source.ImageWMS({
        url: 'https://api.vworld.kr/req/wms',
        params: {
          'LAYERS': 'LT_C_ADASRATODO',
          'STYLES': 'LT_C_ADASRATODO',
          'KEY': CONFIG.API_KEY,
          'FORMAT': 'image/png',
          'TRANSPARENT': 'TRUE'
        },
        serverType: 'geoserver',
        projection: projection
      }),
      visible: false
    });
    const grayLayer = createLayer('white');
    const midnightLayer = createLayer('midnight');
    const hybridLayer = createLayer('Hybrid');
    const terrainLayer = createLayer('white');

    // 지도 초기화
    const map = new ol.Map({
      target: 'map',
      layers: [baseLayer, satLayer, cadLayer, grayLayer, midnightLayer, hybridLayer, terrainLayer],
      view: new ol.View({
        center: ol.proj.fromLonLat([127.0, 37.5]),
        zoom: 7
      })
    });

    // ✅ 체크박스 이벤트 → 레이어 on/off
    document.getElementById('baseLayer').addEventListener('change', e => baseLayer.setVisible(e.target.checked));
    document.getElementById('satLayer').addEventListener('change', e => satLayer.setVisible(e.target.checked));
    document.getElementById('cadLayer').addEventListener('change', e => cadLayer.setVisible(e.target.checked));
    document.getElementById('grayLayer').addEventListener('change', e => grayLayer.setVisible(e.target.checked));
    document.getElementById('midnightLayer').addEventListener('change', e => midnightLayer.setVisible(e.target.checked));
    document.getElementById('hybridLayer').addEventListener('change', e => hybridLayer.setVisible(e.target.checked));
    document.getElementById('terrainLayer').addEventListener('change', e => terrainLayer.setVisible(e.target.checked));

    // ✅ 팝업 닫기 함수
    function closeInfoPopup() {
      document.getElementById("infoPopup").style.display = "none";
    }

    // ✅ 지도 클릭 이벤트 → 팝업 표시 및 데이터 요청
    map.on('click', function(evt) {
      const coord = ol.proj.toLonLat(evt.coordinate);
      const lon = coord[0];
      const lat = coord[1];

      document.getElementById("infoPopup").style.display = "block";
      document.getElementById("landBuildingInfo").innerHTML = "조회 중...";
      document.getElementById("landUseInfo").innerHTML = "조회 중...";
      document.getElementById("realEstateInfo").innerHTML = "조회 중...";

      loadLandBuilding(lon, lat);
      loadLandUse(lon, lat);
      loadRealEstate(lon, lat);
    });

    // ✅ 레이어 닫기/열기 버튼 토글 (애니메이션 적용)
    const closeBtn = document.getElementById('closeLayerBtn');
    const mapToggleBtn = document.getElementById('mapToggleBtn');
    const layerSwitcher = document.querySelector('.layer-switcher');

    closeBtn.addEventListener('click', () => {
      layerSwitcher.classList.add('hide'); // 애니메이션 시작
      setTimeout(() => {
        layerSwitcher.style.display = 'none';
        mapToggleBtn.classList.add('show');
      }, 400); // transition 시간과 동일
    });

    mapToggleBtn.addEventListener('click', () => {
      layerSwitcher.style.display = 'block';
      setTimeout(() => {
        layerSwitcher.classList.remove('hide'); // 애니메이션 해제
      }, 10);
      mapToggleBtn.classList.remove('show');
    });

    // ✅ 레이어 드래그 이동 (PC + 모바일)
    let isDragging = false, offsetX, offsetY;

    // PC 마우스 드래그
    layerSwitcher.addEventListener('mousedown', (e) => {
      isDragging = true;
      offsetX = e.clientX - layerSwitcher.offsetLeft;
      offsetY = e.clientY - layerSwitcher.offsetTop;
    });

    document.addEventListener('mousemove', (e) => {
      if (isDragging) {
        layerSwitcher.style.left = (e.clientX - offsetX) + 'px';
        layerSwitcher.style.top = (e.clientY - offsetY) + 'px';
      }
    });

    document.addEventListener('mouseup', () => {
      isDragging = false;
    });

    // 모바일 터치 드래그
    layerSwitcher.addEventListener('touchstart', (e) => {
      isDragging = true;
      const touch = e.touches[0];
      offsetX = touch.clientX - layerSwitcher.offsetLeft;
      offsetY = touch.clientY - layerSwitcher.offsetTop;
    });

    document.addEventListener('touchmove', (e) => {
      if (isDragging) {
        const touch = e.touches[0];
        layerSwitcher.style.left = (touch.clientX - offsetX) + 'px';
        layerSwitcher.style.top = (touch.clientY - offsetY) + 'px';
      }
    });

    document.addEventListener('touchend', () => {
      isDragging = false;
    });
</script>
</body>
</html>
