<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8">
    <title>A-DOMES | 위치 정보 시스템</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="manifest.json">
  
  <style>  
  /* =========================== ✅ 전체 body 기본 스타일 =========================== */
  body {
    font-family: Arial, sans-serif;
    font-size: 18px;
    background-color: #f0f4f8;
    margin: 0;
    color: #333;
    display: flex;
    justify-content: center;
    align-items: center;   /* PC에서는 세로 중앙 정렬 */
    min-height: 100vh;
    padding: 12px;
  }
  
  /* =========================== ✅ 메인 카드 영역 =========================== */
  .main-card {
    border: 2px solid #1976d2;
    border-radius: 12px;
    background: #fff;
    max-width: 520px;
    width: 100%;
    padding: 20px;
    box-shadow: 0 6px 16px rgba(0,0,0,0.15);
  }
  
  /* =========================== ✅ 헤더 영역 =========================== */
  header {
    background: linear-gradient(to right, #1976d2, #64b5f6); /* 파란색 그라데이션 */
    padding: 10px;
    text-align: center;
    border-radius: 8px;
    margin-bottom: 14px;
  }
  header h2 {
    font-size: 24px;
    margin: 0;
    font-weight: bold;
    color: #fff;
  }
  
  /* =========================== ✅ 정보 박스 =========================== */
  .info-box {
    border: 2px solid #1976d2;
    border-radius: 10px;
    background-color: #e3f2fd;
    padding: 14px;
    margin: 14px 0;
    font-size: 17px;
    line-height: 1.5;
  }
  .info-box h3 {
    margin-top: 2px;
    margin-bottom: 2px;
    color: #1565c0;
    font-size: 18px;
  }
  .info-box p {
    margin-top: 2px;
    margin-bottom: 8px;
  }
  
  /* =========================== ✅ 설명/경고 텍스트 =========================== */
  .desc { display:block; margin-top:6px; font-size:15px; }
  .warning {
    display:block;
    margin-top:6px;
    font-size:18px;
    color:#d32f2f;
    font-weight:bold;
    white-space:nowrap;
  }
  
  /* =========================== ✅ 입력창 + 지도 버튼 그룹 =========================== */
  .input-group {
    display:flex;
    align-items:center;
    gap:10px;
    margin-bottom:12px;
  }
  input[type="text"] {
    margin-left:40px;   /* 좌측 버튼과 가까워지도록 */
    width:330px;
    height:50px;
    font-size:18px;
    padding:8px;
    border:2px solid #1976d2;
    border-radius:6px;
    box-sizing:border-box;
  }
  
  /* =========================== ✅ 지도 버튼 =========================== */
  .map-btn {
    margin-left:20px;
    width:90px; height:90px;
    border-radius:12px;
    background:linear-gradient(to bottom, #64b5f6, #1976d2);
    box-shadow:0 4px 8px rgba(0,0,0,0.2);
    cursor:pointer;
    transition:transform 0.2s ease, background 0.3s ease;
  }
  .map-btn:hover {
    background:linear-gradient(to bottom, #90caf9, #1565c0);
    transform:scale(1.05);
  }
  
  /* =========================== ✅ 국토부 버튼 =========================== */
  #guktoBtn img {
    width:90px; height:90px;
    border-radius:20px;
    background:linear-gradient(to bottom, #64b5f6, #1976d2);
    box-shadow:0 4px 8px rgba(0,0,0,0.2);
    cursor:pointer;
    transition:transform 0.2s ease, background 0.3s ease;
  }
  #guktoBtn img:hover {
    background:linear-gradient(to bottom, #90caf9, #1565c0);
    transform:scale(1.05);
  }
  
  /* =========================== ✅ 위치 전송/해제 버튼 (PC용) =========================== */
  .button-row {
    display:flex;
    justify-content:center;
    gap:12px;
    margin-top:14px;
  }
  #sendBtn, #stopBtn {
    flex:1;                 /* PC에서는 폭 균등 분배 */
    height:50px;            /* 버튼 높이 */
    font-size:17px;         /* 글자 크기 */
    border:none;
    border-radius:10px;
    cursor:pointer;
    color:white;
    transition:transform 0.2s ease, background 0.3s ease;
  }
  #sendBtn {
    background:linear-gradient(to bottom, #42a5f5, #1976d2);
  }
  #stopBtn {
    background:linear-gradient(to bottom, #ef5350, #f44336);
  }
  #sendBtn:hover, #stopBtn:hover {
    transform:translateY(-3px) scale(1.05);
  }
  #sendBtn:active, #stopBtn:active,
  #sendBtn:focus, #stopBtn:focus {
    transform:none;
  }
  
  /* =========================== ✅ 모달창 전체 영역 =========================== */
  .modal {
    position:fixed; left:0; top:0;
    width:100%; height:100%;
    background-color:rgba(0,0,0,0.4); /* 반투명 배경 */
    z-index:1000;
  
    display:flex;
    justify-content:center;    /* 가로 중앙 */
    align-items:flex-start;    /* 상단 정렬 */
  }
  .modal-content {
    margin-top:20px;           /* 상단에서 20px 아래 */
    background-color:#fefefe;
    padding:14px;
    border:2px solid #2196F3;
    border-radius:10px;
    width:80%;
    max-width:520px;
    text-align:center;
    font-size:20px;
    background:linear-gradient(135deg, #e3f2fd, #bbdefb);
    box-shadow:0 6px 16px rgba(0,0,0,0.2);
    margin:0 auto;
  }
  
  /* =========================== ✅ 모바일 대응 =========================== */
  @media (max-width:767px) {
    input[type="text"] {
      margin-left:10px;
      font-size:16px;
      height:38px;
      width:100%;
    }
  
    .button-row {
      flex-direction:column;   /* 모바일에서는 세로 배치 */
      gap:8px;
    }
    #sendBtn, #stopBtn {
      flex:none;
      height:40px;             /* 모바일 버튼 높이 */
      font-size:14px;          /* 모바일 글자 크기 */
      width:100%;
      margin:0;
    }
  
    .modal {
      align-items:flex-start;  /* 모바일도 상단 정렬 */
    }
    .modal-content {
      margin-top:20px;         /* 모바일에서도 상단에서 20px 아래 */
      width:90%;
      max-width:300px;
      font-size:16px;
    }
  }
  </style>
  </head>
    
  <body>
  <div class="main-card">
    <!-- ✅ 헤더 -->
    <header>
      <h2>A-DOMES | 위치 전송</h2>
    </header>
  
  <!-- ✅ 입력창 및 버튼 -->
  <section class="info-box">
    <form id="locationForm" method="POST">
      <div class="input-group">
        <!-- ✅ 구글 지도 버튼 -->
        <a href="client.html" target="_blank" id="mapBtn">
          <img src="btn-current.png" alt="구글 지도 버튼" class="map-btn">
        </a>
        <!-- ✅ 텍스트 입력창 -->
        <input type="text" name="phone" id="phone" 
               placeholder="회원가입 닉네임 또는 전화번호 입력">
      </div>
  
      <!-- ✅ 위치 전송/해제 버튼 -->
      <div class="button-row">
        <button type="button" id="sendBtn" onclick="sendLocation()">위치 전송</button>
        <button type="button" id="stopBtn" onclick="stopLocation()">위치정보 해제</button>
      </div>
  
      <!-- ✅ 지적도 + 국토정보 버튼 나란히 -->
      <div class="input-group" style="margin-top:25px; flex-direction:row; justify-content:flex-start; gap:40px;">
        
        <!-- 지적도 버튼 -->
        <div style="display:flex; flex-direction:column; align-items:center;">
          <a href="geoportal.html" target="_blank" id="jijeokBtn">
            <img src="Copilot-map.png" alt="지적도 버튼" class="map-btn">
          </a>
          <span style="margin-top:5px; font-size:18px; color:#1565c0; font-weight:bold; text-align:center; position:relative; left:9px;">
            지적도
          </span>
        </div>
      
      <!-- 국토정보 버튼 -->
      <div style="display:flex; flex-direction:column; align-items:center;">
        <a href="javascript:void(0);" onclick="openSmartMap()" id="guktoBtn">
          <img src="gukto-logo.png" alt="국토정보 버튼" class="map-btn" style="background:transparent; border:none;">
        </a>
        <span style="margin-top:5px; font-size:18px; color:#1565c0; font-weight:bold; text-align:center; position:relative; left:7px;">
          국토정보
        </span>
      </div>
      </div>
    </form>
  </section>


  <!-- ✅ 주요 기능 (카드 안에서 꽉 차게) -->
  <section class="info-box features" style="width:100%; box-sizing:border-box;">
    <h3>주요 기능</h3>
    <p>
      📡 나의 현재 위치 전송 및 자동 갱신<br>
      🗺️ 전국 지도 검색 및 직선 거리 확인<br>
      👥 회원 이름으로 상대 위치 확인<br>
      🚸 보호구역 · 속도제한 · 기타 알림<br>
      🏢 국토부 지도 및 부동산 정보 확인<br>
      <span class="desc">위치전송 버튼을 누르면 입력한 값과 현재 위치가 사용자 서버에 기록됩니다.</span>
      <span class="warning">📱 위치 전송을 위해 화면을 유지하세요!</span>
    </p>
  </section>

  <!-- ✅ 지도 표시 영역 -->
  <div id="map"></div>
</div>

<!-- config.js 불러오기 -->
<script src="config.js"></script>

<script>
let intervalId;

// ✅ 모달 표시/닫기
function showModal(message, autoClose = false) {
  document.querySelectorAll(".modal").forEach(m => m.remove());
  const modal = document.createElement("div");
  modal.className = "modal";
  const content = document.createElement("div");
  content.className = "modal-content";
  content.innerText = message;
  modal.appendChild(content);
  document.body.appendChild(modal);
  modal.style.display = "block";
  if (autoClose) setTimeout(() => { modal.remove(); }, 2000);
}
function closeModal() {
  document.querySelectorAll(".modal").forEach(m => m.remove());
}

// ✅ JSONP 호출 헬퍼
function callJSONP(url, callbackName) {
  const finalUrl = url + "&callback=" + callbackName;
  console.log("[DEBUG] JSONP 호출 URL:", finalUrl);

  const script = document.createElement("script");
  script.src = finalUrl;
  script.onload = () => console.log("[DEBUG] JSONP 로드 성공:", finalUrl);
  script.onerror = () => console.error("[DEBUG] JSONP 로드 실패:", finalUrl);
  document.body.appendChild(script);
}

// ✅ 페이지 로드 시 토큰 검증
window.onload = function() {
  // ✅ 닉네임을 phone 입력란에 표시
  const nickname = localStorage.getItem("nickname");
  if (nickname && nickname !== "undefined") {
    document.getElementById("phone").value = nickname;
  }

  document.getElementById("mapBtn").style.visibility = "hidden";

  const token = sessionStorage.getItem("token");
  console.log("[DEBUG] 초기 토큰:", token);

  if (!token) {
    showModal("로그인이 필요합니다.\n로그인 페이지로 이동합니다...", true);
    setTimeout(() => { window.location.href = "index.html"; }, 2000);
    return;
  }

  const verifyUrl = CONFIG.USER_URL
                  + "?mode=verifyToken"
                  + "&token=" + encodeURIComponent(token);
  callJSONP(verifyUrl, "handleVerifyToken");
};

function handleVerifyToken(result) {
  console.log("[DEBUG] verifyToken 응답:", result);
  if (result.result !== "success") {
    showModal("토큰이 유효하지 않습니다.\n다시 로그인하세요.", true);
    setTimeout(() => { window.location.href = "index.html"; }, 2000);
  }
}

// ✅ 배열 응답에서 닉네임과 phone 값 매칭
function parseArrayResponse(arr, nickname) {
  if (!Array.isArray(arr) || arr.length === 0) return null;

  const normalizedNickname = (nickname || "").trim().toLowerCase();

  return arr.find(row => {
    const rowPhone = (row.phone || "").trim().toLowerCase();
    return rowPhone === normalizedNickname;
  }) || null;
}

// ✅ 위치 해제 응답 처리 함수
function handleStopLocation(result) {
  console.log("[DEBUG] handleStopLocation 응답:", result);

  // phone input에 실제로 nickname이 들어있으므로 그대로 사용
  const nickname = document.getElementById("phone").value;

  // 응답 배열에서 nickname으로 매칭
  const dataObj = parseArrayResponse(result, nickname);

  // 모달 닫기
  closeModal();

  // 매칭된 객체가 있고 status가 "해제"라면 정상 처리
  if (dataObj && dataObj.status === "해제") {
    showModal("🛑 위치정보가 해제되었습니다.", true);
    document.getElementById("mapBtn").style.display = "none";
  } else {
    // 매칭 실패 시 오류 메시지 출력
    showModal("처리 중 오류 발생:\n" + (dataObj ? dataObj.status : "응답 오류"), true);
  }
}


// ✅ 위치 전송
function sendLocation() {
  showModal("위치정보 전송 중입니다...\n잠시만 기다려주세요.");

  const token = sessionStorage.getItem("token");
  const phoneInput = document.getElementById("phone").value.trim();
  const nickname = localStorage.getItem("nickname");

  // 🚫 원천 차단: 닉네임과 토큰 검증
  if (!token) {
    closeModal();
    showModal("❌ 토큰이 유효하지 않습니다.\n다시 로그인하세요.", true);
    return;
  }
  if (!nickname || nickname.toLowerCase() !== phoneInput.toLowerCase()) {
    closeModal();
    showModal("❌ 닉네임 값이 로그인 시점과 다릅니다.\n위치 전송을 할 수 없습니다.", true);
    return;
  }

  navigator.geolocation.getCurrentPosition(function(position) {
    const params = new URLSearchParams({
      phone: phoneInput,
      status: "정상",
      lat: position.coords.latitude,
      lng: position.coords.longitude,
      time: new Date().toISOString(),
      token: token,
      mode: "login"   // ✅ 로그인 모드 지정
    });

    fetch(CONFIG.ADMIN_URL, {
      method: "POST",
      body: params
    })
    .then(res => res.json())
    .then(result => handleSendLocation(result))
    .catch(err => {
      closeModal();
      showModal("전송 오류: " + err.message, true);
    });
  }, function(error) {
    closeModal();
    showModal("위치 정보를 가져오지 못했습니다:\n" + error.message, true);
  });
}


function handleSendLocation(result) {
  console.log("[DEBUG] handleSendLocation 응답:", result);

  const phone = document.getElementById("phone").value;
  const dataObj = parseArrayResponse(result, phone);

  closeModal();
  if (dataObj && dataObj.status === "정상") {
    showModal("✅ 위치정보가 성공적으로 재갱신되었습니다.", true);
    document.getElementById("mapBtn").style.visibility = "visible";
    document.getElementById("mapBtn").style.pointerEvents = "auto";
    if (!intervalId) intervalId = setInterval(autoUpdate, 5 * 60 * 1000);
  } else {
    showModal("✅ 위치정보를 서버에 저장하였습니다.", true);
    document.getElementById("mapBtn").style.visibility = "visible";
    document.getElementById("mapBtn").style.pointerEvents = "auto";
    if (!intervalId) intervalId = setInterval(autoUpdate, 5 * 60 * 1000);
  }
}

// ✅ 위치 해제 (fetch POST로 수정)
function stopLocation() {
  showModal("위치정보 해제 처리 중입니다...\n잠시만 기다려주세요.");
  clearInterval(intervalId); intervalId = null;

  const token = sessionStorage.getItem("token");
  const phone = document.getElementById("phone").value;

  // ✅ POST 요청으로 관리자 서버에 해제 상태 전달
  const params = new URLSearchParams({
    phone: phone,
    status: "해제",
    time: new Date().toISOString(),
    token: token
  });

  fetch(CONFIG.ADMIN_URL, {
    method: "POST",
    body: params
  })
  .then(res => res.json())
  .then(result => handleStopLocation(result))
  .catch(err => {
    closeModal();
    showModal("해제 오류: " + err.message, true);
  });
}

// ✅ 위치 해제 응답 처리
function handleStopLocation(result) {
  console.log("[DEBUG] handleStopLocation 응답:", result);

  const nickname = document.getElementById("phone").value.trim();
  let dataObj = null;

  // 응답이 배열일 경우
  if (Array.isArray(result)) {
    dataObj = parseArrayResponse(result, nickname);
  }

  // 응답이 객체일 경우
  if (result.result) {
    if (result.result === "success") {
      showModal("🛑 위치정보가 해제되었습니다.", true);
      const mapBtn = document.getElementById("mapBtn");
      mapBtn.style.visibility = "hidden";
      mapBtn.style.pointerEvents = "none";
      return;
    } else {
      showModal("❌ " + result.message, true);
      return;
    }
  }

  // 배열에서 찾은 경우 처리
  if (dataObj && dataObj.status === "해제") {
    showModal("🛑 위치정보가 해제되었습니다.", true);
    const mapBtn = document.getElementById("mapBtn");
    mapBtn.style.visibility = "hidden";
    mapBtn.style.pointerEvents = "none";
  } else {
    showModal("처리 중 오류 발생:\n" + (dataObj ? dataObj.status : "응답 오류"), true);
  }
}

// ✅ 자동 갱신
function autoUpdate() {
  if (!navigator.geolocation) return;
  navigator.geolocation.getCurrentPosition(function(position) {
    console.log("[DEBUG] autoUpdate 좌표:", position.coords.latitude, position.coords.longitude);

    const token = sessionStorage.getItem("token");
    const phone = document.getElementById("phone").value;

    const url = CONFIG.ADMIN_URL
              + "?phone=" + encodeURIComponent(phone)
              + "&status=정상"
              + "&lat=" + encodeURIComponent(position.coords.latitude)
              + "&lng=" + encodeURIComponent(position.coords.longitude)
              + "&time=" + encodeURIComponent(new Date().toISOString())
              + "&auto=true"
              + "&token=" + encodeURIComponent(token);

    callJSONP(url, "handleAutoUpdate");
  });
}

function handleAutoUpdate(result) {
  console.log("[DEBUG] autoUpdate 응답:", result);
  const phone = document.getElementById("phone").value;
  const dataObj = parseArrayResponse(result, phone);
  if (dataObj) {
    console.log("[DEBUG] 최신 데이터:", dataObj);
  }
}

function handleAutoUpdate(result) {
  console.log("[DEBUG] autoUpdate 응답:", result);
  const phone = document.getElementById("phone").value;
  const dataObj = parseArrayResponse(result, phone);
  if (dataObj) {
    console.log("[DEBUG] 최신 데이터:", dataObj);
  }
}

function openSmartMap() {
  if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(
      (pos) => {
        const lat = pos.coords.latitude;
        const lon = pos.coords.longitude;
        // CRS: EPSG:4326 (WGS84 좌표계) 기준 경도(lon), 위도(lat) 순서 입력 확인
        const apiUrl = `https://api.vworld.kr/req/address?service=address&request=getAddress&version=2.0&crs=epsg:4326&point=${lon},${lat}&type=parcel&key=${config.API_KEY}`;

        fetch(apiUrl)
          .then(res => res.json())
          .then(data => {
            console.log("API 응답:", data); // 디버깅용
            
            if (data.response && data.response.status === "OK" && data.response.result && data.response.result.length > 0) {
              // ⚠️ 브이월드 API는 결과 객체의 id 필드에 PNU(19자리)를 반환합니다.
              const pnu = data.response.result[0].id; 
              
              if (pnu && pnu.length === 19) {
                // ✅ 토지이음 상세 페이지 이동
                const url = `https://www.eum.go.kr/web/ar/lu/luLandDet.jsp?pnu=${pnu}`;
                location.href = url; 
              } else {
                alert("올바른 PNU 코드(19자리)를 생성할 수 없습니다.");
              }
            } else {
              alert("해당 위치의 필지 정보를 찾을 수 없습니다.");
            }
          })
          .catch(err => {
            console.error("API 호출 오류:", err);
            alert("필지 정보를 불러오는 중 오류가 발생했습니다.");
          });
      },
      (err) => {
        console.error("Geolocation 오류:", err);
        alert("현재 위치를 가져올 수 없습니다. 위치 권한을 허용해주세요.");
      }
    );
  } else {
    alert("이 브라우저는 위치 정보를 지원하지 않습니다.");
  }
}
