<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>A-DOMES | 위치 정보 시스템</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="manifest" href="manifest.json">

  <style>
    body { font-family: Arial, sans-serif; font-size: 18px; background:#f0f4f8; margin:0; color:#333;
           display:flex; justify-content:center; align-items:flex-start; min-height:100vh; padding:12px; }
    .main-card { border:2px solid #1976d2; border-radius:12px; background:#fff; max-width:900px; width:100%;
                 padding:20px; box-shadow:0 6px 16px rgba(0,0,0,0.15); }
    header { background:#1976d2; padding:10px; text-align:center; border-radius:8px; margin-bottom:14px; }
    header h2 { font-size:28px; margin:0; font-weight:bold; color:#fff; }
    .info-box { border:2px solid #1976d2; border-radius:10px; background:#e3f2fd; padding:16px; margin:16px 0;
                font-size:20px; line-height:1.5; }
    .info-box h3 { margin:2px 0; color:#1565c0; font-size:20px; }
    .warning { display:block; margin-top:4px; font-size:18px; color:#d32f2f; font-weight:bold; white-space:nowrap; }

    .input-group { display:flex; align-items:center; gap:12px; margin-bottom:12px; }
    input[type="text"] { width: 180px; margin-left:16px; height:40px; font-size:18px; padding:8px; border:2px solid #1976d2;
                         border-radius:6px; box-sizing:border-box}

    .map-btn { width:90px; height:90px; cursor:pointer; }
    
    #sendBtn, #stopBtn { width:100%; height:50px; font-size:18px; border:none; border-radius:8px; cursor:pointer;
                         color:white; margin-bottom:6px; }
    #sendBtn { background:linear-gradient(to bottom,#42a5f5,#1976d2); }
    #stopBtn { background:linear-gradient(to bottom,#ef5350,#f44336); margin-top:4px; }

    .modal { position:fixed; left:0; top:0; width:100%; height:100%; background:rgba(0,0,0,0.4); z-index:1000; }
    .modal-content { background:#fefefe; padding:20px; border:2px solid #2196F3; border-radius:10px; width:80%;
                     max-width:400px; text-align:center; font-size:18px;
                     background:linear-gradient(135deg,#e3f2fd,#bbdefb); box-shadow:0 6px 16px rgba(0,0,0,0.2);
                     margin:50% auto; }
  </style>
</head>

<body>
<div class="main-card">
  <header>
    <h2>A-DOMES | 관리자 화면</h2>
  </header>
  
  <!-- 입력창 + 버튼 -->
  <section class="info-box">
    <form id="locationForm" method="POST">
      <div class="input-group">
        <a href="client.html" target="_blank" id="mapBtn" style="visibility:hidden; pointer-events:none;">
          <img src="btn-current.png" alt="지도 버튼" class="map-btn">
        </a>
        <input type="text" name="phone" id="phone" placeholder="회원가입 닉네임 또는 전화번호 입력">
      </div>
      <button type="button" id="sendBtn" onclick="sendLocation()">위치 전송</button>
      <button type="button" id="stopBtn" onclick="stopLocation()">위치정보 해제</button>
    </form>
  </section>

  <div id="map"></div>
</div>

<!-- ✅ CONFIG 불러오기 -->
<script src="config.js"></script>
<script>
let intervalId;
let userToken = sessionStorage.getItem("token") || "";

// ============================
// 📌 모달창 표시/닫기
// ============================
function showModal(message, autoClose = false) {
  document.querySelectorAll(".modal").forEach(m => m.remove());
  const modal = document.createElement("div");
  modal.className = "modal";
  const content = document.createElement("div");
  content.className = "modal-content";
  content.innerText = message;
  modal.appendChild(content);
  document.body.appendChild(modal);
  modal.style.display = "block";
  if (autoClose) setTimeout(() => { modal.remove(); }, 2000);
}
function closeModal() {
  document.querySelectorAll(".modal").forEach(m => m.remove());
}

// ============================
// 📌 위치 전송 (POST 요청)
// ============================
function sendLocation() {
  const phone = document.getElementById("phone").value.trim();
  if (!phone) {
    showModal("📌 입력값이 없습니다.\n위치전송에 사용 할 고유값을 입력하세요.", true);
    return;
  }

  showModal("위치정보 전송 중입니다...\n잠시만 기다려주세요.");
  if (!navigator.geolocation) {
    showModal("이 브라우저에서는 위치 정보를 지원하지 않습니다.", true);
    return;
  }

  navigator.geolocation.getCurrentPosition(function(position) {
    fetch(CONFIG.ADMIN_URL, {
      method: "POST",
      body: new URLSearchParams({
        mode: "location",
        phone: phone,
        status: "정상",
        lat: position.coords.latitude || 0,
        lng: position.coords.longitude || 0,
        token: userToken
      })
    })
    .then(res => res.json())
    .then(result => {
      closeModal();
      if (result.result === "success") {
        showModal("✅ 위치정보가 성공적으로 전송되었습니다.", true);
        const mapBtn = document.getElementById("mapBtn");
        mapBtn.style.visibility = "visible";
        mapBtn.style.pointerEvents = "auto";
      } else {
        showModal("❌ " + result.message, true);
      }
    })
    .catch(err => {
      closeModal();
      showModal("위치 전송 실패:\n" + err.message, true);
    });

    if (!intervalId) intervalId = setInterval(autoUpdate, CONFIG.DEFAULT_INTERVAL);
  });
}

// ============================
// 📌 위치 해제 (POST 요청)
// ============================
function stopLocation() {
  const phone = document.getElementById("phone").value.trim();
  if (!phone) {
    showModal("📌 입력값이 없습니다.\n위치해제에 사용 할 고유값을 입력하세요.", true);
    return;
  }

  showModal("위치정보 해제 처리 중입니다...\n잠시만 기다려주세요.");
  clearInterval(intervalId); intervalId = null;

  fetch(CONFIG.ADMIN_URL, {
    method: "POST",
    body: new URLSearchParams({
      mode: "stop",
      phone: phone,
      status: "해제",
      token: userToken
    })
  })
  .then(res => res.json())
  .then(result => {
    closeModal();
    if (result.result === "success") {
      showModal("🛑 위치정보가 해제되었습니다.", true);
      const mapBtn = document.getElementById("mapBtn");
      mapBtn.style.visibility = "hidden";
      mapBtn.style.pointerEvents = "none";
    } else {
      showModal("❌ " + result.message, true);
    }
  })
  .catch(err => {
    closeModal();
    showModal("처리 중 오류 발생:\n" + err.message, true);
  });
}

// ============================
// 📌 자동 위치 갱신
// ============================
function autoUpdate() {
  if (!navigator.geolocation) return;
  navigator.geolocation.getCurrentPosition(function(position) {
    fetch(CONFIG.ADMIN_URL, {
      method: "POST",
      body: new URLSearchParams({
        mode: "autoUpdate",
        phone: document.getElementById("phone").value.trim(),
        status: "정상",
        lat: position.coords.latitude || 0,
        lng: position.coords.longitude || 0,
        token: userToken
      })
    })
    .then(res => res.json())
    .catch(err => {
      console.error("자동 갱신 실패:\n" + err.message);
    });
  });
}

// ============================
// 📌 PWA 서비스워커 등록
// ============================
// if ("serviceWorker" in navigator) {
//  navigator.serviceWorker.register("service-worker.js");
// }
</script>

</body>
</html>
