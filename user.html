<!DOCTYPE html>
  <html lang="ko">
  <head>
    <meta charset="UTF-8">
    <title>A-DOMES | 위치정보시스템</title>
    <link rel="manifest" href="manifest.json">
  
    <style>
      /* ============================
         전체 페이지 기본 설정
         ============================ */
      body {
        font-family: Arial, sans-serif;
        font-size: 18px;
        background-color: #f9f9f9;
        margin: 0;
        color: #333;
      }
  
      /* ============================
         상단 헤더
         ============================ */
      header {
        background-color: #2196F3;
        padding: 20px;
        text-align: center;
      }
  
      header h2 {
        font-size: 36px;
        margin: 0;
        font-weight: bold;
        color: #fff;
      }
  
      /* ============================
         안내 박스
         ============================ */
      .info-box {
        border: 2px solid #2196F3;
        border-radius: 10px;
        background-color: #e3f2fd;
        padding: 20px;
        margin: 40px auto;
        max-width: 620px;
        text-align: left;
        font-size: 20px;
        line-height: 1.4;
      }
  
      .info-box h3 {
        margin: 10px 0 5px 0;
        color: #1976d2;
      }
  
      .warning {
        display: block;
        margin-top: 10px;
        font-size: 20px;
        color: #d32f2f;
        font-weight: bold;
      }
  
      /* ============================
         중앙정렬 컨테이너
         ============================ */
      .center-wrapper {
        display: flex;
        justify-content: center;
        margin-top: 20px;
      }
  
      .inner-group {
        text-align: left;
      }
  
      /* ============================
         전화번호 입력창
         ============================ */
      input[type="text"] {
        width: 400px;
        height: 30px;
        font-size: 20px;
        padding: 8px;
        margin-left: 140px;
        margin-bottom: 5px;
        border: 2px solid #2196F3;
        border-radius: 6px;
        display: block;
      }
  
      /* ============================
         버튼 그룹
         ============================ */
      .button-group {
        display: flex;
        justify-content: flex-start;
        align-items: center;
        margin-left: 1px;
        margin-top: 10px;
        gap: 40px;
      }
  
      .map-btn {
        width: 100px;
        height: 100px;
        cursor: pointer;
      }
  
      #sendBtn {
        width: 200px;
        height: 50px;
        font-size: 20px;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        background: linear-gradient(to bottom, #66bb6a, #4CAF50);
        color: white;
      }
  
      #stopBtn {
        width: 200px;
        height: 50px;
        font-size: 20px;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        background: linear-gradient(to bottom, #ef5350, #f44336);
        color: white;
      }
  
      /* ============================
         모달창
         ============================ */
      .modal {
        display: none;
        position: fixed;
        z-index: 999;
        left: 0;
        top: 0;
        width: 100%;
        height: 100%;
        background-color: rgba(0,0,0,0.4);
      }
  
      .modal-content {
        background-color: #fefefe;
        margin: 15% auto;
        padding: 20px;
        border: 2px solid #2196F3;
        border-radius: 10px;
        width: 80%;
        max-width: 400px;
        text-align: center;
        font-size: 18px;
        background: linear-gradient(135deg, #e3f2fd, #bbdefb);
      }
    </style>
  </head>
  
<body>
  <!-- 상단 헤더 -->
  <header>
    <h2>A-DOMES | 위치정보시스템</h2>
  </header>

  <!-- 안내 박스 -->
  <section class="info-box">
    <h3>앱 목적</h3>
    <p>이 앱은 현장의 위치 정보를 기록하고 공유하기 위해 만들어졌습니다.</p>

    <h3>사용 방법</h3>
    <p>
      먼저 전화번호 또는 이름을 입력하세요.<br>
      위치 전송 버튼을 누르면 입력한 값과 현재 위치가 구글 시트에 기록됩니다.<br>
      화면을 켜 두시면 5분마다 자동으로 위치가 갱신됩니다.
    </p>

    <span class="warning">📱 위치 전송을 위해 화면을 끄지 마세요!</span>
  </section>

  <!-- ★★★ 핵심: form ★★★  사용자 서버 URL 입력 -->
  <form id="locationForm"
        action="https://script.google.com/macros/s/사용자서버ID/exec"
        method="POST">

    <div class="center-wrapper">
      <div class="inner-group">
        <!-- 사용자 입력 -->
        <input type="text" name="phone" id="phone" placeholder="전화번호 또는 이름 입력">
        <input type="text" name="id" id="userId" placeholder="아이디 입력">
        <input type="password" name="pw" id="userPw" placeholder="비밀번호 입력">

        <!-- 버튼 그룹 -->
        <div class="button-group">
          <button type="button" id="sendBtn" onclick="sendLocation()">위치 전송</button>
          <button type="button" id="stopBtn" onclick="stopLocation()">위치정보 해제</button>
        </div>
      </div>
    </div>
  </form>

  <div id="map"></div>

  <script>
    let intervalId;

    /* ---------------------- 위치 전송 함수 ---------------------- */
    async function sendLocation() {
      const id = document.getElementById("userId").value;
      const pw = document.getElementById("userPw").value;

      // 1️⃣ 사용자 서버 호출 (로그인/인증)
      const loginRes = await fetch(`${document.getElementById("locationForm").action}?mode=checkPassword&id=${encodeURIComponent(id)}&pw=${encodeURIComponent(pw)}`);
      const loginResult = await loginRes.json();

      if (loginResult.result !== "success") {
        alert("로그인 실패: " + (loginResult.message || ""));
        return;
      }

      // 2️⃣ 위치 정보 가져오기
      navigator.geolocation.getCurrentPosition(async function(position) {
        const locationParams = new URLSearchParams();
        locationParams.append("phone", document.getElementById("phone").value);
        locationParams.append("status", "정상");
        locationParams.append("lat", position.coords.latitude || 0);
        locationParams.append("lng", position.coords.longitude || 0);
        locationParams.append("time", new Date().toISOString());
        locationParams.append("token", loginResult.token);

        // 3️⃣ 관리자 서버 호출 (위치 기록)
        await fetch("https://script.google.com/macros/s/관리자서버ID/exec", {
          method: "POST",
          headers: { "Content-Type": "application/x-www-form-urlencoded" },
          body: locationParams.toString()
        });

        alert("위치정보가 성공적으로 전송되었습니다.");

        if (!intervalId) {
          intervalId = setInterval(autoUpdate, 5 * 60 * 1000);
        }
      });
    }

    /* ---------------------- 위치 해제 함수 ---------------------- */
    async function stopLocation() {
      clearInterval(intervalId);
      intervalId = null;

      const params = new URLSearchParams();
      params.append("phone", document.getElementById("phone").value);
      params.append("status", "해제");
      params.append("time", new Date().toISOString());
      params.append("token", sessionStorage.getItem("token"));

      await fetch("https://script.google.com/macros/s/관리자서버ID/exec", {
        method: "POST",
        headers: { "Content-Type": "application/x-www-form-urlencoded" },
        body: params.toString()
      });

      alert("위치정보가 해제되었습니다.");
    }

    /* ---------------------- 자동 갱신 함수 ---------------------- */
    function autoUpdate() {
      if (!navigator.geolocation) return;
      navigator.geolocation.getCurrentPosition(async function(position) {
        const params = new URLSearchParams();
        params.append("phone", document.getElementById("phone").value);
        params.append("status", "정상");
        params.append("lat", position.coords.latitude || 0);
        params.append("lng", position.coords.longitude || 0);
        params.append("time", new Date().toISOString());
        params.append("auto", "true");
        params.append("token", sessionStorage.getItem("token"));

        await fetch("https://script.google.com/macros/s/관리자서버ID/exec", {
          method: "POST",
          headers: { "Content-Type": "application/x-www-form-urlencoded" },
          body: params.toString()
        });
      });
    }

    /* ---------------------- 서비스워커 등록 ---------------------- */
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("service-worker.js");
    }

    /* ---------------------- 지도 초기화 ---------------------- */
    function initMap() {
      if (!navigator.geolocation) return;
      navigator.geolocation.getCurrentPosition(function(position) {
        const map = new google.maps.Map(document.getElementById("map"), {
          center: { lat: position.coords.latitude, lng: position.coords.longitude },
          zoom: 15
        });
        new google.maps.Marker({
          position: { lat: position.coords.latitude, lng: position.coords.longitude },
          map: map,
          title: "현재 위치"
        });
      });
    }

    window.onload = initMap;
  </script>
</body>
</html>
