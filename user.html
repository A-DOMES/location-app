<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>A-DOMES | 위치정보시스템</title>
  <!-- 모바일 대응 -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- 폰트 로딩 -->
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&family=Noto+Sans+KR&display=swap" rel="stylesheet">

  <!-- 아이콘 -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    body {
      display:flex; justify-content:center; align-items:flex-start;
      min-height:100vh; background:linear-gradient(135deg,#74ebd5,#ACB6E5);
      font-family:'Noto Sans KR','Roboto',sans-serif;
      padding:20px;
    }
    .card {
      background:#fff; padding:30px 24px; border-radius:20px;
      box-shadow:0 8px 24px rgba(0,0,0,0.15); width:100%; max-width:480px;
      margin-bottom:20px; animation:fadeIn 0.8s ease-in-out;
    }
    @keyframes fadeIn { from{opacity:0; transform:translateY(20px);} to{opacity:1; transform:translateY(0);} }

    .card h3 {
      margin-bottom:16px; color:#1565c0; font-size:22px; font-weight:600;
      text-align:center;
    }
    .card p {
      font-size:16px; line-height:1.6; color:#333; text-align:left;
    }
    .input-box {
      width:100%; padding:14px; font-size:16px;
      border:1.5px solid #bdc3c7; border-radius:10px;
      margin-bottom:20px; box-sizing:border-box;
    }
    .input-box:focus {
      border-color:#2980b9; box-shadow:0 0 8px rgba(41,128,185,.3); outline:none;
    }
    .button-group {
      display:flex; justify-content:center; gap:12px; flex-wrap:wrap;
    }
    .btn {
      flex:1; min-width:120px; padding:14px; font-size:16px;
      border:none; border-radius:10px; cursor:pointer; color:#fff;
      transition:transform .2s, background .3s;
    }
    #sendBtn { background:linear-gradient(to right,#42a5f5,#1565c0); }
    #sendBtn:hover { background:linear-gradient(to right,#64b5f6,#1976d2); transform:scale(1.03); }
    #stopBtn { background:linear-gradient(to right,#ef5350,#c62828); }
    #stopBtn:hover { background:linear-gradient(to right,#e57373,#d32f2f); transform:scale(1.03); }
    #mapBtn img { width:60px; height:60px; }

    /* 모바일 대응 */
    @media (max-width:767px) {
      .card h3 { font-size:18px; }
      .card p { font-size:14px; }
      .btn { font-size:14px; padding:12px; }
      .input-box { font-size:14px; padding:12px; }
    }
  </style>
</head>
<body>
  <!-- 상단 카드 -->
  <div class="card">
    <h3>앱 목적</h3>
    <p>
      내 위치를 기록하고 회원끼리 서로의 위치를 확인하며,<br>
      전국 어디든 목적지를 검색해 안전하게 길을 안내받을 수 있습니다.
    </p>
  </div>

  <!-- 중단 카드 -->
  <div class="card">
    <h3>주요 기능</h3>
    <p>
      📡 위치 전송 · 자동 갱신<br>
      🗺️ 전국 지도 검색 · 직선 거리 확인<br>
      👥 회원 이름으로 상대 위치 확인<br>
      🚸 보호구역 · 속도 제한 · 주변 시설 알림
    </p>
  </div>

  <!-- 하단 카드 -->
  <div class="card">
    <h3>시작하기</h3>
    <form id="locationForm" method="POST">
      <input type="text" name="phone" id="phone" class="input-box" placeholder="닉네임 또는 아이디 입력">
      <div class="button-group">
        <a href="client.html" target="_blank" id="mapBtn" style="visibility:hidden;">
          <img src="btn-current.png" alt="지도 버튼">
        </a>
        <button type="button" id="sendBtn" class="btn" onclick="sendLocation()">위치 전송</button>
        <button type="button" id="stopBtn" class="btn" onclick="stopLocation()">위치 해제</button>
      </div>
    </form>
  </div>

  <div id="map"></div>


<!-- config.js 불러오기 -->
<script src="config.js"></script>

<script>
let intervalId;

// ✅ 모달 표시/닫기
function showModal(message, autoClose = false) {
  document.querySelectorAll(".modal").forEach(m => m.remove());
  const modal = document.createElement("div");
  modal.className = "modal";
  const content = document.createElement("div");
  content.className = "modal-content";
  content.innerText = message;
  modal.appendChild(content);
  document.body.appendChild(modal);
  modal.style.display = "block";
  if (autoClose) setTimeout(() => { modal.remove(); }, 2000);
}
function closeModal() {
  document.querySelectorAll(".modal").forEach(m => m.remove());
}

// ✅ JSONP 호출 헬퍼
function callJSONP(url, callbackName) {
  const finalUrl = url + "&callback=" + callbackName;
  console.log("[DEBUG] JSONP 호출 URL:", finalUrl);

  const script = document.createElement("script");
  script.src = finalUrl;
  script.onload = () => console.log("[DEBUG] JSONP 로드 성공:", finalUrl);
  script.onerror = () => console.error("[DEBUG] JSONP 로드 실패:", finalUrl);
  document.body.appendChild(script);
}

// ✅ 페이지 로드 시 토큰 검증
window.onload = function() {
  // ✅ 닉네임을 phone 입력란에 표시
  const nickname = localStorage.getItem("nickname");
  if (nickname && nickname !== "undefined") {
    document.getElementById("phone").value = nickname;
  }

  document.getElementById("mapBtn").style.visibility = "hidden";

  const token = sessionStorage.getItem("token");
  console.log("[DEBUG] 초기 토큰:", token);

  if (!token) {
    showModal("로그인이 필요합니다.\n로그인 페이지로 이동합니다...", true);
    setTimeout(() => { window.location.href = "index.html"; }, 2000);
    return;
  }

  const verifyUrl = CONFIG.USER_URL
                  + "?mode=verifyToken"
                  + "&token=" + encodeURIComponent(token);
  callJSONP(verifyUrl, "handleVerifyToken");
};

function handleVerifyToken(result) {
  console.log("[DEBUG] verifyToken 응답:", result);
  if (result.result !== "success") {
    showModal("토큰이 유효하지 않습니다.\n다시 로그인하세요.", true);
    setTimeout(() => { window.location.href = "index.html"; }, 2000);
  }
}

// ✅ 배열 응답 파싱
function parseArrayResponse(arr, phone) {
  if (!Array.isArray(arr) || arr.length === 0) return null;
  return arr.find(row => row.phone === phone) || null;
}

// ✅ 위치 전송
function sendLocation() {
  showModal("위치정보 전송 중입니다...\n잠시만 기다려주세요.");

  const token = sessionStorage.getItem("token");
  const phone = document.getElementById("phone").value;

  navigator.geolocation.getCurrentPosition(function(position) {
    const params = new URLSearchParams({
      phone: phone,
      status: "정상",
      lat: position.coords.latitude,
      lng: position.coords.longitude,
      time: new Date().toISOString(),
      token: token
    });

    fetch(CONFIG.ADMIN_URL, {
      method: "POST",
      body: params
    })
    .then(res => res.json())
    .then(result => handleSendLocation(result))
    .catch(err => {
      closeModal();
      showModal("전송 오류: " + err.message, true);
    });
  }, function(error) {
    closeModal();
    showModal("위치 정보를 가져오지 못했습니다:\n" + error.message, true);
  });
}

function handleSendLocation(result) {
  console.log("[DEBUG] handleSendLocation 응답:", result);

  const phone = document.getElementById("phone").value;
  const dataObj = parseArrayResponse(result, phone);

  closeModal();
  if (dataObj && dataObj.status === "정상") {
    showModal("✅ 위치정보가 성공적으로 재갱신되었습니다.", true);
    document.getElementById("mapBtn").style.display = "inline-block";
    if (!intervalId) intervalId = setInterval(autoUpdate, 5 * 60 * 1000);
  } else {
    showModal("✅ 위치정보를 서버에 저장하였습니다.", true);
    document.getElementById("mapBtn").style.visibility = "visible";
    if (!intervalId) intervalId = setInterval(autoUpdate, 5 * 60 * 1000);
  }
}

// ✅ 위치 해제
function stopLocation() {
  showModal("위치정보 해제 처리 중입니다...\n잠시만 기다려주세요.");
  clearInterval(intervalId); intervalId = null;

  const token = sessionStorage.getItem("token");
  const phone = document.getElementById("phone").value;

  const url = CONFIG.ADMIN_URL
            + "?phone=" + encodeURIComponent(phone)
            + "&status=해제"
            + "&time=" + encodeURIComponent(new Date().toISOString())
            + "&token=" + encodeURIComponent(token);

  callJSONP(url, "handleStopLocation");
}

function handleStopLocation(result) {
  console.log("[DEBUG] handleStopLocation 응답:", result);
  const phone = document.getElementById("phone").value;
  const dataObj = parseArrayResponse(result, phone);
  closeModal();
  if (dataObj && dataObj.status === "해제") {
    showModal("🛑 위치정보가 해제되었습니다.", true);
    document.getElementById("mapBtn").style.display = "none";
  } else {
    showModal("처리 중 오류 발생:\n" + (dataObj ? dataObj.status : "응답 오류"), true);
  }
}

// ✅ 자동 갱신
function autoUpdate() {
  if (!navigator.geolocation) return;
  navigator.geolocation.getCurrentPosition(function(position) {
    console.log("[DEBUG] autoUpdate 좌표:", position.coords.latitude, position.coords.longitude);

    const token = sessionStorage.getItem("token");
    const phone = document.getElementById("phone").value;

    const url = CONFIG.ADMIN_URL
              + "?phone=" + encodeURIComponent(phone)
              + "&status=정상"
              + "&lat=" + encodeURIComponent(position.coords.latitude)
              + "&lng=" + encodeURIComponent(position.coords.longitude)
              + "&time=" + encodeURIComponent(new Date().toISOString())
              + "&auto=true"
              + "&token=" + encodeURIComponent(token);

    callJSONP(url, "handleAutoUpdate");
  });
}

function handleAutoUpdate(result) {
  console.log("[DEBUG] autoUpdate 응답:", result);
  const phone = document.getElementById("phone").value;
  const dataObj = parseArrayResponse(result, phone);
  if (dataObj) {
    console.log("[DEBUG] 최신 데이터:", dataObj);
  }
}

// ✅ 서비스워커 등록
// if ("serviceWorker" in navigator) {
//  navigator.serviceWorker.register("service-worker.js");
// }
</script>

</body>
</html>
