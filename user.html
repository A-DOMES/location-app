<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>A-DOMES | 위치 정보 시스템</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="manifest" href="manifest.json">

<style>
/* =========================== ✅ 전체 body 기본 스타일 =========================== */
body {
  font-family: Arial, sans-serif;   /* 글꼴 */
  font-size: 18px;                  /* 기본 글자 크기 */
  background-color: #f0f4f8;        /* 배경색 */
  margin: 0;                        /* 기본 여백 제거 */
  color: #333;                      /* 글자색 */
  display: flex;                    /* 중앙 정렬을 위한 flex */
  justify-content: center;          /* 가로 중앙 정렬 */
  align-items: center;              /* ✅ PC에서는 세로 중앙 정렬 */
  min-height: 100vh;                /* 화면 전체 높이 */
  padding: 12px;                    /* 화면 여백 */
}

/* =========================== ✅ 메인 카드 영역 =========================== */
.main-card {
  border: 2px solid #1976d2;        /* 파란색 테두리 */
  border-radius: 12px;              /* 모서리 둥글게 */
  background: #fff;                 /* 흰색 배경 */
  max-width: 520px;                 /* ✅ PC에서는 널찍하게 */
  width: 100%;                      /* 화면 폭 전체 */
  padding: 20px;                    /* 내부 여백 */
  box-shadow: 0 6px 16px rgba(0,0,0,0.15); /* 그림자 */
}

/* =========================== ✅ 헤더 영역 =========================== */
header {
  background-color: #1976d2;        /* 파란색 배경 */
  padding: 10px;                    /* 내부 여백 */
  text-align: center;               /* 가운데 정렬 */
  border-radius: 8px;               /* 모서리 둥글게 */
  margin-bottom: 14px;              /* 아래쪽 여백 */
}
header h2 {
  font-size: 24px;                  /* 제목 글자 크기 */
  margin: 0;                        /* 기본 여백 제거 */
  font-weight: bold;                /* 굵은 글씨 */
  color: #fff;                      /* 흰색 글자 */
}

/* =========================== ✅ 정보 박스 =========================== */
.info-box {
  border: 2px solid #1976d2;        /* 파란색 테두리 */
  border-radius: 10px;              /* 모서리 둥글게 */
  background-color: #e3f2fd;        /* 연한 파란색 배경 */
  padding: 14px;                    /* 내부 여백 */
  margin: 14px 0;                   /* 위아래 여백 */
  font-size: 17px;                  /* 글자 크기 */
  line-height: 1.5;                 /* 줄 간격 */
}
.info-box h3 {
  margin-top: 2px;                  /* 위쪽 여백 */
  margin-bottom: 2px;               /* 아래쪽 여백 */
  color: #1565c0;                   /* 진한 파란색 글자 */
  font-size: 18px;                  /* 소제목 글자 크기 */
}
.info-box p {
  margin-top: 2px;                  /* 위쪽 여백 */
  margin-bottom: 8px;               /* 아래쪽 여백 */
}

/* =========================== ✅ 주요 기능 박스 (배경색 제거) =========================== */
.info-box.features {
  background-color: transparent;    /* 배경색 없음 */
  border: none;                     /* 테두리 없음 */
}

/* =========================== ✅ 설명/경고 텍스트 =========================== */
.desc { display:block; margin-top:6px; font-size:15px; } /* 설명 텍스트 */
.warning {
  display:block;                    /* 블록 표시 */
  margin-top:6px;                   /* 위쪽 여백 */
  font-size:18px;                   /* 글자 크기 */
  color:#d32f2f;                    /* 빨간색 글자 */
  font-weight:bold;                 /* 굵게 */
  white-space:nowrap;               /* 줄바꿈 없음 */
}

/* =========================== ✅ 입력창 + 지도 버튼 그룹 =========================== */
.input-group {
  display:flex;                     /* 가로 배치 */
  align-items:center;               /* 세로 중앙 정렬 */
  gap:10px;                         /* 요소 간격 */
  margin-bottom:12px;               /* 아래쪽 여백 */
}
input[type="text"] {
  margin-left:50px;                 /* 좌측 여백 */
  width:310px;                      /* 입력창 폭 */
  height:40px;                      /* 입력창 높이 */
  font-size:18px;                   /* 글자 크기 */
  padding:8px;                      /* 내부 여백 */
  border:2px solid #1976d2;         /* 파란색 테두리 */
  border-radius:6px;                /* 모서리 둥글게 */
  box-sizing:border-box;            /* 박스 크기 계산 방식 */
}

/* =========================== ✅ 지도 버튼 =========================== */
.map-btn {
  margin-left:20px;                 /* 좌측 여백 */
  width:90px; height:90px;          /* 버튼 크기 */
  border-radius:12px;               /* 모서리 둥글게 */
  background:linear-gradient(to bottom, #64b5f6, #1976d2); /* 파란색 그라데이션 */
  box-shadow:0 4px 8px rgba(0,0,0,0.2); /* 그림자 */
  cursor:pointer;                   /* 커서 모양 */
  transition:transform 0.2s ease, background 0.3s ease; /* 애니메이션 */
}
.map-btn:hover {
  background:linear-gradient(to bottom, #90caf9, #1565c0); /* 호버 시 밝게 */
  transform:scale(1.05);            /* 살짝 커짐 */
}

/* =========================== ✅ 위치 전송 / 해제 버튼 =========================== */
#sendBtn, #stopBtn {
  margin-left:0; margin-right:auto;
  width:240px;                      /* ✅ 버튼 폭 줄임 */
  height:60px;                      /* ✅ 버튼 높이 키움 */
  font-size:18px;                   /* 글자 크기 */
  border:none;                      /* 테두리 없음 */
  border-radius:8px;                /* 모서리 둥글게 */
  cursor:pointer;                   /* 커서 모양 */
  color:white;                      /* 글자색 흰색 */
  margin-bottom:6px;                /* 아래쪽 여백 */
  display:block;                    /* 블록 표시 */
  transition:transform 0.2s ease, background 0.3s ease; /* ✅ 호버 애니메이션 */
}
#sendBtn {
  background:linear-gradient(to bottom, #42a5f5, #1976d2);
  margin-top:20px;
}
#stopBtn {
  background:linear-gradient(to bottom, #ef5350, #f44336);
  margin-top:10px;
}
/* ✅ hover 시: 버튼이 위로 올라오면서 커짐 */
#sendBtn:hover, #stopBtn:hover {
  transform:translateY(-3px) scale(1.05);
}
/* ✅ active(클릭 순간)와 focus(클릭 후 포커스 유지) 시: 원래 크기로 복귀 */
#sendBtn:active, #stopBtn:active,
#sendBtn:focus, #stopBtn:focus {
  transform:none;
}

/* =========================== ✅ 모달창 전체 영역 (PC용) =========================== */
.modal {
  position:fixed; left:0; top:0;
  width:100%; height:100%;
  background-color:rgba(0,0,0,0.4); /* 반투명 배경 */
  z-index:1000;
  display:flex;
  justify-content:center;           /* 가로 중앙 */
  align-items:center;               /* ✅ PC에서는 화면 중앙 */
}
.modal-content {
  background-color:#fefefe;
  padding:14px;
  border:2px solid #2196F3;
  border-radius:10px;
  width:80%;                        /* ✅ PC에서는 크게 */
  max-width:520px;                  /* ✅ 폭 제한 넓게 */
  text-align:center;
  font-size:20px;                   /* ✅ 글자도 크게 */
  background:linear-gradient(135deg, #e3f2fd, #bbdefb);
  box-shadow:0 6px 16px rgba(0,0,0,0.2);
  margin:0 auto;
  margin-top:2px;
}

/* =========================== ✅ 모바일 대응 =========================== */
@media (max-width: 480px) {
  .modal-content {
    width: 90%;          /* 모바일에서는 화면 폭의 90%만 사용 */
    max-width: 360px;    /* 최대 폭 제한 (예: 360px) */
    font-size: 16px;     /* 글자 크기 줄임 */
    padding: 10px;       /* 내부 여백 줄임 */
    margin-top: 40px;    /* 모바일에서는 위쪽으로 조금 내림 */
  }
}


</style>
</head>
  
<body>
<div class="main-card">
  <!-- ✅ 헤더 -->
  <header>
    <h2>A-DOMES | 위치 전송</h2>
  </header>

  <!-- ✅ 입력창 및 구글 지도 버튼 -->
  <section class="info-box">
    <form id="locationForm" method="POST">
      <div class="input-group" style="margin-left:8px;">
        <!-- 구글 지도 버튼 (현재 상태 그대로) -->
        <a href="client.html" target="_blank" id="mapBtn" 
           style="visibility:hidden; margin-right:4px;">
          <img src="btn-current.png" alt="구글 지도 버튼" class="map-btn">
        </a>

        <!-- 텍스트 입력창 (우측으로 3px 이동) -->
        <input type="text" name="phone" id="phone" 
               placeholder="회원가입 닉네임 또는 전화번호 입력"
               style="width:310px; height:40px; margin-left:17px;">
      </div>

      <!-- ✅ 국토부 아이콘 + 위치 전송/해제 버튼 레이아웃 -->
      <div style="display:flex; align-items:flex-start; gap:28px; margin-top:28px; margin-left:4px;">
        <!-- 국토부 아이콘 (현재 상태 그대로) -->
        <a href="geoportal.html" target="_blank" id="guktoBtn" style="margin-right:6px;">
          <img src="Copilot-map.png" alt="국토부 지도 버튼" class="map-btn" 
               style="width:90px; height:90px; object-fit:cover; margin-top:16px;">
        </a>

        <!-- 위치 전송/해제 버튼 (우측으로 3px 이동) -->
        <div style="display:flex; flex-direction:column; gap:2px;">
          <button type="button" id="sendBtn" onclick="sendLocation()" 
                  style="width:310px; height:60px; margin-left:3px;">위치 전송</button>
          <button type="button" id="stopBtn" onclick="stopLocation()" 
                  style="width:310px; height:60px; margin-left:3px;">위치정보 해제</button>
        </div>
      </div>
    </form>
  </section>

  <!-- ✅ 주요 기능 (배경색 없음) -->
  <section class="info-box features">
    <h3>주요 기능</h3>
    <p>
      📡 나의 현재 위치 전송 및 자동 갱신<br>
      🗺️ 전국 지도 검색 및 직선 거리 확인<br>
      🏢 국토부 지도 및 부동산 정보 확인<br>
      👥 회원 이름으로 상대 위치 확인<br>
      🚸 보호구역 · 속도제한 · 기타 알림<br>
      <span class="desc">위치전송 버튼을 누르면 입력한 값과 현재 위치가 사용자 서버에 기록됩니다.</span>
      <span class="warning">📱 위치 전송을 위해 화면을 유지하세요!</span>
    </p>
  </section>

  <!-- ✅ 지도 표시 영역 -->
  <div id="map"></div>
</div>
  
<!-- config.js 불러오기 -->
<script src="config.js"></script>

<script>
let intervalId;

// ✅ 모달 표시/닫기
function showModal(message, autoClose = false) {
  document.querySelectorAll(".modal").forEach(m => m.remove());
  const modal = document.createElement("div");
  modal.className = "modal";
  const content = document.createElement("div");
  content.className = "modal-content";
  content.innerText = message;
  modal.appendChild(content);
  document.body.appendChild(modal);
  modal.style.display = "block";
  if (autoClose) setTimeout(() => { modal.remove(); }, 2000);
}
function closeModal() {
  document.querySelectorAll(".modal").forEach(m => m.remove());
}

// ✅ JSONP 호출 헬퍼
function callJSONP(url, callbackName) {
  const finalUrl = url + "&callback=" + callbackName;
  console.log("[DEBUG] JSONP 호출 URL:", finalUrl);

  const script = document.createElement("script");
  script.src = finalUrl;
  script.onload = () => console.log("[DEBUG] JSONP 로드 성공:", finalUrl);
  script.onerror = () => console.error("[DEBUG] JSONP 로드 실패:", finalUrl);
  document.body.appendChild(script);
}

// ✅ 페이지 로드 시 토큰 검증
window.onload = function() {
  // ✅ 닉네임을 phone 입력란에 표시
  const nickname = localStorage.getItem("nickname");
  if (nickname && nickname !== "undefined") {
    document.getElementById("phone").value = nickname;
  }

  document.getElementById("mapBtn").style.visibility = "hidden";

  const token = sessionStorage.getItem("token");
  console.log("[DEBUG] 초기 토큰:", token);

  if (!token) {
    showModal("로그인이 필요합니다.\n로그인 페이지로 이동합니다...", true);
    setTimeout(() => { window.location.href = "index.html"; }, 2000);
    return;
  }

  const verifyUrl = CONFIG.USER_URL
                  + "?mode=verifyToken"
                  + "&token=" + encodeURIComponent(token);
  callJSONP(verifyUrl, "handleVerifyToken");
};

function handleVerifyToken(result) {
  console.log("[DEBUG] verifyToken 응답:", result);
  if (result.result !== "success") {
    showModal("토큰이 유효하지 않습니다.\n다시 로그인하세요.", true);
    setTimeout(() => { window.location.href = "index.html"; }, 2000);
  }
}

// ✅ 배열 응답에서 닉네임과 phone 값 매칭
function parseArrayResponse(arr, nickname) {
  if (!Array.isArray(arr) || arr.length === 0) return null;

  const normalizedNickname = (nickname || "").trim().toLowerCase();

  return arr.find(row => {
    const rowPhone = (row.phone || "").trim().toLowerCase();
    return rowPhone === normalizedNickname;
  }) || null;
}

// ✅ 위치 해제 응답 처리 함수
function handleStopLocation(result) {
  console.log("[DEBUG] handleStopLocation 응답:", result);

  // phone input에 실제로 nickname이 들어있으므로 그대로 사용
  const nickname = document.getElementById("phone").value;

  // 응답 배열에서 nickname으로 매칭
  const dataObj = parseArrayResponse(result, nickname);

  // 모달 닫기
  closeModal();

  // 매칭된 객체가 있고 status가 "해제"라면 정상 처리
  if (dataObj && dataObj.status === "해제") {
    showModal("🛑 위치정보가 해제되었습니다.", true);
    document.getElementById("mapBtn").style.display = "none";
  } else {
    // 매칭 실패 시 오류 메시지 출력
    showModal("처리 중 오류 발생:\n" + (dataObj ? dataObj.status : "응답 오류"), true);
  }
}


// ✅ 위치 전송
function sendLocation() {
  showModal("위치정보 전송 중입니다...\n잠시만 기다려주세요.");

  const token = sessionStorage.getItem("token");
  const phoneInput = document.getElementById("phone").value.trim();
  const nickname = localStorage.getItem("nickname");

  // 🚫 원천 차단: 닉네임과 토큰 검증
  if (!token) {
    closeModal();
    showModal("❌ 토큰이 유효하지 않습니다.\n다시 로그인하세요.", true);
    return;
  }
  if (!nickname || nickname.toLowerCase() !== phoneInput.toLowerCase()) {
    closeModal();
    showModal("❌ 닉네임 값이 로그인 시점과 다릅니다.\n위치 전송을 할 수 없습니다.", true);
    return;
  }

  navigator.geolocation.getCurrentPosition(function(position) {
    const params = new URLSearchParams({
      phone: phoneInput,
      status: "정상",
      lat: position.coords.latitude,
      lng: position.coords.longitude,
      time: new Date().toISOString(),
      token: token,
      mode: "login"   // ✅ 로그인 모드 지정
    });

    fetch(CONFIG.ADMIN_URL, {
      method: "POST",
      body: params
    })
    .then(res => res.json())
    .then(result => handleSendLocation(result))
    .catch(err => {
      closeModal();
      showModal("전송 오류: " + err.message, true);
    });
  }, function(error) {
    closeModal();
    showModal("위치 정보를 가져오지 못했습니다:\n" + error.message, true);
  });
}


function handleSendLocation(result) {
  console.log("[DEBUG] handleSendLocation 응답:", result);

  const phone = document.getElementById("phone").value;
  const dataObj = parseArrayResponse(result, phone);

  closeModal();
  if (dataObj && dataObj.status === "정상") {
    showModal("✅ 위치정보가 성공적으로 재갱신되었습니다.", true);
    document.getElementById("mapBtn").style.visibility = "visible";
    document.getElementById("mapBtn").style.pointerEvents = "auto";
    if (!intervalId) intervalId = setInterval(autoUpdate, 5 * 60 * 1000);
  } else {
    showModal("✅ 위치정보를 서버에 저장하였습니다.", true);
    document.getElementById("mapBtn").style.visibility = "visible";
    document.getElementById("mapBtn").style.pointerEvents = "auto";
    if (!intervalId) intervalId = setInterval(autoUpdate, 5 * 60 * 1000);
  }
}

// ✅ 위치 해제 (fetch POST로 수정)
function stopLocation() {
  showModal("위치정보 해제 처리 중입니다...\n잠시만 기다려주세요.");
  clearInterval(intervalId); intervalId = null;

  const token = sessionStorage.getItem("token");
  const phone = document.getElementById("phone").value;

  // ✅ POST 요청으로 관리자 서버에 해제 상태 전달
  const params = new URLSearchParams({
    phone: phone,
    status: "해제",
    time: new Date().toISOString(),
    token: token
  });

  fetch(CONFIG.ADMIN_URL, {
    method: "POST",
    body: params
  })
  .then(res => res.json())
  .then(result => handleStopLocation(result))
  .catch(err => {
    closeModal();
    showModal("해제 오류: " + err.message, true);
  });
}

// ✅ 위치 해제 응답 처리
function handleStopLocation(result) {
  console.log("[DEBUG] handleStopLocation 응답:", result);

  const nickname = document.getElementById("phone").value.trim();
  let dataObj = null;

  // 응답이 배열일 경우
  if (Array.isArray(result)) {
    dataObj = parseArrayResponse(result, nickname);
  }

  // 응답이 객체일 경우
  if (result.result) {
    if (result.result === "success") {
      showModal("🛑 위치정보가 해제되었습니다.", true);
      const mapBtn = document.getElementById("mapBtn");
      mapBtn.style.visibility = "hidden";
      mapBtn.style.pointerEvents = "none";
      return;
    } else {
      showModal("❌ " + result.message, true);
      return;
    }
  }

  // 배열에서 찾은 경우 처리
  if (dataObj && dataObj.status === "해제") {
    showModal("🛑 위치정보가 해제되었습니다.", true);
    const mapBtn = document.getElementById("mapBtn");
    mapBtn.style.visibility = "hidden";
    mapBtn.style.pointerEvents = "none";
  } else {
    showModal("처리 중 오류 발생:\n" + (dataObj ? dataObj.status : "응답 오류"), true);
  }
}

// ✅ 자동 갱신
function autoUpdate() {
  if (!navigator.geolocation) return;
  navigator.geolocation.getCurrentPosition(function(position) {
    console.log("[DEBUG] autoUpdate 좌표:", position.coords.latitude, position.coords.longitude);

    const token = sessionStorage.getItem("token");
    const phone = document.getElementById("phone").value;

    const url = CONFIG.ADMIN_URL
              + "?phone=" + encodeURIComponent(phone)
              + "&status=정상"
              + "&lat=" + encodeURIComponent(position.coords.latitude)
              + "&lng=" + encodeURIComponent(position.coords.longitude)
              + "&time=" + encodeURIComponent(new Date().toISOString())
              + "&auto=true"
              + "&token=" + encodeURIComponent(token);

    callJSONP(url, "handleAutoUpdate");
  });
}

function handleAutoUpdate(result) {
  console.log("[DEBUG] autoUpdate 응답:", result);
  const phone = document.getElementById("phone").value;
  const dataObj = parseArrayResponse(result, phone);
  if (dataObj) {
    console.log("[DEBUG] 최신 데이터:", dataObj);
  }
}
