<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>A-DOMES | 사용자 위치 전송</title>
  <link rel="manifest" href="manifest.json">

  <style>
    body {
      font-family: Arial, sans-serif;
      font-size: 18px;
      background-color: #f9f9f9;
      margin: 0;
      color: #333;
    }
    header {
      background-color: #4CAF50;
      padding: 20px;
      text-align: center;
    }
    header h2 {
      font-size: 32px;
      margin: 0;
      font-weight: bold;
      color: #fff;
    }
    .info-box {
      border: 2px solid #4CAF50;
      border-radius: 10px;
      background-color: #e8f5e9;
      padding: 20px;
      margin: 40px auto;
      max-width: 700px;
      text-align: left;
      font-size: 20px;
      line-height: 1.4;
    }
    .info-box h3 { margin: 10px 0 5px 0; color: #2e7d32; }
    .warning { display: block; margin-top: 10px; font-size: 20px; color: #d32f2f; font-weight: bold; }
    .center-wrapper { display: flex; justify-content: center; margin-top: 20px; }
    .inner-group { text-align: left; }
    input[type="text"] {
      width: 400px; height: 30px; font-size: 20px;
      padding: 8px; margin-left: 140px; margin-bottom: 5px;
      border: 2px solid #4CAF50; border-radius: 6px; display: block;
    }
    .button-group {
      display: flex; justify-content: flex-start; align-items: center;
      margin-left: 1px; margin-top: 10px; gap: 40px;
    }
    .map-btn { width: 100px; height: 100px; cursor: pointer; }
    #sendBtn, #stopBtn {
      width: 200px; height: 50px; font-size: 20px;
      border: none; border-radius: 8px; cursor: pointer; color: white;
    }
    #sendBtn { background: linear-gradient(to bottom, #66bb6a, #4CAF50); }
    #stopBtn { background: linear-gradient(to bottom, #ef5350, #f44336); }
    .modal {
      display: none; position: fixed; z-index: 999;
      left: 0; top: 0; width: 100%; height: 100%;
      background-color: rgba(0,0,0,0.4);
    }
    .modal-content {
      background-color: #fefefe;
      margin: 15% auto; padding: 20px;
      border: 2px solid #4CAF50; border-radius: 10px;
      width: 80%; max-width: 400px; text-align: center; font-size: 18px;
      background: linear-gradient(135deg, #e8f5e9, #c8e6c9);
    }
  </style>
</head>

<body>
  <header>
    <h2>A-DOMES | 사용자 위치 전송</h2>
  </header>

  <section class="info-box">
    <h3>앱 목적</h3>
    <p>이 앱은 사용자의 현재 위치 정보를 서버에 기록하기 위해 만들어졌습니다.</p>
    <h3>사용 방법</h3>
    <p>
      입력란의 사용할 입력값은 고유값이며 잃어버린 경우 서비스를 제공하지 않습니다.<br>
      위치 전송 버튼을 누르면 입력한 값과 현재 위치가 사용자 서버에 기록됩니다.<br>
      화면을 켜 두시면 5분마다 자동으로 위치가 갱신됩니다.
    </p>
    <span class="warning">📱 위치 전송을 위해 화면을 끄지 마세요!</span>
  </section>

  <!-- ✅ 사용자 입력창 -->
  <form id="locationForm" method="POST">
    <div class="center-wrapper">
      <div class="inner-group">
        <input type="text" name="phone" id="phone" placeholder="회원가입 닉네임 또는 아이디를 입력하세요">
        <div class="button-group">
          <!-- ✅ 지도 버튼 -->
          <a href="client.html" target="_blank" id="mapBtn" style="visibility:hidden;">
            <img src="btn-current.png" alt="지도 버튼" class="map-btn">
          </a>
          <!-- ✅ 위치 전송 버튼 -->
          <button type="button" id="sendBtn" onclick="sendLocation()">위치 전송</button>
          <!-- ✅ 위치정보 해제 버튼 -->
          <button type="button" id="stopBtn" onclick="stopLocation()">위치정보 해제</button>
        </div>
      </div>
    </div>
  </form>

  <div id="map"></div>

<!-- config.js 불러오기 -->
<script src="config.js"></script>

<script>
let intervalId;

// ✅ 모달 표시/닫기
function showModal(message, autoClose = false) {
  document.querySelectorAll(".modal").forEach(m => m.remove());
  const modal = document.createElement("div");
  modal.className = "modal";
  const content = document.createElement("div");
  content.className = "modal-content";
  content.innerText = message;
  modal.appendChild(content);
  document.body.appendChild(modal);
  modal.style.display = "block";
  if (autoClose) setTimeout(() => { modal.remove(); }, 2000);
}
function closeModal() {
  document.querySelectorAll(".modal").forEach(m => m.remove());
}

// ✅ 페이지 로드 시 토큰 검증 (GET 방식)
window.onload = function() {
  const token = sessionStorage.getItem("token");
  if (!token) {
    showModal("로그인이 필요합니다.\n로그인 페이지로 이동합니다...", true);
    setTimeout(() => { window.location.href = "index.html"; }, 2000);
    return;
  }

  const params = new URLSearchParams({ mode: "verifyToken", token });
  // 👉 GAS 웹앱 같은 도메인에서 실행되므로 CORS 문제 없음
  fetch(`${CONFIG.USER_URL}?${params.toString()}`)
    .then(res => res.json())
    .then(result => {
      if (result.result !== "success") {
        showModal("토큰이 유효하지 않습니다.\n다시 로그인하세요.", true);
        setTimeout(() => { window.location.href = "index.html"; }, 2000);
      }
    })
    .catch(err => {
      showModal("토큰 검증 오류: " + err.message, true);
      setTimeout(() => { window.location.href = "index.html"; }, 2000);
    });
};

// ✅ 위치 전송 (GET 방식)
function sendLocation() {
  const phone = document.getElementById("phone").value.trim();
  if (!phone) {
    showModal("📌 입력값이 없습니다.\n위치전송에 사용 할 고유값을 입력하세요.", true);
    return;
  }

  showModal("위치정보 전송 중입니다...\n잠시만 기다려주세요.");

  const token = sessionStorage.getItem("token");
  if (!navigator.geolocation) {
    showModal("이 브라우저에서는 위치 정보를 지원하지 않습니다.", true);
    return;
  }

  navigator.geolocation.getCurrentPosition(function(position) {
    const params = new URLSearchParams({
      mode: "checkOrInsert",
      phone: phone,
      status: "정상",
      lat: position.coords.latitude,
      lng: position.coords.longitude,
      time: new Date().toISOString(),
      token: token
    });

    fetch(`${CONFIG.USER_URL}?${params.toString()}`)
      .then(res => res.json())
      .then(() => {
        closeModal();
        showModal("✅ 위치정보가 성공적으로 전송되었습니다.", true);
        document.getElementById("mapBtn").style.visibility = "visible";
        if (!intervalId) intervalId = setInterval(autoUpdate, CONFIG.DEFAULT_INTERVAL);
      })
      .catch(err => {
        closeModal();
        showModal("전송 오류: " + err.message, true);
      });
  }, function(error) {
    closeModal();
    showModal("위치 정보를 가져오지 못했습니다:\n" + error.message, true);
  });
}

// ✅ 위치 해제 (GET 방식)
function stopLocation() {
  const phone = document.getElementById("phone").value.trim();
  if (!phone) {
    showModal("📌 입력값이 없습니다.\n위치해제에 사용 할 고유값을 입력하세요.", true);
    return;
  }

  showModal("위치정보 해제 처리 중입니다...\n잠시만 기다려주세요.");
  clearInterval(intervalId); intervalId = null;

  const token = sessionStorage.getItem("token");
  const params = new URLSearchParams({
    mode: "stop",
    phone: phone,
    status: "해제",
    time: new Date().toISOString(),
    token: token
  });

  fetch(`${CONFIG.USER_URL}?${params.toString()}`)
    .then(res => res.json())
    .then(() => {
      closeModal();
      showModal("🛑 위치정보가 해제되었습니다.", true);
      document.getElementById("mapBtn").style.visibility = "hidden";
    })
    .catch(err => {
      closeModal();
      showModal("처리 중 오류 발생:\n" + err.message, true);
    });
}

// ✅ 자동 갱신 (GET 방식)
function autoUpdate() {
  if (!navigator.geolocation) return;
  navigator.geolocation.getCurrentPosition(function(position) {
    const token = sessionStorage.getItem("token");
    const phone = document.getElementById("phone").value.trim();

    const params = new URLSearchParams({
      mode: "autoUpdate",
      phone: phone,
      status: "정상",
      lat: position.coords.latitude,
      lng: position.coords.longitude,
      time: new Date().toISOString(),
      auto: "true",
      token: token
    });

    fetch(`${CONFIG.USER_URL}?${params.toString()}`)
      .then(() => { /* 자동 갱신은 응답만 받으면 됨 */ });
  });
}

// ✅ 서비스워커 등록
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("service-worker.js");
}
</script>
</body>
</html>
