<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>A-DOMES | 사용자 위치 전송</title>
  <link rel="manifest" href="manifest.json">

  <style>
    body {
      font-family: Arial, sans-serif;
      font-size: 18px;
      background-color: #f9f9f9;
      margin: 0;
      color: #333;
    }
    header {
      background-color: #4CAF50;
      padding: 20px;
      text-align: center;
    }
    header h2 {
      font-size: 32px;
      margin: 0;
      font-weight: bold;
      color: #fff;
    }
    .info-box {
      border: 2px solid #4CAF50;
      border-radius: 10px;
      background-color: #e8f5e9;
      padding: 20px;
      margin: 40px auto;
      max-width: 620px;
      text-align: left;
      font-size: 20px;
      line-height: 1.4;
    }
    .info-box h3 { margin: 10px 0 5px 0; color: #2e7d32; }
    .warning { display: block; margin-top: 10px; font-size: 20px; color: #d32f2f; font-weight: bold; }
    .center-wrapper { display: flex; justify-content: center; margin-top: 20px; }
    .inner-group { text-align: left; }
    input[type="text"] {
      width: 400px; height: 30px; font-size: 20px;
      padding: 8px; margin-left: 140px; margin-bottom: 5px;
      border: 2px solid #4CAF50; border-radius: 6px; display: block;
    }
    .button-group {
      display: flex; justify-content: flex-start; align-items: center;
      margin-left: 1px; margin-top: 10px; gap: 40px;
    }
    .map-btn { width: 100px; height: 100px; cursor: pointer; }
    #sendBtn, #stopBtn {
      width: 200px; height: 50px; font-size: 20px;
      border: none; border-radius: 8px; cursor: pointer; color: white;
    }
    #sendBtn { background: linear-gradient(to bottom, #66bb6a, #4CAF50); }
    #stopBtn { background: linear-gradient(to bottom, #ef5350, #f44336); }
    .modal {
      display: none; position: fixed; z-index: 999;
      left: 0; top: 0; width: 100%; height: 100%;
      background-color: rgba(0,0,0,0.4);
    }
    .modal-content {
      background-color: #fefefe;
      margin: 15% auto; padding: 20px;
      border: 2px solid #4CAF50; border-radius: 10px;
      width: 80%; max-width: 400px; text-align: center; font-size: 18px;
      background: linear-gradient(135deg, #e8f5e9, #c8e6c9);
    }
  </style>
</head>

<body>
  <header>
    <h2>A-DOMES | 사용자 위치 전송</h2>
  </header>

  <section class="info-box">
    <h3>앱 목적</h3>
    <p>이 앱은 사용자의 현재 위치 정보를 서버에 기록하기 위해 만들어졌습니다.</p>
    <h3>사용 방법</h3>
    <p>
      전화번호 또는 이름을 입력하세요.<br>
      위치 전송 버튼을 누르면 입력한 값과 현재 위치가 사용자 서버에 기록됩니다.<br>
      화면을 켜 두시면 5분마다 자동으로 위치가 갱신됩니다.
    </p>
    <span class="warning">📱 위치 전송을 위해 화면을 끄지 마세요!</span>
  </section>

  <!-- ✅ 사용자 입력창 -->
  <form id="locationForm"
        action="https://script.google.com/macros/s/AKfycbyZLHG8TJYXdlvFacENYfFgW5tPPJ9XK0NznDQSxT9tTWAFPcmJshp2Ap8OQyNTf3zDLA/exec"
        method="POST">
    <div class="center-wrapper">
      <div class="inner-group">
        <input type="text" name="phone" id="phone" placeholder="전화번호 또는 이름 입력">
        <div class="button-group">
          <!-- ✅ 지도 버튼: 기본은 숨김 상태, id="mapBtn"으로 스크립트에서 제어 -->
          <!-- 위치정보 전송 성공 시에만 나타나고, 해제 시 다시 사라지도록 처리 -->
          <a href="client.html" target="_blank" id="mapBtn" style="display:none;">
            <img src="btn-current.png" alt="지도 버튼" class="map-btn">
          </a>
        
          <!-- ✅ 위치 전송 버튼 -->
          <button type="button" id="sendBtn" onclick="sendLocation()">위치 전송</button>
        
          <!-- ✅ 위치정보 해제 버튼 -->
          <button type="button" id="stopBtn" onclick="stopLocation()">위치정보 해제</button>
        </div>
      </div>
    </div>
  </form>

  <div id="map"></div>
  
  <!-- config.js 불러오기 -->
  <script src="config.js"></script>


<script>
  let intervalId;

  function showModal(message, autoClose = false) {
    document.querySelectorAll(".modal").forEach(m => m.remove());
    const modal = document.createElement("div");
    modal.className = "modal";
    const content = document.createElement("div");
    content.className = "modal-content";
    content.innerText = message;
    modal.appendChild(content);
    document.body.appendChild(modal);
    modal.style.display = "block";
    if (autoClose) setTimeout(() => { modal.remove(); }, 2000);
  }
  function closeModal() {
    document.querySelectorAll(".modal").forEach(m => m.remove());
  }

  // ✅ 위치 전송 (사용자 서버 → 관리자 서버)
  function sendLocation() {
    showModal("위치정보 전송 중입니다...\n잠시만 기다려주세요.");

    const userUrl = CONFIG.USER_URL;
    const adminUrl = CONFIG.ADMIN_URL;
    const verifyCallback = "jsonpVerify_" + Date.now();

    // 1️⃣ 사용자 서버에서 토큰 검증
    window[verifyCallback] = function(verifyResult) {
      if (verifyResult.result !== "success") {
        closeModal();
        showModal("사용자 인증 실패:\n" + (verifyResult.message || ""), true);
        delete window[verifyCallback];
        return;
      }

      const token = sessionStorage.getItem("token");

      // 2️⃣ 관리자 서버 호출
      const adminCallback = "jsonpAdmin_" + Date.now();
      window[adminCallback] = function(result) {
        closeModal();
        if (result.result === "success") {
          showModal("✅ 위치정보가 성공적으로 기록되었습니다.", true);
          document.getElementById("mapBtn").style.display = "inline-block";
          if (!intervalId) intervalId = setInterval(autoUpdate, 5 * 60 * 1000);
        } else {
          showModal("위치 전송 실패:\n" + (result.message || ""), true);
        }
        delete window[adminCallback];
      };

      navigator.geolocation.getCurrentPosition(function(position) {
        const params = new URLSearchParams();
        params.append("phone", document.getElementById("phone").value);
        params.append("status", "정상");
        params.append("lat", position.coords.latitude || 0);
        params.append("lng", position.coords.longitude || 0);
        params.append("time", new Date().toISOString());
        params.append("token", token);
        params.append("callback", adminCallback);

        const script = document.createElement("script");
        script.src = adminUrl + "?" + params.toString();
        document.body.appendChild(script);
      }, function(error) {
        closeModal();
        showModal("위치 정보를 가져오지 못했습니다:\n" + error.message, true);
      });
    };

    // 사용자 서버에 토큰 검증 요청
    const script = document.createElement("script");
    script.src = `${userUrl}?mode=verifyToken&token=${sessionStorage.getItem("token")}&callback=${verifyCallback}`;
    document.body.appendChild(script);
  }

  // ✅ 위치 해제 (관리자 서버 호출)
  function stopLocation() {
    showModal("위치정보 해제 처리 중입니다...\n잠시만 기다려주세요.");
    clearInterval(intervalId); intervalId = null;

    const callbackName = "jsonpStop_" + Date.now();
    window[callbackName] = function(result) {
      closeModal();
      if (result.result === "success") {
        showModal("🛑 위치정보가 해제되었습니다.", true);
        document.getElementById("mapBtn").style.display = "none";
      } else {
        showModal("처리 중 오류 발생:\n" + result.message, true);
      }
      delete window[callbackName];
    };

    const params = new URLSearchParams();
    params.append("phone", document.getElementById("phone").value);
    params.append("status", "해제");
    params.append("time", new Date().toISOString());
    params.append("token", sessionStorage.getItem("token"));
    params.append("callback", callbackName);

    const script = document.createElement("script");
    script.src = CONFIG.ADMIN_URL + "?" + params.toString();
    document.body.appendChild(script);
  }

  // ✅ 자동 갱신 (관리자 서버 호출)
  function autoUpdate() {
    if (!navigator.geolocation) return;
    navigator.geolocation.getCurrentPosition(function(position) {
      const callbackName = "jsonpAuto_" + Date.now();
      window[callbackName] = function(result) {
        console.log("[DEBUG] autoUpdate 응답:", result);
        delete window[callbackName];
      };

      const params = new URLSearchParams();
      params.append("phone", document.getElementById("phone").value);
      params.append("status", "정상");
      params.append("lat", position.coords.latitude || 0);
      params.append("lng", position.coords.longitude || 0);
      params.append("time", new Date().toISOString());
      params.append("auto", "true");
      params.append("token", sessionStorage.getItem("token"));
      params.append("callback", callbackName);

      const script = document.createElement("script");
      script.src = CONFIG.ADMIN_URL + "?" + params.toString();
      document.body.appendChild(script);
    });
  }

  if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("service-worker.js");
  }

  window.onload = function() {
    const savedId = sessionStorage.getItem("userId");
    if (savedId) document.getElementById("phone").value = savedId;
    document.getElementById("mapBtn").style.display = "none";
  };
</script>
</body>
</html>
