<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>A-DOMES | 위치 정보 시스템</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="manifest" href="manifest.json">

  <style>
    body {
      font-family: Arial, sans-serif;
      font-size: 18px;
      background-color: #f0f4f8;
      margin: 0;
      color: #333;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
      padding: 12px;
    }

    .main-card {
      border: 2px solid #1976d2;
      border-radius: 12px;
      background: #fff;
      max-width: 600px;   /* ✅ PC에서도 명함카드처럼 제한 */
      width: 100%;
      padding: 20px;
      box-shadow: 0 6px 16px rgba(0,0,0,0.15);
    }

    header {
      background-color: #1976d2;
      padding: 10px;
      text-align: center;
      border-radius: 8px;
      margin-bottom: 14px;
    }

    header h2 {
      font-size: 24px;
      margin: 0;
      font-weight: bold;
      color: #fff;
    }

    .info-box {
      border: 2px solid #1976d2;
      border-radius: 10px;
      background-color: #e3f2fd;
      padding: 14px;
      margin: 14px 0;
      font-size: 17px;
      line-height: 1.5;
    }

    .info-box h3 {
      margin-top: 2px;
      margin-bottom: 2px;
      color: #1565c0;
      font-size: 18px;
    }

    .info-box p {
      margin-top: 2px;
      margin-bottom: 8px;
    }

    .desc {
      display: block;
      margin-top: 6px;
      font-size: 15px;
    }

    .warning {
      display: block;
      margin-top: 4px;
      font-size: 16px;
      color: #d32f2f;
      font-weight: bold;
      white-space: nowrap;
    }

    /* 입력창 + 지도 버튼 그룹 */
    .input-group {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
    }

/* 입력창 */
input[type="text"] {
  /* 좌측으로 이동 */
  margin-left: 17;        /* ✅ 좌측에 붙임 */
  margin-right: auto;    /* ✅ 오른쪽 여백 자동 */

  /* 폭은 네가 직접 조정 */
  width: 70%;            /* ✅ 여기 값을 네가 원하는 대로 줄여서 맞추면 됨 */
  max-width: 70%;        /* ✅ 버튼 끝자락과 맞추려면 이 값 조정 */

  height: 40px;
  font-size: 18px;
  padding: 8px;
  border: 2px solid #1976d2;
  border-radius: 6px;
  box-sizing: border-box;
}

    .map-btn {
      width: 70px;
      height: 70px;
      cursor: pointer;
    }

/* 위치 전송 / 해제 버튼 */
#sendBtn, #stopBtn {
  margin-left: 0;        /* ✅ 좌측에 붙임 */
  margin-right: auto;    /* ✅ 오른쪽 여백 자동 */

  width: 70%;            /* ✅ 텍스트박스와 동일하게 맞추면 끝자락이 일치 */
  height: 50px;
  font-size: 18px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  color: white;
  margin-bottom: 6px;
  display: block;
}

    #sendBtn {
      background: linear-gradient(to bottom, #42a5f5, #1976d2);
    }

    #stopBtn {
      background: linear-gradient(to bottom, #ef5350, #f44336);
      margin-top: 4px;
    }

    /* 모달창 */
    .modal {
      position: fixed;
      left: 0; top: 0;
      width: 100%; height: 100%;
      background-color: rgba(0,0,0,0.4);
      z-index: 1000;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .modal-content {
      background-color: #fefefe;
      padding: 14px;
      border: 2px solid #2196F3;
      border-radius: 10px;
      width: 75%;
      max-width: 340px;
      text-align: center;
      font-size: 15px;
      background: linear-gradient(135deg, #e3f2fd, #bbdefb);
      box-shadow: 0 6px 16px rgba(0,0,0,0.2);
      margin: 0 auto;
    }

    /* 모바일 대응 */
    @media (max-width:767px) {
      header h2 { font-size: 22px; }
      .info-box { font-size: 15px; }
      .map-btn { width: 60px; height: 60px; }
      input[type="text"] { font-size: 14px; height: 32px; max-width: 65%; }
      #sendBtn, #stopBtn { font-size: 14px; height: 42px; width: 100%; max-width: none; }
      .warning { font-size: 14px; }
    }
  </style>
</head>

<body>
<div class="main-card">
  <header>
    <h2>A-DOMES | 위치 전송</h2>
  </header>

  <section class="info-box">
    <form id="locationForm" method="POST">
      <div class="input-group">
        <a href="client.html" target="_blank" id="mapBtn" style="visibility:hidden;">
          <img src="btn-current.png" alt="지도 버튼" class="map-btn">
        </a>
        <input type="text" name="phone" id="phone" placeholder="회원가입 닉네임 또는 전화번호 입력">
      </div>
      <button type="button" id="sendBtn" onclick="sendLocation()">위치 전송</button>
      <button type="button" id="stopBtn" onclick="stopLocation()">위치정보 해제</button>
    </form>
  </section>

  <section class="info-box">
    <h3>앱 목적</h3>
    <p>
      전국 어디든 목적지를 검색해 안전하게 길을 안내받을 수 있습니다.<br>
      내 위치를 기록하고 회원끼리 서로의 위치를 확인할 수 있습니다.
    </p>

    <h3>주요 기능</h3>
    <p>
      📡 나의 현재 위치 전송 및 자동 갱신<br>
      🗺️ 전국 지도 검색 및 직선 거리 확인<br>
      👥 회원 이름으로 상대 위치 확인<br>
      🚸 보호구역 · 속도제한 · 기타 알림<br>
      <span class="desc">위치전송 버튼을 누르면 입력한 값과 현재 위치가 사용자 서버에 기록됩니다.</span>
      <span class="warning">📱 위치 전송을 위해 화면을 끄지 마세요!</span>
    </p>
  </section>

  <div id="map"></div>
</div>

<!-- config.js 불러오기 -->
<script src="config.js"></script>

<script>
let intervalId;

// ✅ 모달 표시/닫기
function showModal(message, autoClose = false) {
  document.querySelectorAll(".modal").forEach(m => m.remove());
  const modal = document.createElement("div");
  modal.className = "modal";
  const content = document.createElement("div");
  content.className = "modal-content";
  content.innerText = message;
  modal.appendChild(content);
  document.body.appendChild(modal);
  modal.style.display = "block";
  if (autoClose) setTimeout(() => { modal.remove(); }, 2000);
}
function closeModal() {
  document.querySelectorAll(".modal").forEach(m => m.remove());
}

// ✅ JSONP 호출 헬퍼
function callJSONP(url, callbackName) {
  const finalUrl = url + "&callback=" + callbackName;
  console.log("[DEBUG] JSONP 호출 URL:", finalUrl);

  const script = document.createElement("script");
  script.src = finalUrl;
  script.onload = () => console.log("[DEBUG] JSONP 로드 성공:", finalUrl);
  script.onerror = () => console.error("[DEBUG] JSONP 로드 실패:", finalUrl);
  document.body.appendChild(script);
}

// ✅ 페이지 로드 시 토큰 검증
window.onload = function() {
  // ✅ 닉네임을 phone 입력란에 표시
  const nickname = localStorage.getItem("nickname");
  if (nickname && nickname !== "undefined") {
    document.getElementById("phone").value = nickname;
  }

  document.getElementById("mapBtn").style.visibility = "hidden";

  const token = sessionStorage.getItem("token");
  console.log("[DEBUG] 초기 토큰:", token);

  if (!token) {
    showModal("로그인이 필요합니다.\n로그인 페이지로 이동합니다...", true);
    setTimeout(() => { window.location.href = "index.html"; }, 2000);
    return;
  }

  const verifyUrl = CONFIG.USER_URL
                  + "?mode=verifyToken"
                  + "&token=" + encodeURIComponent(token);
  callJSONP(verifyUrl, "handleVerifyToken");
};

function handleVerifyToken(result) {
  console.log("[DEBUG] verifyToken 응답:", result);
  if (result.result !== "success") {
    showModal("토큰이 유효하지 않습니다.\n다시 로그인하세요.", true);
    setTimeout(() => { window.location.href = "index.html"; }, 2000);
  }
}

// ✅ 배열 응답에서 닉네임과 phone 값 매칭
function parseArrayResponse(arr, nickname) {
  if (!Array.isArray(arr) || arr.length === 0) return null;

  const normalizedNickname = (nickname || "").trim().toLowerCase();

  return arr.find(row => {
    const rowPhone = (row.phone || "").trim().toLowerCase();
    return rowPhone === normalizedNickname;
  }) || null;
}

// ✅ 위치 해제 응답 처리 함수
function handleStopLocation(result) {
  console.log("[DEBUG] handleStopLocation 응답:", result);

  // phone input에 실제로 nickname이 들어있으므로 그대로 사용
  const nickname = document.getElementById("phone").value;

  // 응답 배열에서 nickname으로 매칭
  const dataObj = parseArrayResponse(result, nickname);

  // 모달 닫기
  closeModal();

  // 매칭된 객체가 있고 status가 "해제"라면 정상 처리
  if (dataObj && dataObj.status === "해제") {
    showModal("🛑 위치정보가 해제되었습니다.", true);
    document.getElementById("mapBtn").style.display = "none";
  } else {
    // 매칭 실패 시 오류 메시지 출력
    showModal("처리 중 오류 발생:\n" + (dataObj ? dataObj.status : "응답 오류"), true);
  }
}


// ✅ 위치 전송
function sendLocation() {
  showModal("위치정보 전송 중입니다...\n잠시만 기다려주세요.");

  const token = sessionStorage.getItem("token");
  const phone = document.getElementById("phone").value;

  navigator.geolocation.getCurrentPosition(function(position) {
    const params = new URLSearchParams({
      phone: phone,
      status: "정상",
      lat: position.coords.latitude,
      lng: position.coords.longitude,
      time: new Date().toISOString(),
      token: token
    });

    fetch(CONFIG.ADMIN_URL, {
      method: "POST",
      body: params
    })
    .then(res => res.json())
    .then(result => handleSendLocation(result))
    .catch(err => {
      closeModal();
      showModal("전송 오류: " + err.message, true);
    });
  }, function(error) {
    closeModal();
    showModal("위치 정보를 가져오지 못했습니다:\n" + error.message, true);
  });
}

function handleSendLocation(result) {
  console.log("[DEBUG] handleSendLocation 응답:", result);

  const phone = document.getElementById("phone").value;
  const dataObj = parseArrayResponse(result, phone);

  closeModal();
  if (dataObj && dataObj.status === "정상") {
    showModal("✅ 위치정보가 성공적으로 재갱신되었습니다.", true);
    document.getElementById("mapBtn").style.visibility = "visible";
    document.getElementById("mapBtn").style.pointerEvents = "auto";
    if (!intervalId) intervalId = setInterval(autoUpdate, 5 * 60 * 1000);
  } else {
    showModal("✅ 위치정보를 서버에 저장하였습니다.", true);
    document.getElementById("mapBtn").style.visibility = "visible";
    document.getElementById("mapBtn").style.pointerEvents = "auto";
    if (!intervalId) intervalId = setInterval(autoUpdate, 5 * 60 * 1000);
  }
}

// ✅ 위치 해제 (fetch POST로 수정)
function stopLocation() {
  showModal("위치정보 해제 처리 중입니다...\n잠시만 기다려주세요.");
  clearInterval(intervalId); intervalId = null;

  const token = sessionStorage.getItem("token");
  const phone = document.getElementById("phone").value;

  // ✅ POST 요청으로 관리자 서버에 해제 상태 전달
  const params = new URLSearchParams({
    phone: phone,
    status: "해제",
    time: new Date().toISOString(),
    token: token
  });

  fetch(CONFIG.ADMIN_URL, {
    method: "POST",
    body: params
  })
  .then(res => res.json())
  .then(result => handleStopLocation(result))
  .catch(err => {
    closeModal();
    showModal("해제 오류: " + err.message, true);
  });
}

// ✅ 위치 해제 응답 처리
function handleStopLocation(result) {
  console.log("[DEBUG] handleStopLocation 응답:", result);

  const nickname = document.getElementById("phone").value.trim();
  let dataObj = null;

  // 응답이 배열일 경우
  if (Array.isArray(result)) {
    dataObj = parseArrayResponse(result, nickname);
  }

  // 응답이 객체일 경우
  if (result.result) {
    if (result.result === "success") {
      showModal("🛑 위치정보가 해제되었습니다.", true);
      const mapBtn = document.getElementById("mapBtn");
      mapBtn.style.visibility = "hidden";
      mapBtn.style.pointerEvents = "none";
      return;
    } else {
      showModal("❌ " + result.message, true);
      return;
    }
  }

  // 배열에서 찾은 경우 처리
  if (dataObj && dataObj.status === "해제") {
    showModal("🛑 위치정보가 해제되었습니다.", true);
    const mapBtn = document.getElementById("mapBtn");
    mapBtn.style.visibility = "hidden";
    mapBtn.style.pointerEvents = "none";
  } else {
    showModal("처리 중 오류 발생:\n" + (dataObj ? dataObj.status : "응답 오류"), true);
  }
}

// ✅ 자동 갱신
function autoUpdate() {
  if (!navigator.geolocation) return;
  navigator.geolocation.getCurrentPosition(function(position) {
    console.log("[DEBUG] autoUpdate 좌표:", position.coords.latitude, position.coords.longitude);

    const token = sessionStorage.getItem("token");
    const phone = document.getElementById("phone").value;

    const url = CONFIG.ADMIN_URL
              + "?phone=" + encodeURIComponent(phone)
              + "&status=정상"
              + "&lat=" + encodeURIComponent(position.coords.latitude)
              + "&lng=" + encodeURIComponent(position.coords.longitude)
              + "&time=" + encodeURIComponent(new Date().toISOString())
              + "&auto=true"
              + "&token=" + encodeURIComponent(token);

    callJSONP(url, "handleAutoUpdate");
  });
}

function handleAutoUpdate(result) {
  console.log("[DEBUG] autoUpdate 응답:", result);
  const phone = document.getElementById("phone").value;
  const dataObj = parseArrayResponse(result, phone);
  if (dataObj) {
    console.log("[DEBUG] 최신 데이터:", dataObj);
  }
}

// ✅ 서비스워커 등록
// if ("serviceWorker" in navigator) {
//  navigator.serviceWorker.register("service-worker.js");
// }
</script>

</body>
</html>
