<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>A-DOMES | 위치정보시스템</title>
  <link rel="manifest" href="manifest.json">
  <style>
    body {
      font-family: Arial, sans-serif;
      font-size: 18px;
      background-color: #f9f9f9;
      margin: 0;
      text-align: center;
      color: #333;
    }
    header {
      background-color: #2196F3;
      padding: 25px;
    }
    header h2 {
      font-size: 30px;
      margin: 0;
      font-weight: bold;
      color: #fff;
    }
    section {
      margin: 40px auto;
      max-width: 700px;
      line-height: 1.8;
      font-size: 20px;
    }
    section p {
      margin: 20px 0;
    }
    section .warning {
      font-weight: bold;
      color: #d32f2f;
      font-size: 22px;
      margin-top: 40px;
    }
    .button-group {
      display: flex;
      gap: 15px;
      max-width: 400px;
      margin: 40px auto;
    }
    .button-group button {
      flex: 1;
      font-size: 20px;
      padding: 15px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }
    #sendBtn {
      background: linear-gradient(to bottom, #66bb6a, #4CAF50);
      color: white;
    }
    #stopBtn {
      background: linear-gradient(to bottom, #ef5350, #f44336);
      color: white;
    }
    @media (max-width: 600px) {
      section { font-size: 18px; }
      .button-group { flex-direction: column; }
      .button-group button { width: 100%; font-size: 18px; }
    }
  </style>
</head>
<body>
  <header>
    <h2>A-DOMES 위치정보시스템</h2>
  </header>

  <section>
    <p><strong>앱 목적</strong><br>
       이 앱은 현장의 위치 정보를 기록하고 공유하기 위해 만들어졌습니다.</p>
    <p><strong>사용 방법</strong><br>
       위치 전송 버튼을 누르면 현재 위치가 구글 시트에 기록됩니다.<br>
       화면을 켜 두시면 5분마다 자동으로 위치가 갱신됩니다.</p>
    <p class="warning">📱 위치 전송을 위해 화면을 끄지 마세요!</p>
  </section>

  <form id="locationForm"
        action="https://script.google.com/macros/s/AKfycby5AltWUN2ziDLtSA_rI49e_0cQfK56yGUcUl5oL55PPweYtulIRQ4htO39CZQ6-1IfzQ/exec"
        method="POST">
    <div class="button-group">
      <button type="button" id="sendBtn" onclick="sendLocation()">위치 전송</button>
      <button type="button" id="stopBtn" onclick="stopLocation()">위치정보 해제</button>
    </div>
  </form>

  <script>
    let intervalId;

    function sendLocation() {
      if (!navigator.geolocation) {
        alert("이 브라우저에서는 위치 정보를 지원하지 않습니다.");
        return;
      }
      navigator.geolocation.getCurrentPosition(
        function(position) {
          const form = document.getElementById("locationForm");
          const params = new URLSearchParams();
          params.append("status", "정상");
          params.append("lat", position.coords.latitude || 0);
          params.append("lng", position.coords.longitude || 0);
          params.append("time", new Date().toISOString());

          fetch(form.action, {
            method: "POST",
            headers: { "Content-Type": "application/x-www-form-urlencoded" },
            body: params.toString()
          }).then(() => { alert("위치정보가 성공적으로 전송되었습니다."); });

          if (!intervalId) {
            intervalId = setInterval(autoUpdate, 5 * 60 * 1000);
          }
        },
        function(error) {
          alert("위치 정보를 가져오지 못했습니다: " + error.message);
        }
      );
    }

    function stopLocation() {
      clearInterval(intervalId);
      intervalId = null;
      const form = document.getElementById("locationForm");
      const params = new URLSearchParams();
      params.append("status", "해제");
      params.append("time", new Date().toISOString());

      fetch(form.action, {
        method: "POST",
        headers: { "Content-Type": "application/x-www-form-urlencoded" },
        body: params.toString()
      }).then(() => { alert("위치정보가 해제되었습니다."); });
    }

    function autoUpdate() {
      if (!navigator.geolocation) return;
      navigator.geolocation.getCurrentPosition(
        function(position) {
          const form = document.getElementById("locationForm");
          const params = new URLSearchParams();
          params.append("status", "정상");
          params.append("lat", position.coords.latitude || 0);
          params.append("lng", position.coords.longitude || 0);
          params.append("time", new Date().toISOString());
          params.append("auto", "true");

          fetch(form.action, {
            method: "POST",
            headers: { "Content-Type": "application/x-www-form-urlencoded" },
            body: params.toString()
          });
        }
      );
    }

    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("service-worker.js");
    }
  </script>
</body>
</html>
