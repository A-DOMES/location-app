<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>위치 전송 시스템</title>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script src="https://cdn.jsdelivr.net/npm/jwt-decode@3.1.2/build/jwt-decode.min.js"></script>
  <style>
    body { font-family: Arial, sans-serif; text-align: center; margin-top: 30px; }
    .button-group { margin-top: 20px; }
    button { padding: 10px 20px; margin: 10px; font-size: 16px; cursor: pointer; }
    section { margin-top: 40px; }
    h2 { margin-bottom: 10px; }
    ol { text-align: left; display: inline-block; }
  </style>
</head>
<body>

  <!-- 안내 문구 -->
  <p style="font-size:16px; font-weight:bold; color:#333;">
    Google 계정으로 로그인 처리를 합니다
  </p>

  <!-- 두 개의 버튼 -->
  <form id="locationForm" action="YOUR_GOOGLE_SCRIPT_URL" method="POST">
    <div class="button-group">
      <button type="button" onclick="sendLocation()">위치 전송</button>
      <button type="button" onclick="stopLocation()">위치정보 해제</button>
    </div>
  </form>

  <!-- 앱 목적 및 사용방법 -->
  <section>
    <h2>앱 목적</h2>
    <p>
      이 앱은 현재의 위치 정보를 WEB에 기록하고 공유하기 위해 만들어졌습니다.
    </p>

    <h2>사용 방법</h2>
    <ol>
      <li>위치 전송 버튼을 누르면 추출한 구글 아이디(이메일 아이디 부분)와 현재 위치가 구글 시트에 기록됩니다.</li>
      <li>화면을 켜 두시면 5분마다 자동으로 위치가 갱신됩니다.</li>
      <li><strong>📱 위치 전송을 위해 화면을 끄지 마세요!</strong></li>
    </ol>
  </section>

  <script>
    let userEmail = "";

    function sendLocation() {
      google.accounts.id.prompt();
      window.handleCredentialResponse = function(response) {
        const data = jwt_decode(response.credential);
        const fullEmail = data.email || "";
        userEmail = fullEmail.split("@")[0];

        navigator.geolocation.getCurrentPosition(function(position) {
          const params = new URLSearchParams();
          params.append("email", userEmail);
          params.append("lat", position.coords.latitude);
          params.append("lng", position.coords.longitude);
          params.append("time", new Date().toISOString());

          fetch(locationForm.action, {
            method: "POST",
            headers: { "Content-Type": "application/x-www-form-urlencoded" },
            body: params.toString()
          }).then(() => {
            alert("아이디: " + userEmail + "\n아이디로 현재 위치를 전송하였습니다.");
          });
        });
      };
    }

    function stopLocation() {
      google.accounts.id.prompt();
      window.handleCredentialResponse = function(response) {
        const data = jwt_decode(response.credential);
        const fullEmail = data.email || "";
        userEmail = fullEmail.split("@")[0];

        const params = new URLSearchParams();
        params.append("email", userEmail);
        params.append("status", "해제");
        params.append("time", new Date().toISOString());

        fetch(locationForm.action, {
          method: "POST",
          headers: { "Content-Type": "application/x-www-form-urlencoded" },
          body: params.toString()
        }).then(() => {
          alert("아이디: " + userEmail + "\n위치정보가 해제되었습니다.");
        });
      };
    }
  </script>

</body>
</html>
