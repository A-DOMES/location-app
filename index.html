<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>로그인</title>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&family=Noto+Sans+KR&display=swap" rel="stylesheet">
  <!-- Font Awesome 아이콘 -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: flex-start;
      height: 100vh;
      background: linear-gradient(135deg, #74ebd5, #ACB6E5);
      font-family: 'Noto Sans KR', 'Roboto', sans-serif;
      padding-top: 40px;
    }
    .login-box {
      background: #fff;
      padding: 60px 40px;
      border-radius: 20px;
      box-shadow: 0 12px 32px rgba(0,0,0,0.2);
      text-align: center;
      width: 100%;
      max-width: 420px;
      animation: fadeIn 1s ease-in-out;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .login-box h2 {
      margin-bottom: 20px;
      color: #2c3e50;
      font-size: 28px;
      font-weight: 600;
    }
    .input-group {
      margin-top: 80px;
    }
    .button-group {
      margin-top: 60px;
    }
    .login-box label {
      display: block;
      text-align: left;
      font-size: 16px;
      font-weight: 500;
      color: #2c3e50;
      margin-top: 25px;
    }
    .login-box label i {
      margin-right: 8px;
      vertical-align: middle;
    }
    .user-icon {
      color: #3498db; /* 파란색 사용자 아이콘 */
    }
    .lock-icon {
      color: #27ae60; /* 초록색 자물쇠 아이콘 */
    }
    .login-box input {
      width: 100%;
      margin-top: 8px;
      padding: 20px;
      font-size: 18px;
      border: 1.5px solid #bdc3c7;
      border-radius: 10px;
      transition: border-color 0.3s, box-shadow 0.3s;
      box-sizing: border-box;
    }
    .login-box input:focus {
      border-color: #2980b9;
      box-shadow: 0 0 8px rgba(41, 128, 185, 0.3);
      outline: none;
    }
    .login-btn {
      width: 100%;
      padding: 18px;
      margin-bottom: 15px;
      background: linear-gradient(to right, #3498db, #2980b9);
      color: white;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      font-size: 18px;
      font-weight: 500;
      transition: transform 0.2s, background 0.3s;
    }
    .login-btn:hover {
      background: linear-gradient(to right, #2980b9, #1f6391);
      transform: scale(1.03);
    }
    .signup-btn {
      width: 100%;
      padding: 18px;
      background: linear-gradient(to right, #2ecc71, #27ae60);
      color: white;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      font-size: 18px;
      font-weight: 500;
      transition: transform 0.2s, background 0.3s;
    }
    .signup-btn:hover {
      background: linear-gradient(to right, #27ae60, #1e8449);
      transform: scale(1.03);
    }
    #message { 
      margin-top: 20px; 
      font-weight: bold; 
      color: #e74c3c; 
    }
    .modal {
      display: none;
      position: fixed;
      z-index: 999;
      left: 0; top: 0;
      width: 100%; height: 100%;
      background-color: rgba(0,0,0,0.3);
    }
    .modal-content {
      background: #fff;
      margin: 12% auto;
      padding: 30px;
      border-radius: 12px;
      width: 90%;
      max-width: 400px;
      text-align: center;
      box-shadow: 0 4px 15px rgba(0,0,0,0.3);
    }
    .modal-content h2 {
      font-size: 24px;
      margin-bottom: 15px;
      color: #2c3e50;
    }
    .modal-content p {
      font-size: 18px;
      color: #555;
    }
  </style>
</head>
<body>
  <div class="login-box">
    <h2>📍 A-DOMES | 위치정보시스템</h2>

    <!-- 입력 그룹 -->
    <div class="form-section input-group">
      <label for="id"><i class="fa fa-user user-icon"></i> 아이디</label>
      <input type="text" id="id" placeholder="아이디를 입력하세요">

      <label for="pw"><i class="fa fa-lock lock-icon"></i> 비밀번호</label>
      <input type="password" id="pw" placeholder="비밀번호를 입력하세요">
    </div>

    <!-- 버튼 그룹 -->
    <div class="form-section button-group">
      <button onclick="login()" class="login-btn">로그인</button>
      <button onclick="goRegister()" class="signup-btn">회원가입</button>
    </div>

    <div id="message"></div>
  </div>

    <!-- 로그인 성공 모달 -->
    <div id="loginModal" class="modal">
      <div class="modal-content">
        <h2>✅ 로그인 성공!</h2>
        <p>잠시 후 이동합니다...</p>
      </div>
    </div>
  </body>
  </html>


<!-- config.js 먼저 불러오기 -->
<script src="config.js"></script>

<script>
  // ✅ config.js에서 사용자 서버 URL 가져오기
  const USER_API_URL = CONFIG.USER_URL;

  function login() {
    const id = document.getElementById("id").value.trim();
    const pw = document.getElementById("pw").value.trim();

    if (!id || !pw) {
      alert("⚠️ 아이디와 비밀번호를 입력하세요.");
      return;
    }

    const modal = document.getElementById("loginModal");
    modal.style.display = "block";
    modal.querySelector("h2").innerText = "🔑 서버에 로그인 중입니다...";
    modal.querySelector("p").innerText = "잠시만 기다려주세요.";

    fetch(USER_API_URL, {
      method: "POST",
      body: new URLSearchParams({ mode: "checkPassword", id, pw })
    })
      .then(response => response.json())
      .then(result => {
        if (result.result === "success") {
          modal.querySelector("h2").innerText = "✅ 로그인 성공!";
          modal.querySelector("p").innerText = "잠시 후 이동합니다...";
      
          sessionStorage.setItem("loggedIn", "true");
          sessionStorage.setItem("role", result.role);
          sessionStorage.setItem("userId", id);
          sessionStorage.setItem("token", result.token);
      
          // ✅ 닉네임 저장 추가
          localStorage.setItem("nickname", result.nickname);
      
          setTimeout(() => {
            if (result.role === "AD") {
              window.location.href = "admin.html";
            } else if (result.role === "RU") {
              window.location.href = "user.html";
            }
          }, 1500);
        } else if (result.result === "blocked") {
          modal.style.display = "none";
          alert("🚫 계정이 비활성화되었습니다.");
        } else {
          modal.style.display = "none";
          alert("❌ 로그인 실패: 아이디 또는 비밀번호가 잘못되었습니다.");
        }
      })
      .catch(error => {
        modal.style.display = "none";
        alert("❌ 서버 오류: " + error.message);
      });
  }

  function goRegister() {
    window.location.href = "registerUser.html";
  }

  window.login = login;
  window.goRegister = goRegister;
</script>

</body>
</html>
