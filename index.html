<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>A-DOMES | 위치정보시스템</title>
  <link rel="manifest" href="manifest.json">
  <style>
    body {
      font-family: Arial, sans-serif;
      font-size: 18px;
      background-color: #f9f9f9;
      margin: 0;
      text-align: center;
      color: #333;
    }
    header {
      background-color: #2196F3;
      padding: 25px;
    }
    header h2 {
      font-size: 30px;
      margin: 0;
      font-weight: bold;
      color: #fff;
    }
    .info-box {
      border: 2px solid #2196F3;
      border-radius: 10px;
      background-color: #e3f2fd;
      padding: 25px;
      margin: 40px auto;   /* ✅ 좌우 중앙 정렬 */
      max-width: 650px;    /* ✅ 폭 줄임 */
      text-align: left;
      font-size: 20px;
      line-height: 1.8;
    }
    .info-box h3 {
      margin-top: 0;
      color: #1976d2;
    }
    .info-box .warning {
      font-weight: bold;
      color: #d32f2f;
      font-size: 22px;
      margin-top: 20px;
    }
    input[type="text"] {
      width: 100%;
      max-width: 500px;
      font-size: 20px;
      padding: 12px;
      margin: 20px auto;
      border: 2px solid #2196F3;
      border-radius: 6px;
      display: block;
    }
    .button-group {
      display: flex;
      justify-content: flex-start;
      max-width: 500px;
      margin: 40px auto;
    }
    #sendBtn {
      flex: 1;
      font-size: 20px;
      padding: 15px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      background: linear-gradient(to bottom, #66bb6a, #4CAF50);
      color: white;
      margin-right: 60px;
    }
    #stopBtn {
      flex: 1;
      font-size: 20px;
      padding: 15px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      background: linear-gradient(to bottom, #ef5350, #f44336);
      color: white;
    }
    .modal {
      display: none;
      position: fixed;
      z-index: 1000;
      left: 0; top: 0;
      width: 100%; height: 100%;
      background-color: rgba(0,0,0,0.5);
    }
    .modal-content {
      background-color: #fff;
      margin: 20% auto;
      padding: 25px;
      width: 350px;
      border-radius: 10px;
      text-align: center;
      box-shadow: 0 4px 8px rgba(0,0,0,0.2);
    }
    .modal-content p {
      font-size: 20px;
      margin-bottom: 25px;
    }
    .modal-content button {
      font-size: 18px;
      padding: 10px 20px;
      background-color: #2196F3;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <header>
    <h2>A-DOMES | 위치정보시스템</h2>
  </header>

  <section class="info-box">
    <h3>앱 목적</h3>
    <p>이 앱은 현장의 위치 정보를 기록하고 공유하기 위해 만들어졌습니다.</p>

    <h3>사용 방법</h3>
    <p>
      먼저 전화번호 또는 이름을 입력하세요.<br>
      위치 전송 버튼을 누르면 입력한 값과 현재 위치가 구글 시트에 기록됩니다.<br>
      화면을 켜 두시면 5분마다 자동으로 위치가 갱신됩니다.
    </p>

    <p class="warning">📱 위치 전송을 위해 화면을 끄지 마세요!</p>
  </section>

  <form id="locationForm"
        action="https://script.google.com/macros/s/AKfycby5AltWUN2ziDLtSA_rI49e_0cQfK56yGUcUl5oL55PPweYtulIRQ4htO39CZQ6-1IfzQ/exec"
        method="POST">
    <input type="text" name="phone" id="phone" placeholder="전화번호 또는 이름 입력">
    <div class="button-group">
      <button type="button" id="sendBtn" onclick="sendLocation()">위치 전송</button>
      <button type="button" id="stopBtn" onclick="stopLocation()">위치정보 해제</button>
    </div>
  </form>

  <div id="modal" class="modal">
    <div class="modal-content">
      <p id="modalMessage"></p>
      <button onclick="closeModal()">확인</button>
    </div>
  </div>

  <script>
    let intervalId;

    function showModal(message) {
      document.getElementById("modalMessage").innerText = message;
      document.getElementById("modal").style.display = "block";
    }

    function closeModal() {
      document.getElementById("modal").style.display = "none";
    }

    function sendLocation() {
      if (!navigator.geolocation) {
        showModal("이 브라우저에서는 위치 정보를 지원하지 않습니다.");
        return;
      }

      navigator.geolocation.getCurrentPosition(
        function(position) {
          const form = document.getElementById("locationForm");
          const params = new URLSearchParams();

          params.append("phone", document.getElementById("phone").value);
          params.append("status", "정상");
          params.append("lat", position.coords.latitude || 0);
          params.append("lng", position.coords.longitude || 0);
          params.append("time", new Date().toISOString());

          fetch(form.action, {
            method: "POST",
            headers: { "Content-Type": "application/x-www-form-urlencoded" },
            body: params.toString()
          })
          .then(() => { showModal("위치정보가 성공적으로 전송되었습니다."); })
          .catch(err => { showModal("위치 전송 실패: " + err.message); });

          if (!intervalId) {
            intervalId = setInterval(autoUpdate, 5 * 60 * 1000);
          }
        },
        function(error) {
          showModal("위치 정보를 가져오지 못했습니다: " + error.message);
        }
      );
    }

    function stopLocation() {
      clearInterval(intervalId);
      intervalId = null;

      const form = document.getElementById("locationForm");
      const params = new URLSearchParams();

      params.append("phone", document.getElementById("phone").value);
      params.append("status", "해제");
      params.append("time", new Date().toISOString());

      fetch(form.action, {
        method: "POST",
        headers: { "Content-Type": "application/x-www-form-urlencoded" },
        body: params.toString()
      })
      .then(() => { showModal("위치정보가 해제되었습니다."); })
      .catch(err => { showModal("위치정보 해제 실패: " + err.message); });
    }

    function autoUpdate() {
      if (!navigator.geolocation) return;

      navigator.geolocation.getCurrentPosition(
        function(position) {
          const form = document.getElementById("locationForm");
          const params = new URLSearchParams();

          params.append("phone", document.getElementById("phone").value);
          params.append("status", "정상");
          params.append("lat", position.coords.latitude || 0);
          params.append("lng", position.coords.longitude || 0);
          params.append("time", new Date().toISOString());
          params.append("auto", "true");

          fetch(form.action, {
            method: "POST",
            headers: { "Content-Type": "application/x-www-form-urlencoded" },
            body: params.toString()
          });
        }
      );
    }

    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("service-worker.js");
    }
  </script>
</body>
</html>
