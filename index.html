  <!DOCTYPE html>
  <html lang="ko">
  <head>
    <meta charset="UTF-8">
    <title>A-DOMES | 위치정보시스템</title>
    <link rel="manifest" href="manifest.json">
    <style>
      /* 전체 페이지 기본 설정 */
      body {
        font-family: Arial, sans-serif;
        font-size: 18px;
        background-color: #f9f9f9;
        margin: 0;
        text-align: left;              /* 전체 좌측 정렬 */
        color: #333;
      }
  
      /* 상단 헤더 */
      header {
        background-color: #2196F3;
        padding: 25px;
        text-align: center;            /* 헤더만 중앙 정렬 */
      }
  
      header h2 {
        font-size: 30px;
        margin: 0;
        font-weight: bold;
        color: #fff;
      }
  
      /* 안내 박스 */
      .info-box {
        border: 2px solid #2196F3;
        border-radius: 10px;
        background-color: #e3f2fd;
        padding: 25px;
        margin: 40px auto;
        max-width: 620px;
        text-align: left;
        font-size: 20px;
        line-height: 1.3;
      }
  
      /* 전화번호 입력창 */
      input[type="text"] {
        width: 400px;          /* 폭 직접 지정 */
        height: 30px;          /* 높이 직접 지정 */
        font-size: 20px;
        padding: 8px;
        margin-left: 430px;    /* 좌측에서 띄우는 거리 (기존 40px → 7배 = 280px) */
        margin-bottom: 15px;   /* 버튼과의 간격 */
        border: 2px solid #2196F3;
        border-radius: 6px;
        display: block;
      }
  
      /* 버튼 그룹 */
      .button-group {
        display: flex;
        justify-content: flex-start;   /* 좌측 정렬 */
        align-items: center;
        margin-left: 350px;            /* 입력창과 동일한 좌측 위치 (7배 이동) */
        margin-top: 10px;              /* 입력창과 버튼 간격 줄임 */
        gap: 40px;                     /* 버튼 간격 */
      }
  
      /* 지도맵 아이콘 버튼 */
      .map-btn {
        width: 120px;                   /* 아이콘 폭 */
        height: 120px;                  /* 아이콘 높이 */
        cursor: pointer;
        margin-left: 0;                /* 좌측 기준 위치 */
      }
  
      /* 위치전송 버튼 */
      #sendBtn {
        width: 200px;                  /* 폭 직접 지정 */
        height: 50px;                  /* 높이 직접 지정 */
        font-size: 20px;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        background: linear-gradient(to bottom, #66bb6a, #4CAF50);
        color: white;
      }
  
      /* 위치정보 해제 버튼 */
      #stopBtn {
        width: 200px;                  /* 폭 직접 지정 */
        height: 50px;                  /* 높이 직접 지정 */
        font-size: 20px;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        background: linear-gradient(to bottom, #ef5350, #f44336);
        color: white;
      }
    </style>
  </head>
  <body>
    <!-- 상단 헤더 -->
    <header>
      <h2>A-DOMES | 위치정보시스템</h2>
    </header>
  
    <!-- 안내 박스 -->
    <section class="info-box">
      <h3>앱 목적</h3>
      <p>이 앱은 현장의 위치 정보를 기록하고 공유하기 위해 만들어졌습니다.</p>
  
      <h3>사용 방법</h3>
      <p>
        먼저 전화번호 또는 이름을 입력하세요.<br>
        위치 전송 버튼을 누르면 입력한 값과 현재 위치가 구글 시트에 기록됩니다.<br>
        화면을 켜 두시면 5분마다 자동으로 위치가 갱신됩니다.
      </p>
  
      <p class="warning">📱 위치 전송을 위해 화면을 끄지 마세요!</p>
    </section>
  
    <!-- 입력창과 버튼 그룹 -->
    <form id="locationForm"
          action="https://script.google.com/macros/s/AKfycbzX6BC6mGl1ealnB3S6HtWwDQH0CjNjXY_p49j9PT2834A4ItMDxgK1V5gDkNXi4ZD6Ww/exec"
          method="POST">
      <!-- 전화번호 입력창 (좌측에서 280px 띄움 → 7배 이동) -->
      <input type="text" name="phone" id="phone" placeholder="전화번호 또는 이름 입력">
  
      <!-- 버튼 그룹 (입력창과 동일한 좌측 위치) -->
      <div class="button-group">
        <!-- 지도맵 버튼 -->
        <img src="btn-current.png" alt="지도 버튼" class="map-btn"
  
        <!-- 위치 전송 버튼 -->
        <button type="button" id="sendBtn" onclick="sendLocation()">위치 전송</button>
  
        <!-- 위치정보 해제 버튼 -->
        <button type="button" id="stopBtn" onclick="stopLocation()">위치정보 해제</button>
      </div>
    </form>
  
    <!-- 모달창 -->
    <div id="modal" class="modal">
      <div class="modal-content">
        <p id="modalMessage"></p>
        <button onclick="closeModal()">확인</button>
      </div>
    </div>
  
    <script>
      // 위치 전송, 해제, 자동 갱신 관련 JS 로직은 그대로 유지
    </script>
  </body>
  </html>
  


  <script>
    let intervalId;

    function showModal(message) {
      document.getElementById("modalMessage").innerText = message;
      document.getElementById("modal").style.display = "block";
    }

    function closeModal() {
      document.getElementById("modal").style.display = "none";
    }

    function sendLocation() {
      // ✅ 실행 중 표시 추가
      showModal("위치정보 전송 중입니다...\n잠시만 기다려주세요.");

      if (!navigator.geolocation) {
        showModal("이 브라우저에서는 위치 정보를 지원하지 않습니다.");
        return;
      }

      navigator.geolocation.getCurrentPosition(
        function(position) {
          const form = document.getElementById("locationForm");
          const params = new URLSearchParams();

          params.append("phone", document.getElementById("phone").value);
          params.append("status", "정상");
          params.append("lat", position.coords.latitude || 0);
          params.append("lng", position.coords.longitude || 0);
          params.append("time", new Date());

          fetch(form.action, {
            method: "POST",
            headers: { "Content-Type": "application/x-www-form-urlencoded" },
            body: params.toString()
          })
          .then(() => { showModal("위치정보가 성공적으로 전송되었습니다."); })
          .catch(err => { showModal("위치 전송 실패:\n" + err.message); });

          if (!intervalId) {
            intervalId = setInterval(autoUpdate, 5 * 60 * 1000);
          }
        },
        function(error) {
          showModal("위치 정보를 가져오지 못했습니다:\n" + error.message);
        }
      );
    }

    function stopLocation() {
      // ✅ 실행 중 표시 추가
      showModal("위치정보 해제 처리 중입니다...\n잠시만 기다려주세요.");

      clearInterval(intervalId);
      intervalId = null;

      const form = document.getElementById("locationForm");
      const params = new URLSearchParams();

      params.append("phone", document.getElementById("phone").value);
      params.append("status", "해제");
      params.append("time", new Date());

      fetch(form.action, {
        method: "POST",
        headers: { "Content-Type": "application/x-www-form-urlencoded" },
        body: params.toString()
      })
      .then(response => response.text())
      .then(text => { showModal(text); })
      .catch(err => { showModal("처리 중 오류가 발생했습니다:\n" + err.message); });
    }

      function autoUpdate() {
        if (!navigator.geolocation) return;

        navigator.geolocation.getCurrentPosition(
          function(position) {
            const form = document.getElementById("locationForm");
            const params = new URLSearchParams();

            params.append("phone", document.getElementById("phone").value);
            params.append("status", "정상");
            params.append("lat", position.coords.latitude || 0);
            params.append("lng", position.coords.longitude || 0);
            params.append("time", new Date());
            params.append("auto", "true");

            fetch(form.action, {
              method: "POST",
              headers: { "Content-Type": "application/x-www-form-urlencoded" },
              body: params.toString()
            });
          }
        );
      }

    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("service-worker.js");
    }
  </script>
</body>
</html>
