<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>A-DOMES | 위치정보시스템</title>
  <style>
    body { font-family: Arial, sans-serif; text-align: center; margin: 30px; background-color: #fff; }
    header { margin-bottom: 20px; }
    header h2 { font-size: 28px; color: #2196F3; }
    input[type="text"] { width: 100%; max-width: 400px; font-size: 18px; padding: 10px; margin: 20px auto; border: 1px solid #ccc; border-radius: 6px; display: block; }
    .button-group { margin-top: 20px; }
    button { padding: 12px 20px; margin: 10px; font-size: 18px; border: none; border-radius: 6px; cursor: pointer; }
    #sendBtn { background-color: #4CAF50; color: white; }
    #stopBtn { background-color: #f44336; color: white; }
    section { margin-top: 40px; text-align: left; max-width: 600px; margin-left: auto; margin-right: auto; }
    section h2 { color: #2196F3; margin-bottom: 10px; }
    ol { padding-left: 20px; }
    .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.5); }
    .modal-content { background-color: #fff; margin: 20% auto; padding: 20px; width: 300px; border-radius: 8px; text-align: center; }
    .modal-content p { font-size: 18px; margin-bottom: 20px; }
    .modal-content button { padding: 8px 16px; background-color: #2196F3; color: white; border: none; border-radius: 4px; cursor: pointer; }
  </style>
</head>
<body>
  <header>
    <h2>A-DOMES | 위치정보시스템</h2>
  </header>

  <!-- 입력창 -->
  <input type="text" name="phone" id="phone" placeholder="전화번호 또는 이름 입력">

  <!-- 버튼 -->
  <div class="button-group">
    <button id="sendBtn" onclick="sendLocation()">위치 전송</button>
    <button id="stopBtn" onclick="stopLocation()">위치정보 해제</button>
  </div>

  <!-- 안내문 -->
  <section>
    <h2>앱 목적</h2>
    <p>이 앱은 현재의 위치 정보를 WEB에 기록하고 공유하기 위해 만들어졌습니다.</p>

    <h2>사용 방법</h2>
    <ol>
      <li>위치 전송 버튼을 누르면 입력한 아이디(전화번호/이름)와 현재 위치가 구글 시트에 기록됩니다.</li>
      <li>화면을 켜 두시면 5분마다 자동으로 위치가 갱신됩니다.</li>
      <li><strong>📱 위치 전송을 위해 화면을 끄지 마세요!</strong></li>
      <li>위치정보 해제 버튼을 누르면 해당 아이디가 구글시트에서 “해제”로 변경되고 팝업으로 결과가 안내됩니다.</li>
    </ol>
  </section>

  <!-- 모달창 -->
  <div id="modal" class="modal">
    <div class="modal-content">
      <p id="modalMessage"></p>
      <button onclick="closeModal()">확인</button>
    </div>
  </div>

  <script>
    let intervalId;

    function showModal(message) {
      document.getElementById("modalMessage").innerText = message;
      document.getElementById("modal").style.display = "block";
    }

    function closeModal() {
      document.getElementById("modal").style.display = "none";
    }

    // ✅ 위치 전송
    function sendLocation() {
      if (!navigator.geolocation) {
        showModal("이 브라우저에서는 위치 정보를 지원하지 않습니다.");
        return;
      }

      navigator.geolocation.getCurrentPosition(
        function(position) {
          const params = new URLSearchParams();
          params.append("phone", document.getElementById("phone").value);
          params.append("status", "정상");
          params.append("lat", position.coords.latitude || 0);
          params.append("lng", position.coords.longitude || 0);
          params.append("time", new Date().toISOString());

          fetch("YOUR_GOOGLE_SCRIPT_URL", {
            method: "POST",
            headers: { "Content-Type": "application/x-www-form-urlencoded" },
            body: params.toString()
          })
          .then(() => { showModal("아이디: " + document.getElementById("phone").value + "\n아이디로 위치전송을 성공하였습니다."); })
          .catch(err => { showModal("위치 전송 실패: " + err.message); });

          if (!intervalId) {
            intervalId = setInterval(autoUpdate, 5 * 60 * 1000);
          }
        },
        function(error) {
          showModal("위치 정보를 가져오지 못했습니다: " + error.message);
        }
      );
    }

    // 🚫 위치 해제
    function stopLocation() {
      clearInterval(intervalId);
      intervalId = null;

      const params = new URLSearchParams();
      params.append("phone", document.getElementById("phone").value);
      params.append("status", "해제");
      params.append("time", new Date().toISOString());

      fetch("YOUR_GOOGLE_SCRIPT_URL", {
        method: "POST",
        headers: { "Content-Type": "application/x-www-form-urlencoded" },
        body: params.toString()
      })
      .then(() => { showModal("아이디: " + document.getElementById("phone").value + "\n아이디로 해제를 하였습니다."); })
      .catch(err => { showModal("위치정보 해제 실패: " + err.message); });
    }

    // ✅ 자동갱신
    function autoUpdate() {
      if (!navigator.geolocation) return;

      navigator.geolocation.getCurrentPosition(
        function(position) {
          const params = new URLSearchParams();
          params.append("phone", document.getElementById("phone").value);
          params.append("status", "정상");
          params.append("lat", position.coords.latitude || 0);
          params.append("lng", position.coords.longitude || 0);
          params.append("time", new Date().toISOString());
          params.append("auto", "true");

          fetch("YOUR_GOOGLE_SCRIPT_URL", {
            method: "POST",
            headers: { "Content-Type": "application/x-www-form-urlencoded" },
            body: params.toString()
          })
          .then(() => { console.log("자동갱신 완료"); })
          .catch(err => { console.error("자동갱신 실패:", err.message); });
        }
      );
    }
  </script>
</body>
</html>
