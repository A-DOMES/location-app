<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>로그인</title>
  <!-- 📌 폰트 로딩 -->
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&family=Noto+Sans+KR&display=swap" rel="stylesheet">
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: flex-start;   /* ✅ 위쪽이 아니라 위에서 조금 내려오게 */
      height: 100vh;
      background: linear-gradient(135deg, #74ebd5, #ACB6E5);
      font-family: 'Noto Sans KR', 'Roboto', sans-serif;
      padding-top: 60px;         /* ✅ 로그인 박스 전체를 아래로 */
    }
    .login-box {
      background: #fff;
      padding: 70px 40px;        /* ✅ 세로 패딩 늘려서 박스 길게 */
      border-radius: 20px;
      box-shadow: 0 12px 32px rgba(0,0,0,0.2);
      text-align: center;
      width: 100%;
      max-width: 420px;
      animation: fadeIn 1s ease-in-out;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .login-box h2 {
      margin-bottom: 40px;       /* ✅ 제목과 입력창 사이 간격 넓힘 */
      color: #2c3e50;
      font-size: 28px;
      font-weight: 600;
    }
    .login-box input {
      width: 100%;
      margin: 20px 0;            /* ✅ 입력창 간격 넓힘 */
      padding: 22px;             /* ✅ 패딩 늘려서 안정감 */
      font-size: 18px;           /* ✅ 글자 크기 확대 */
      border: 1.5px solid #bdc3c7;
      border-radius: 10px;
      transition: border-color 0.3s, box-shadow 0.3s;
      box-sizing: border-box;
    }
    .login-box input::placeholder {
      font-size: 18px;           /* ✅ placeholder 글자 크기 확대 */
      color: #888;
    }
    .login-box input:focus {
      border-color: #2980b9;
      box-shadow: 0 0 8px rgba(41, 128, 185, 0.3);
      outline: none;
    }
    .login-box button {
      width: 100%;
      padding: 18px;
      margin-top: 40px;          /* ✅ 버튼 전체를 아래로 */
      background: linear-gradient(to right, #3498db, #2980b9);
      color: white;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      font-size: 18px;
      font-weight: 500;
      transition: transform 0.2s, background 0.3s;
    }
    .login-box button:hover {
      background: linear-gradient(to right, #2980b9, #1f6391);
      transform: scale(1.03);
    }
    #message { 
      margin-top: 20px; 
      font-weight: bold; 
      color: #e74c3c; 
    }
    .signup-btn {
      background: linear-gradient(to right, #2ecc71, #27ae60);
    }
    .signup-btn:hover {
      background: linear-gradient(to right, #27ae60, #1e8449);
      transform: scale(1.03);
    }

    .modal {
      display: none;
      position: fixed;
      z-index: 999;
      left: 0; top: 0;
      width: 100%; height: 100%;
      background-color: rgba(0,0,0,0.3);
    }
    .modal-content {
      background: #fff;
      margin: 12% auto;
      padding: 30px;
      border-radius: 12px;
      width: 90%;
      max-width: 400px;
      text-align: center;
      box-shadow: 0 4px 15px rgba(0,0,0,0.3);
    }
    .modal-content h2 {
      font-size: 24px;
      margin-bottom: 15px;
      color: #2c3e50;
    }
    .modal-content p {
      font-size: 18px;
      color: #555;
    }
  </style>
</head>
<body>
  <div class="login-box">
    <h2>📍 A-DOMES | 위치정보시스템</h2>
    <input type="text" id="id" placeholder="아이디를 입력하세요">
    <input type="password" id="pw" placeholder="비밀번호를 입력하세요">
    <button onclick="login()">로그인</button>
    <button class="signup-btn" onclick="goRegister()">회원가입</button>
    <div id="message"></div>
  </div>

  <div id="loginModal" class="modal">
    <div class="modal-content">
      <h2>✅ 로그인 성공!</h2>
      <p>잠시 후 이동합니다...</p>
    </div>
  </div>

  <script>
    const WEBAPP_URL = "https://script.google.com/macros/s/AKfycbyZLHG8TJYXdlvFacENYfFgW5tPPJ9XK0NznDQSxT9tTWAFPcmJshp2Ap8OQyNTf3zDLA/exec";

    function login() {
      const id = document.getElementById("id").value.trim();
      const pw = document.getElementById("pw").value.trim();
    
      if (!id || !pw) {
        alert("⚠️ 아이디와 비밀번호를 입력하세요.");
        return;
      }
    
      fetch(`${WEBAPP_URL}?mode=checkPassword&id=${encodeURIComponent(id)}&pw=${encodeURIComponent(pw)}`)
        .then(response => response.json())
        .then(result => {
          if (result.result === "success") {
            document.getElementById("loginModal").style.display = "block";
            sessionStorage.setItem("loggedIn", "true");
            sessionStorage.setItem("role", result.role);
            sessionStorage.setItem("userId", id);
            sessionStorage.setItem("token", result.token);

            setTimeout(() => {
              if (result.role === "AD") {
                window.location.href = "https://a-domes.github.io/location-pwa/admin.html";
              } else if (result.role === "RU") {
                window.location.href = "https://a-domes.github.io/location-app/user.html";
              }
            }, 1500);
          } else if (result.result === "blocked") {
            alert("🚫 계정이 비활성화되었습니다. 관리자에게 문의하세요.");
          } else {
            alert("❌ 로그인 실패: 아이디 또는 비밀번호가 잘못되었습니다.");
          }
        })
        .catch(error => {
          alert("❌ 서버 오류: " + error.message);
        });
    }

    function goRegister() {
      window.location.href = "registerUser.html";
    }
  </script>
</body>
</html>
