<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>로그인</title>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&family=Noto+Sans+KR&display=swap" rel="stylesheet">
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: linear-gradient(135deg, #74ebd5, #ACB6E5);
      font-family: 'Noto Sans KR', 'Roboto', sans-serif;
    }
    .login-box {
      background: #fff;
      padding: 50px 40px;
      border-radius: 20px;
      box-shadow: 0 12px 32px rgba(0,0,0,0.2);
      text-align: center;
      width: 100%;
      max-width: 420px;
      animation: fadeIn 1s ease-in-out;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .login-box h2 {
      margin-bottom: 30px;
      color: #2c3e50;
      font-size: 28px;
      font-weight: 600;
    }
    .login-box input {
      width: 100%;
      margin: 15px 0;
      padding: 16px;
      font-size: 16px;
      border: 1.5px solid #bdc3c7;
      border-radius: 10px;
      transition: border-color 0.3s, box-shadow 0.3s;
      box-sizing: border-box; /* ✅ 버튼과 동일한 폭으로 맞춤 */
    }
    .login-box input:focus {
      border-color: #2980b9;
      box-shadow: 0 0 8px rgba(41, 128, 185, 0.3);
      outline: none;
    }
    .login-box button {
      width: 100%;
      padding: 16px;
      margin-top: 20px;
      background: linear-gradient(to right, #3498db, #2980b9);
      color: white;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      font-size: 18px;
      font-weight: 500;
      transition: transform 0.2s, background 0.3s;
    }
    .login-box button:hover {
      background: linear-gradient(to right, #2980b9, #1f6391);
      transform: scale(1.03);
    }
    #message { 
      margin-top: 20px; 
      font-weight: bold; 
      color: #e74c3c; 
    }
    .signup-btn {
      background: linear-gradient(to right, #2ecc71, #27ae60);
      margin-top: 10px;
    }
    .signup-btn:hover {
      background: linear-gradient(to right, #27ae60, #1e8449);
      transform: scale(1.03);
    }
  </style>
</head>
<body>
  <div class="login-box">
    <h2>📍 A-DOMES | 위치정보시스템</h2>
    <input type="text" id="id" placeholder="아이디">
    <input type="password" id="pw" placeholder="비밀번호">
    <button onclick="login()">로그인</button>
    <button class="signup-btn" onclick="goRegister()">회원가입</button>
    <div id="message"></div>
  </div>

  <script>
    const WEBAPP_URL = "https://script.google.com/macros/s/AKfycbxzUmUkR6-7UwDR6ZgYz9Ctl_IhXP2TTz4aiXavfh7GrPJ_SI8iww2BCd7wUc6ygRt_6Q/exec"; // GAS 웹앱 URL로 교체

    function login() {
      const id = document.getElementById("id").value.trim();
      const pw = document.getElementById("pw").value.trim();
      const msg = document.getElementById("message");

      if (!id || !pw) {
        msg.style.color = "red";
        msg.innerText = "아이디와 비밀번호를 입력하세요.";
        return;
      }

      fetch(`${WEBAPP_URL}?mode=checkPassword&id=${encodeURIComponent(id)}&pw=${encodeURIComponent(pw)}`)
        .then(response => response.json())
        .then(result => {
          if (result.result === "success") {
            msg.style.color = "green";
            msg.innerText = "로그인 성공! 잠시 후 이동합니다...";

            // ✅ 로그인 상태 저장
            sessionStorage.setItem("loggedIn", "true");
            sessionStorage.setItem("role", result.role);
            sessionStorage.setItem("userId", id);
            sessionStorage.setItem("userPw", pw);

            setTimeout(() => {
              if (result.role === "AD") {
                window.location.href = "https://a-domes.github.io/location-pwa/admin.html";
              } else if (result.role === "RU") {
                window.location.href = "https://a-domes.github.io/location-app/user.html";
              }
            }, 1000);

          } else if (result.result === "blocked") {
            msg.style.color = "red";
            msg.innerText = "🚫 계정이 비활성화되었습니다.";
          } else {
            msg.style.color = "red";
            msg.innerText = "❌ 로그인 실패. 아이디/비밀번호 확인하세요.";
          }
        })
        .catch(error => {
          msg.style.color = "red";
          msg.innerText = "❌ 서버 오류: " + error.message;
        });
    }

    function goRegister() {
      // 회원가입은 사용자가 직접 선택할 때만 이동
      window.location.href = "registerUser.html";
    }
  </script>
</body>
</html>
