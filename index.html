<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>A-DOMES | 위치정보시스템</title>
  <!-- 📌 모바일 대응을 위한 뷰포트 태그 -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- 📌 폰트 로딩 -->
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&family=Noto+Sans+KR&display=swap" rel="stylesheet">

  <!-- 📌 Font Awesome 아이콘 -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <!-- 📌 PWA 매니페스트 연결 -->
  <link rel="manifest" href="/location-pwa/manifest.json">
  <meta name="theme-color" content="#2196F3">  
  
<style>
/* ---------------------- 기본 페이지 ---------------------- */
body {
  display:flex; justify-content:center; align-items:center;
  min-height:100vh;
  background:linear-gradient(135deg,#74ebd5,#ACB6E5);
  font-family:'Noto Sans KR','Roboto',sans-serif;
  margin:0;
}

/* ---------------------- 카드형 박스 ---------------------- */
.register-box {
  background:#fff; padding:60px 50px;
  border-radius:20px; border:1px solid #e0e0e0;
  box-shadow:0 10px 30px rgba(0,0,0,0.25);
  width:100%; max-width:520px;   /* 카드 크기 확대 */
  animation:fadeIn 0.8s ease-in-out;
}

@keyframes fadeIn { from{opacity:0; transform:translateY(20px);} to{opacity:1; transform:translateY(0);} }

/* ---------------------- 헤더 ---------------------- */
.register-box h2 { margin-bottom:25px; color:#2c3e50; font-size:30px; font-weight:700; text-align:center; }

/* ---------------------- 입력 필드 ---------------------- */
label { display:block; margin-top:20px; font-weight:500; color:#2c3e50; font-size:18px; text-align:left; }
.register-box input {
  width:100%; padding:18px; font-size:18px;
  border:1.5px solid #bdc3c7; border-radius:12px;
  margin-top:10px; box-sizing:border-box;
}
.register-box input:focus { border-color:#2980b9; box-shadow:0 0 8px rgba(41,128,185,.3); outline:none; }

/* ---------------------- 버튼 그룹 ---------------------- */
.btn-group { display:flex; justify-content:space-between; margin-top:30px; gap:15px; }
.btn-group button {
  flex:1; padding:16px; border:none; border-radius:12px;
  font-size:18px; font-weight:600; cursor:pointer;
}
.primary-btn { background:linear-gradient(to right,#3498db,#2980b9); color:#fff; }
.secondary-btn { background:#bdc3c7; color:#2c3e50; }

/* ---------------------- 체크박스 그룹 ---------------------- */
.terms-wrapper { margin-top:25px; text-align:left; }
.checkbox-group { display:flex; align-items:center; margin-bottom:12px; }
.checkbox-group input[type="checkbox"] { margin-right:10px; }
.checkbox-group span { font-size:16px; color:#2c3e50; }

/* ---------------------- 모바일 최적화 ---------------------- */
@media (max-width:767px) {
  .register-box { max-width:95%; padding:50px 30px; transform:scale(1.1); }
  .register-box h2 { font-size:26px; }
  .register-box input { font-size:17px; padding:16px; }
  .btn-group button { font-size:18px; padding:18px; }
}

</style>


</head>
<body>
  <div class="login-box">
    <h2>📍 A-DOMES | 위치정보시스템</h2>

    <!-- 입력 그룹 -->
    <div class="form-section input-group">
      <label for="id"><i class="fa fa-user user-icon"></i> 아이디</label>
      <input type="text" id="id" placeholder="아이디를 입력하세요">

      <label for="pw"><i class="fa fa-lock lock-icon"></i> 비밀번호</label>
      <input type="password" id="pw" placeholder="비밀번호를 입력하세요">
    </div>

    <!-- 버튼 그룹 -->
    <div class="form-section button-group">
      <button onclick="login()" class="login-btn">로그인</button>
      <button onclick="goRegister()" class="signup-btn">회원가입</button>
    </div>

    <div id="message"></div>
  </div>

  <!-- 로그인 성공 모달 -->
  <div id="loginModal" class="modal">
    <div class="modal-content">
      <h2>✅ 로그인 성공!</h2>
      <p>잠시 후 이동합니다...</p>
    </div>
  </div>
</body>
</html>

<!-- config.js 먼저 불러오기 -->
<script src="config.js"></script>

<script>
  const USER_API_URL = CONFIG.USER_URL;

  function login() {
    const id = document.getElementById("id").value.trim();
    const pw = document.getElementById("pw").value.trim();

    if (!id || !pw) {
      alert("⚠️ 아이디와 비밀번호를 입력하세요.");
      return;
    }

    const modal = document.getElementById("loginModal");
    modal.style.display = "block";
    modal.querySelector("h2").innerText = "🔑 서버에 로그인 중입니다...";
    modal.querySelector("p").innerText = "잠시만 기다려주세요.";

    // ✅ JSONP 방식 호출
    const callbackName = "handleLoginResponse";
    window[callbackName] = function(result) {
      if (result.result === "success") {
        modal.querySelector("h2").innerText = "✅ 로그인 성공!";
        modal.querySelector("p").innerText = "잠시 후 이동합니다...";

        sessionStorage.setItem("loggedIn", "true");
        sessionStorage.setItem("role", result.role);
        sessionStorage.setItem("userId", id);
        sessionStorage.setItem("token", result.token);
        localStorage.setItem("nickname", result.nickname);

        // ✅ role에 따라 분기 처리
        const roleRedirects = {
          "AD": "https://a-domes.github.io/location-pwa/admin.html",
          "RU": "https://a-domes.github.io/location-app/user.html"
        };

        setTimeout(() => {
          const targetUrl = roleRedirects[result.role];
          if (targetUrl) {
            window.location.href = targetUrl;
          } else {
            alert("알 수 없는 권한입니다.");
          }
        }, 1500);

      } else if (result.result === "blocked") {
        modal.style.display = "none";
        alert("🚫 계정이 비활성화되었습니다.");
      } else {
        modal.style.display = "none";
        alert("❌ 로그인 실패: 아이디 또는 비밀번호가 잘못되었습니다.");
      }
    };

    // ✅ script 태그를 동적으로 추가해서 JSONP 요청
    const script = document.createElement("script");
    script.src = `${USER_API_URL}?mode=checkPassword&id=${encodeURIComponent(id)}&pw=${encodeURIComponent(pw)}&callback=${callbackName}`;
    document.body.appendChild(script);
  }

  function goRegister() {
    window.location.href = "registerUser.html";
  }

  window.login = login;
  window.goRegister = goRegister;
</script>

</body>
</html>
