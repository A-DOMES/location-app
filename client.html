<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>현재 위치 지도</title>

  <!-- 구글 지도 API -->
  <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCOmWcR48yf1sp2RABZFQ52qnDCoWc8AJY"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      text-align: center;
      background: #f9f9f9;
    }

    /* 제목 */
    h2 {
      margin-top: 20px;
      font-size: 30px;
      color: #333;
    }

    /* 현재 위치 텍스트 */
    #locationText {
      font-size: 28px;      /* 크게 표시 */
      font-weight: bold;
      color: #d32f2f;       /* 빨간색 */
      margin: 15px 0;
      line-height: 1.5;
    }

    /* 지도 영역 */
    #map {
      width: 100%;
      height: 80vh;         /* 화면의 80% 높이 */
      border-top: 2px solid #ccc;
    }
  </style>
</head>

<body>

  <h2>📍 현재 위치</h2>

  <!-- 현재 위치 텍스트 -->
  <div id="locationText">위치 정보를 가져오는 중...</div>

  <!-- 지도 -->
  <div id="map"></div>

  <script>
    /* 현재 위치 가져오기 */
    navigator.geolocation.getCurrentPosition(
      function(pos) {

        const lat = pos.coords.latitude;
        const lng = pos.coords.longitude;

        /* 텍스트 표시 */
        document.getElementById("locationText").innerHTML =
          `현재 위치:<br><span style="font-size:32px;">${lat.toFixed(6)}, ${lng.toFixed(6)}</span>`;

        /* 지도 표시 */
        const latlng = { lat, lng };

        const map = new google.maps.Map(document.getElementById("map"), {
          center: latlng,
          zoom: 16
        });

        /* 현재 위치 마커 */
        new google.maps.Marker({
          position: latlng,
          map: map,
          title: "현재 위치",
          icon: {
            url: "http://maps.google.com/mapfiles/ms/icons/red-dot.png",
            scaledSize: new google.maps.Size(50, 50)  /* 마커 크기 키움 */
          }
        });

      },
      function(err) {
        document.getElementById("locationText").innerHTML =
          "위치 정보를 가져올 수 없습니다: " + err.message;
      }
    );
  </script>

</body>
</html>
