<script>  
// ---------------------- 전역 변수 ----------------------
let map, myMarker, pathPolyline;
let pathCoords = [];
let lastGeocodeTime = 0;
let geocodeInterval = 60000;
let radarPolygon = null;
let radarRadiusMeters = 100;   // 기본 레이더 반경 (100m)
let radarEnabled = true;
let lastHeading = null;
let poiMarkers = [];
let compassMarkers = [];
let infoWindow;
let directionsService, directionsRenderer;  // 기존 경로 안내용 (일반 목적)
let currentLat, currentLng;
let otherMarker;
let circles = [];
let totalDistance = 0;
let modalQueue = [];
let modalTimer = null;

// 최근 알림 시간을 저장할 변수
let lastSchoolZoneAlertTime = 0;
let lastDynamicZoneAlertTime = 0;  
let lastSpeedLimitAlertTime = 0;

// 속도 기록
let speedHistory = [];
let startTime = Date.now();

/* ---------------------- 추가된 전역 변수 ---------------------- */
// 실시간 이동 경로 렌더러 (내 위치를 따라가며 그려지는 경로)
let livePathRenderer = null;

// 목적지 안내 경로 렌더러 (목적지를 설정했을 때 고정된 안내 경로)
let destinationRenderer = null;

/* ---------------------- 속도 거리 측정 전역 변수 ---------------------- */  
let destinationLat = null;
let destinationLng = null;

// ---------------------- 전역 변수 ----------------------
let adminLocations = []; // 🚗 서버에서 가져온 차량 위치 데이터 저장  
  
const poiIcons = {
  cafe: "https://cdn-icons-png.flaticon.com/512/415/415733.png",
  convenience_store: "https://cdn-icons-png.flaticon.com/512/1076/1076327.png",
  restaurant: "https://cdn-icons-png.flaticon.com/512/1046/1046784.png",
  gas_station: "https://cdn-icons-png.flaticon.com/512/2933/2933914.png",
  bank: "https://cdn-icons-png.flaticon.com/512/3135/3135706.png",
  pharmacy: "https://cdn-icons-png.flaticon.com/512/2969/2969375.png",
  bus_station: "https://cdn-icons-png.flaticon.com/512/61/61088.png",
  city_hall: "https://cdn-icons-png.flaticon.com/512/148/148947.png",
  local_government_office: "https://cdn-icons-png.flaticon.com/512/148/148947.png"
};

// ---------------------- 유틸 함수 ----------------------
function getDistance(lat1, lng1, lat2, lng2) {
  const R = 6371000;
  const toRad = (v) => (v * Math.PI) / 180;
  const dLat = toRad(lat2 - lat1);
  const dLng = toRad(lng2 - lng1);
  const a = Math.sin(dLat/2)**2 +
            Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) *
            Math.sin(dLng/2)**2;
  const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
  return R * c;
}

function getDirectionLabel(heading) {
  if (heading == null) return "방향 없음";
  if (heading < 45) return "북";
  if (heading < 90) return "동북방향";
  if (heading < 135) return "동";
  if (heading < 180) return "동남방향";
  if (heading < 225) return "남";
  if (heading < 270) return "남서방향";
  if (heading < 315) return "서";
  if (heading <= 360) return "서북방향";
  return "방향 없음";
}

function updateLocationDisplay(lat, lng, heading) {
  const directionLabel = getDirectionLabel(heading);
  document.getElementById("locationDisplay").innerText =
    `현재 위치: (${lat.toFixed(5)}, ${lng.toFixed(5)}) / 방향: ${directionLabel}`;
}

function makeDraggableAndResizable(element) {
  let isDragging = false, offsetX, offsetY;

  // 마우스 드래그 시작
  element.addEventListener('mousedown', e => {
    isDragging = true;
    offsetX = e.clientX - element.offsetLeft;
    offsetY = e.clientY - element.offsetTop;
    element.style.right = "";
  });

  // 마우스 드래그 이동
  document.addEventListener('mousemove', e => {
    if (isDragging) {
      element.style.left = (e.clientX - offsetX) + 'px';
      element.style.top = (e.clientY - offsetY) + 'px';
    }
  });

  // 마우스 드래그 종료
  document.addEventListener('mouseup', () => isDragging = false);

  // 터치 드래그 시작
  element.addEventListener('touchstart', e => {
    if (e.touches.length === 1) {
      isDragging = true;
      offsetX = e.touches[0].clientX - element.offsetLeft;
      offsetY = e.touches[0].clientY - element.offsetTop;
      element.style.right = "";
    }
  });

  // 터치 드래그 이동
  document.addEventListener('touchmove', e => {
    if (isDragging && e.touches.length === 1) {
      element.style.left = (e.touches[0].clientX - offsetX) + 'px';
      element.style.top = (e.touches[0].clientY - offsetY) + 'px';
    }
  });

  // 터치 드래그 종료
  document.addEventListener('touchend', () => isDragging = false);
}

// ---------------------- 적용 부분 ----------------------
// 버튼들 이동 가능
makeDraggableAndResizable(document.getElementById("resetPathBtn"));
makeDraggableAndResizable(document.getElementById("openDestinationModal"));
makeDraggableAndResizable(document.getElementById("openTravelStatsModal"));

// ---------------------- 지도 초기화 ----------------------
function initMap() {
  map = new google.maps.Map(document.getElementById("map"), {
    zoom: 18,
    gestureHandling: "greedy",
    mapTypeId: "roadmap"
  });

  updateMapStyle(map);

  map.addListener("maptypeid_changed", () => {
    updateMapStyle(map);
    // ✅ 지도 타입 변경 시에도 로딩 메시지가 다시 나타나지 않도록 처리
    const loadingMsg = document.getElementById("loadingMessage");
    if (loadingMsg) {
      loadingMsg.style.display = "none";   // 레이아웃에서 제거
      loadingMsg.classList.add("hidden");  // CSS 강제 숨김
    }
  });

  pathPolyline = new google.maps.Polyline({
    path: pathCoords,
    geodesic: true,
    strokeColor: "#1976d2",
    strokeOpacity: 1.0,
    strokeWeight: 5,
    map: map
  });

  if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(
      pos => {
        const userPos = { lat: pos.coords.latitude, lng: pos.coords.longitude };
        map.setCenter(userPos);
        myMarker = new google.maps.Marker({ position: userPos, map, title: "내 위치" });
        drawMultipleCircles(userPos);
        startTracking();

        // ✅ 위치정보 가져오기 성공 시 로딩 메시지 완전히 제거
        const loadingMsg = document.getElementById("loadingMessage");
        if (loadingMsg) {
          loadingMsg.style.display = "none";
          loadingMsg.classList.add("hidden");
        }
      },
      () => {
        startTracking();
        // 실패 시에는 로딩 메시지를 그대로 두거나 에러 메시지 표시
      },
      { enableHighAccuracy: true }
    );
  }
}

  
function updateMapStyle(map) {
  const body = document.body;
  body.classList.remove("map-roadmap", "map-satellite");
  const type = map.getMapTypeId();
  body.classList.add(type === "roadmap" ? "map-roadmap" : "map-satellite");
}

// ---------------------- 위치 추적 ----------------------
function startTracking() {
  const geocoder = new google.maps.Geocoder();
  navigator.geolocation.watchPosition(pos => {
    // 좌표값 갱신
    currentLat = pos.coords.latitude;
    currentLng = pos.coords.longitude;
    currentSpeed = pos.coords.speed || 0;  // ✅ 속도도 저장
    const myPos = { lat: currentLat, lng: currentLng };
    let heading = pos.coords.heading || 0;
    const directionLabel = getDirectionLabel(heading);
    const now = new Date();
    const timeString = now.toLocaleTimeString("ko-KR",{hour:"2-digit",minute:"2-digit"});

    // ✅ 좌표창 업데이트 (원본 그대로 유지)
    document.getElementById("latBox").innerText = `위도: ${currentLat.toFixed(6)}`;
    document.getElementById("lngBox").innerText = `경도: ${currentLng.toFixed(6)}`;
    document.getElementById("directionBox").innerText = `현재 방향: ${directionLabel}`;
    document.getElementById("timeBox").innerText = `갱신 시간: ${timeString}`;
    document.getElementById("shareBtn").onclick = showPopup;

    if (Date.now() - lastGeocodeTime > geocodeInterval) {
      geocoder.geocode({ location: myPos }, (results, status) => {
        if (status === "OK" && results[0]) {
          let address = results[0].formatted_address.replace(/^대한민국\s*,?\s*/, "").replace(/\s*,?\s*대한민국$/, "");
          document.getElementById("addressBox").innerHTML = `<small>주소: ${address}</small>`;
        }
      });
      lastGeocodeTime = Date.now();
    }

    updateLocationDisplay(currentLat, currentLng, heading);

    // 마커 이동
    if (!myMarker) {
      myMarker = new google.maps.Marker({ position: myPos, map, title: "내 위치" });
    } else {
      myMarker.setPosition(myPos);
    }

    // 원형 표시
    drawMultipleCircles(myPos);

    // ✅ 레이더 방향 보정
    if (!heading || heading === 0) {
      if (pathCoords.length > 1) {
        const last = pathCoords[pathCoords.length - 1];
        const prev = pathCoords[pathCoords.length - 2];
        heading = google.maps.geometry.spherical.computeHeading(prev, last);
      } else {
        heading = lastHeading ?? 0;
      }
    }
    lastHeading = heading;
    updateRadarPolygon(myPos, heading);

    // ✅ 경로 polyline 갱신 (보정 함수 사용)
    updatePathPolyline(currentLat, currentLng);

    if (pathCoords.length > 1) {
      document.getElementById("resetPathBtn").style.display = "inline-block";
    }

    // ✅ 이동정보 업데이트 (좌표창에서 받은 값 그대로 사용)
    updateTravelStats();

    // 보호구역/속도 제한 체크
    checkSpeedLimit(currentLat, currentLng, currentSpeed);
    checkSchoolZones(currentLat, currentLng);
    checkDynamicSpeedZones(currentLat, currentLng, currentSpeed);

    // 레이더 탐지
    checkRadarPOIs(myPos);
  });
}

// ---------------------- 경로 보정 ----------------------
function updatePathPolyline(lat, lng) {
  if (pathCoords.length > 0) {
    const lastPoint = pathCoords[pathCoords.length - 1];
    const distance = getDistance(lastPoint.lat(), lastPoint.lng(), lat, lng);

    // ✅ 최소 이동 거리 기준 (5m 이상일 때만 추가)
    if (distance >= 5 && distance < 100) {
      pathCoords.push(new google.maps.LatLng(lat, lng));
      pathPolyline.setPath(pathCoords);
    } else if (distance >= 100) {
      // ✅ 튀는 값 보정: 이전 좌표와 새 좌표의 중간값 추가
      const midLat = (lastPoint.lat() + lat) / 2;
      const midLng = (lastPoint.lng() + lng) / 2;
      pathCoords.push(new google.maps.LatLng(midLat, midLng));
      pathPolyline.setPath(pathCoords);
    }
  } else {
    pathCoords.push(new google.maps.LatLng(lat, lng));
    pathPolyline.setPath(pathCoords);
  }
}

// ---------------------- 이동정보 업데이트 ----------------------

}

// ---------------------- 상대방 위치 표시 및 따라가기 ----------------------
function showOtherLocation(otherLat, otherLng) {
  // 1️⃣ 내 기존 경로 지우기
  pathCoords = [];
  pathPolyline.setPath([]);

  // 2️⃣ 상대방 위치 마커 표시
  if (otherMarker) otherMarker.setMap(null);
  const otherPos = { lat: otherLat, lng: otherLng };
  otherMarker = new google.maps.Marker({
    position: otherPos,
    map,
    icon: { path: google.maps.SymbolPath.CIRCLE, scale: 6, fillColor: "#00FFFF", fillOpacity: 0.9, strokeWeight: 1 },
    animation: google.maps.Animation.BOUNCE
  });
  setTimeout(() => otherMarker.setAnimation(null), 3000);

  // 3️⃣ 상대방까지 거리 표시
  const myPos = { lat: currentLat, lng: currentLng };
  const distance = getDistance(myPos.lat, myPos.lng, otherPos.lat, otherPos.lng);
  document.getElementById("distanceBox").innerText = `상대방까지 거리: ${distance.toFixed(1)} m`;

  // 4️⃣ 상대방까지 경로 안내 (내 위치 → 상대방 위치)
  if (!directionsService) directionsService = new google.maps.DirectionsService();
  if (directionsRenderer) directionsRenderer.setMap(null);
  directionsRenderer = new google.maps.DirectionsRenderer({ map });

  const request = {
    origin: { lat: currentLat, lng: currentLng },
    destination: otherPos,
    travelMode: google.maps.TravelMode.DRIVING
  };

  directionsService.route(request, (result, status) => {
    if (status === google.maps.DirectionsStatus.OK) {
      directionsRenderer.setDirections(result);
    }
  });

  // 5️⃣ 내 위치가 갱신될 때마다 경로 재계산 → 경로 줄어듦
  navigator.geolocation.watchPosition(pos => {
    currentLat = pos.coords.latitude;
    currentLng = pos.coords.longitude;

    const newRequest = {
      origin: { lat: currentLat, lng: currentLng },
      destination: otherPos,
      travelMode: google.maps.TravelMode.DRIVING
    };

    directionsService.route(newRequest, (result, status) => {
      if (status === google.maps.DirectionsStatus.OK) {
        directionsRenderer.setDirections(result);
      }
    });
  });
}

function drawMultipleCircles(myPos) {
  const circleStyles = [
    { radius: 100, strokeColor: "#FF6666" },
    { radius: 200, strokeColor: "#FF9999" }
  ];
  if (circles.length === 0) {

        center: myPos,

      circles.push(circle);
    });
  } else {

  }
}

// ---------------------- 레이더 표시 ----------------------
function updateRadarPolygon(myPos, heading) {
  // heading 값이 없으면 이동 경로로 보정
  if (!heading || heading === 0) {
    if (pathCoords.length > 1) {
      const last = pathCoords[pathCoords.length - 1];
      const prev = pathCoords[pathCoords.length - 2];
      heading = google.maps.geometry.spherical.computeHeading(prev, last);
    } else {
      heading = lastHeading ?? 0;
    }
  }
  lastHeading = heading;

  if (!radarEnabled) {
    if (radarPolygon) radarPolygon.setMap(null);
    return;
  }

  const angle = 90;
  const points = [];
  const radiusInDegrees = radarRadiusMeters / 111000;

  for (let a = -angle/2; a <= angle/2; a += 5) {
    const rad = (heading + a) * Math.PI / 180;
    const latOffset = radiusInDegrees * Math.cos(rad);
    const lngOffset = radiusInDegrees * Math.sin(rad);
    points.push({ lat: myPos.lat + latOffset, lng: myPos.lng + lngOffset });
  }
  points.unshift(myPos);

  if (radarPolygon) {
    radarPolygon.setPath(points); // ✅ 기존 레이더 갱신
  } else {
    radarPolygon = new google.maps.Polygon({
      paths: points,
      strokeColor: "#00BFFF",
      strokeOpacity: 0.8,
      strokeWeight: 2,
      fillColor: "#00BFFF",
      fillOpacity: 0.25,
      map
    });
  }
}

function showTravelStats(speed, totalDistance) {
  speedHistory.push(speed * 3.6);

  const avgSpeed = speedHistory.reduce((a, b) => a + b, 0) / speedHistory.length;
  const maxSpeed = Math.max(...speedHistory);
  const elapsedTime = ((Date.now() - startTime) / 1000 / 60).toFixed(1);

  // 직선 거리 & ETA 계산
  let directDistance = 0, eta = "계산 불가";
  if (destinationLat && destinationLng) {
    const current = new google.maps.LatLng(currentLat, currentLng);
    const destination = new google.maps.LatLng(destinationLat, destinationLng);
    directDistance = google.maps.geometry.spherical.computeDistanceBetween(current, destination);
    if (avgSpeed > 0) {
      const distanceKm = directDistance / 1000;
      const hours = distanceKm / avgSpeed;
      eta = (hours * 60).toFixed(1) + " 분";
    }
  }

  const message = `<div class="data-message">
    <span>🚗 현재 속도: <span class="highlight">${(speed * 3.6).toFixed(1)} km/h</span></span>
    <span>📊 평균 속도: <span class="highlight">${avgSpeed.toFixed(1)} km/h</span></span>
    <span>⚡ 최고 속도: <span class="highlight">${maxSpeed.toFixed(1)} km/h</span></span>
    <span>⏱️ 주행 시간: <span class="highlight">${elapsedTime} 분</span></span>
    <span>📏 총 이동 거리: <span class="highlight">${(totalDistance/1000).toFixed(2)} km</span></span>
    <span>📐 직선 거리: <span class="eta-highlight">${(directDistance/1000).toFixed(2)} km</span></span>
    <span>🕒 예상 도착 시간: <span class="eta-highlight">${eta}</span></span>
  </div>`;

  document.getElementById("travelStatsContent").innerHTML = message;
}



// ---------------------- 보호구역/속도 제한 알림 ----------------------
function showZoneAlert(zoneName, distance, limit, currentKmh, lastAlertTimeVar) {
  const now = Date.now();

  if (distance <= 50 && distance > 20) {
    if (now - lastAlertTimeVar.value > 60000) {
      const message = `<div class="alert-message">
        <p>앞으로 50m 이내에 ${zoneName}이 있습니다.</p>
        ${limit ? `<p class="speed-warning">제한속도: ${limit} km/h</p>` : ""}
      </div>`;
      showQueuedModal(`${zoneName} 접근`, message);
      playAlertSound();
      lastAlertTimeVar.value = now;
    }
  }

  if (distance <= 20) {
    if (now - lastAlertTimeVar.value > 60000) {
      let message;
      if (limit && currentKmh > limit) {
        message = `<div class="alert-message">
          <p class="speed-warning">현재 제한속도: ${limit} km/h</p>
          <p class="speed-warning">현재 속도: ${currentKmh.toFixed(1)} km/h</p>
        </div>`;
        showQueuedModal(`${zoneName} 초과`, message);
      } else {
        message = `<div class="alert-message">
          ${limit ? `<p>현재 제한속도: ${limit} km/h</p>` : ""}
          <p>주의하세요!</p>
        </div>`;
        showQueuedModal(`${zoneName} 진입`, message);
      }
      playAlertSound();
      lastAlertTimeVar.value = now;
    }
  }
}

// ---------------------- 직선거리/에상 도착 계산 ----------------------  
function showRouteToDestination(destination) {
  if (!directionsService) directionsService = new google.maps.DirectionsService();

  if (destinationRenderer) {
    destinationRenderer.setMap(null);
    destinationRenderer = null;
  }
  destinationRenderer = new google.maps.DirectionsRenderer({ map });

  const request = {
    origin: { lat: currentLat, lng: currentLng },
    destination,
    travelMode: google.maps.TravelMode.WALKING
  };

  directionsService.route(request, (result, status) => {
    if (status === google.maps.DirectionsStatus.OK) {
      destinationRenderer.setDirections(result);

      // 목적지 좌표 저장
      const destLeg = result.routes[0].legs[0];
      destinationLat = destLeg.end_location.lat();
      destinationLng = destLeg.end_location.lng();

      const steps = destLeg.steps;
      let instructions = "<div style='text-align:left; font-size:14px;'>";
      steps.forEach((step, idx) => {
        instructions += `<p>${idx + 1}. ${step.instructions} (${(step.distance.value/1000).toFixed(2)} km)</p>`;
      });
      instructions += "</div>";

      showQueuedModal("경로 안내", instructions);
    }
  });
}

// 어린이 보호구역
function checkSchoolZones(currentLat, currentLng) {
  const service = new google.maps.places.PlacesService(map);
  service.nearbySearch({
    location: { lat: currentLat, lng: currentLng },
    radius: 50,
    type: 'school'
  }, (results, status) => {
    if (status === google.maps.places.PlacesServiceStatus.OK) {
      results.forEach(school => {
        const zoneCenter = school.geometry.location;
        const distance = google.maps.geometry.spherical.computeDistanceBetween(
          new google.maps.LatLng(currentLat, currentLng),
          zoneCenter
        );
        showZoneAlert("어린이 보호구역", distance, 30, null, lastSchoolZoneAlertTime);
      });
    }
  });
}

// 동적 속도 제한 구역
async function checkDynamicSpeedZones(currentLat, currentLng, currentSpeed) {
  const currentKmh = currentSpeed * 3.6;
  try {
    const response = await fetch(`https://api.data.go.kr/openapi/tn_pubr_public_speed_limit_zone_api?serviceKey=YOUR_SERVICE_KEY&numOfRows=10&pageNo=1&latitude=${currentLat}&longitude=${currentLng}`);
    const data = await response.json();
    if (data?.response?.body?.items) {
      data.response.body.items.forEach(zone => {
        const limit = zone.lmtSpd;
        const zoneLat = parseFloat(zone.lat);
        const zoneLng = parseFloat(zone.lng);
        const distance = getDistance(zoneLat, zoneLng, currentLat, currentLng);
        showZoneAlert("속도 제한 구역", distance, limit, currentKmh, lastDynamicZoneAlertTime);
      });
    }
  } catch (err) {
    console.error("속도 제한 구역 API 호출 오류:", err);
  }
}

// 일반 속도 제한
function checkSpeedLimit(currentLat, currentLng, currentSpeed) {
  const snapUrl = `https://roads.googleapis.com/v1/snapToRoads?path=${currentLat},${currentLng}&key=YOUR_API_KEY`;
  fetch(snapUrl)
    .then(res => res.json())
    .then(data => {
      if (data.snappedPoints?.length > 0) {
        const placeId = data.snappedPoints[0].placeId;
        return fetch(`https://roads.googleapis.com/v1/speedLimits?placeId=${placeId}&key=YOUR_API_KEY`);
      }
    })
    .then(res => res.json())
    .then(limitData => {
      if (limitData.speedLimits?.length > 0) {
        const limit = limitData.speedLimits[0].speedLimit;
        const currentKmh = currentSpeed * 3.6;
        // 거리 정보가 없으므로 distance를 20 이하로 가정해 진입 알림만 표시
        showZoneAlert("속도 제한 구역", 50, limit, currentKmh, lastSpeedLimitAlertTime);
      }
    })
    .catch(err => console.error(err));
}

// ---------------------- 모달창 드래그 가능하게 만들기 ----------------------
function makeDraggableModal(element) {
  let isDragging = false, offsetX, offsetY;

  // PC용 (마우스 이벤트)
  element.addEventListener('mousedown', e => {
    isDragging = true;
    element.style.transform = "none"; // 중앙정렬 transform 제거
    offsetX = e.clientX - element.offsetLeft;
    offsetY = e.clientY - element.offsetTop;
  });

  document.addEventListener('mousemove', e => {
    if (isDragging) {
      element.style.left = (e.clientX - offsetX) + 'px';
      element.style.top = (e.clientY - offsetY) + 'px';
    }
  });

  document.addEventListener('mouseup', () => {
    isDragging = false;
  });

  // 📱 모바일용 (터치 이벤트)
  element.addEventListener('touchstart', e => {
    isDragging = true;
    element.style.transform = "none"; // 중앙정렬 transform 제거
    const touch = e.touches[0];
    offsetX = touch.clientX - element.offsetLeft;
    offsetY = touch.clientY - element.offsetTop;
  });

  document.addEventListener('touchmove', e => {
    if (isDragging) {
      const touch = e.touches[0];
      element.style.left = (touch.clientX - offsetX) + 'px';
      element.style.top = (touch.clientY - offsetY) + 'px';
    }
  });

  document.addEventListener('touchend', () => {
    isDragging = false;
  });
}

/* ---------------------- 사용자 서버에서 데이터 가져오기 ---------------------- */
async function loadAdminLocations() {
  try {
    const res = await fetch(CONFIG.USER_URL + "?mode=getLocations"); // 사용자 서버 호출
    adminLocations = await res.json(); // 배열 저장
    console.log("사용자 서버에서 가져온 데이터:", adminLocations);
  } catch (err) {
    console.error("사용자 서버 호출 오류:", err);
  }
}

/* ---------------------- 목적지 검색 기능 ---------------------- */
async function findDestination(inputName) {
  // 입력값 정규화
  const name = inputName.trim().toLowerCase().normalize("NFC");
  let match = null;

  // 1️⃣ 사용자 서버에서 가져온 배열에서 검색
  if (Array.isArray(adminLocations)) {
    match = adminLocations.find(item =>
      item.phone.trim().toLowerCase().normalize("NFC") === name
    );
  }

  if (match) {
    // 서버에서 주소까지 함께 전달
    return showDestinationOnMap(
      match.phone,
      parseFloat(match.lat),
      parseFloat(match.lng),
      match.address
    );
  }

  // 2️⃣ 외부 API (구글 Places 등) 검색
  const service = new google.maps.places.PlacesService(map);
  return new Promise((resolve) => {
    service.textSearch({ query: inputName, location: map.getCenter(), radius: 5000 }, (results, status) => {
      if (status === google.maps.places.PlacesServiceStatus.OK && results[0]) {
        const place = results[0].geometry.location;
        const address = results[0].formatted_address; // ✅ 구글에서 제공하는 주소
        showDestinationOnMap(results[0].name, place.lat(), place.lng(), address);
        resolve(true);
      } else {
        // 3️⃣ 최종 실패
        document.getElementById("destinationResult").innerText = "목적지를 찾을 수 없습니다.";
        openModal(document.getElementById("destinationModal"));
        resolve(false);
      }
    });
  });
}

/* ---------------------- 지도 표시 + 모달 ---------------------- */
function showDestinationOnMap(title, lat, lng, address="") {
  destinationLat = lat;
  destinationLng = lng;

  const pos = new google.maps.LatLng(lat, lng);

  // 청색 원
  new google.maps.Circle({
    strokeColor: "#1976d2",
    strokeOpacity: 0.9,
    strokeWeight: 2,
    fillColor: "#1976d2",
    fillOpacity: 0.25,
    map,
    center: pos,
    radius: 40
  });

  // 붉은색 커스텀 마커 (세련된 핀 모양)
  new google.maps.Marker({
    position: pos,
    map: map,
    icon: {
      path: "M12 2C8 2 5 5 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3-7-7-7z",
      fillColor: "#FF3B3B",
      fillOpacity: 0.95,
      strokeColor: "#fff",
      strokeWeight: 2,
      scale: 2,
      anchor: new google.maps.Point(12, 24)
    },
    animation: google.maps.Animation.BOUNCE,
    title: title
  });

  // 화면 이동
  map.panTo(pos);
  map.setZoom(16);

  // 좌측정렬 정보 표시 (목적지 → 좌표 → 주소)
  document.getElementById("destinationResult").innerHTML = `
    <div style="text-align:left">
      📍 목적지: ${title}<br>
      🌐 좌표: (${lat.toFixed(5)}, ${lng.toFixed(5)})<br>
      🏠 주소: ${address}
    </div>`;

  openModal(document.getElementById("destinationModal"));

  // 경로 안내 호출
  showRouteToDestination({ lat, lng });
}

/* ---------------------- 경로 안내 메시지 ---------------------- */
function showRouteToDestination(destination) {
  if (!directionsService) directionsService = new google.maps.DirectionsService();

  if (destinationRenderer) {
    destinationRenderer.setMap(null);
    destinationRenderer = null;
  }
  destinationRenderer = new google.maps.DirectionsRenderer({ map });

  const request = {
    origin: { lat: currentLat, lng: currentLng },
    destination,
    travelMode: google.maps.TravelMode.WALKING
  };

  directionsService.route(request, (result, status) => {
    if (status === google.maps.DirectionsStatus.OK) {
      destinationRenderer.setDirections(result);

      const steps = result.routes[0].legs[0].steps;
      let instructions = "<div style='text-align:left; font-size:14px;'>";
      steps.forEach((step, idx) => {
        instructions += `<p>${idx + 1}. ${step.instructions} (${(step.distance.value/1000).toFixed(2)} km)</p>`;
      });
      instructions += "</div>";

      showQueuedModal("경로 안내", instructions);
    }
  });
}

/* ---------------------- 레이더 반경 내 탐지 ---------------------- */
function checkRadarPOIs(myPos) {
  const service = new google.maps.places.PlacesService(map);

  service.nearbySearch({
    location: myPos,
    radius: radarRadiusMeters,
    type: ["cafe", "restaurant", "pharmacy", "gas_station"]
  }, (results, status) => {
    if (status === google.maps.places.PlacesServiceStatus.OK) {
      results.forEach(place => {
        const poiPos = place.geometry.location;
        const distance = google.maps.geometry.spherical.computeDistanceBetween(
          new google.maps.LatLng(currentLat, currentLng),
          poiPos
        );

        if (distance <= radarRadiusMeters) {
          const message = `<div class="alert-message">
            <p>📍 레이더 반경 내 탐지: ${place.name}</p>
            <p>거리: ${distance.toFixed(1)} m</p>
          </div>`;
          showQueuedModal("레이더 탐지", message);
        }
      });
    }
  });
}

/* ---------------------- 이동정보 업데이트 ---------------------- */
function updateTravelStats(pos) {
  const speed = pos.coords.speed || 0;
  const totalDistance = computeTotalDistance(pathCoords);
  showTravelStats(speed, totalDistance);

  const message = buildTravelStatsMessage(speedHistory, pathCoords, startTime);
  document.getElementById("travelStatsContent").innerHTML = message;
}

/* ---------------------- 총 이동거리 계산 ---------------------- */
function computeTotalDistance(coords) {
  let total = 0;
  for (let i = 1; i < coords.length; i++) {
    total += google.maps.geometry.spherical.computeDistanceBetween(
      coords[i - 1],
      coords[i]
    );
  }
  return total;
}

/* ---------------------- 이동정보 메시지 빌드 ---------------------- */
function buildTravelStatsMessage(speedHistory, pathCoords, startTime) {
  const currentSpeed = speedHistory[speedHistory.length - 1] || 0;
  const avgSpeed = speedHistory.length > 0 
    ? speedHistory.reduce((a, b) => a + b, 0) / speedHistory.length 
    : 0;
  const maxSpeed = speedHistory.length > 0 ? Math.max(...speedHistory) : 0;
  const totalDistance = computeTotalDistance(pathCoords);
  const elapsedTime = (Date.now() - startTime) / 1000; // 초 단위

  return `
    🚗 현재 속도: ${currentSpeed.toFixed(1)} km/h<br>
    📊 평균 속도: ${avgSpeed.toFixed(1)} km/h<br>
    ⚡ 최고 속도: ${maxSpeed.toFixed(1)} km/h<br>
    ⏱️ 주행 시간: ${(elapsedTime / 60).toFixed(1)} 분<br>
    📏 총 이동 거리: ${(totalDistance / 1000).toFixed(2)} km
  `;
}

/* ---------------------- 모달 열기/닫기 공통 함수 ---------------------- */
function openModal(modal) {
  modal.style.display = 'block';
}
function closeModal(modal) {
  modal.style.display = 'none';
}
function openPopupModal(modal) {
  openModal(modal);
  setTimeout(() => closeModal(modal), 5000); // 5초 후 자동 닫힘
}

/* ---------------------- 모달 닫기 버튼 처리 ---------------------- */
document.querySelectorAll('.close').forEach(btn => {
  btn.addEventListener('click', () => {
    const modal = btn.closest('.modal');
    if (modal) closeModal(modal);
  });
});
