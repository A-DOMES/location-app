<script>  
// ---------------------- 전역 변수 ----------------------
let map, myMarker, pathPolyline;   // 지도, 내 위치 마커, 경로 Polyline
let pathCoords = [];               // 이동 경로 좌표 배열

// ✅ 위치 추적 관련
let lastGeocodeTime = 0;           // 마지막 주소 갱신 시각 기록
let geocodeInterval = 60000;       // 주소 갱신 주기 (기본값: 1분)

// ✅ 레이더 관련
let radarPolygon = null;
let radarRadiusMeters = 100;       // 레이더 반경
let radarEnabled = true;
let lastHeading = null;            // 마지막 방향 값 저장

// ✅ 주변 장소/POI 관련
let poiMarkers = [];               // 주변 장소 마커 배열
let compassMarkers = [];           // 나침반 마커 배열
let infoWindow;                    // POI 정보창

// ✅ 경로 안내 관련
let directionsService, directionsRenderer;

// ✅ 현재 위치 관련
let currentLat, currentLng;
let otherMarker;                   // 상대방 위치 마커

// ✅ 원형 표시 관련
let circles = [];                  // 원형 표시용 배열

// ✅ 속도와 거리 관련
let totalDistance = 0; // 누적 이동 거리 (m 단위)
  
  // ✅ POI 아이콘 정의
  const poiIcons = {
    cafe: "https://cdn-icons-png.flaticon.com/512/415/415733.png",
    convenience_store: "https://cdn-icons-png.flaticon.com/512/1076/1076327.png",
    restaurant: "https://cdn-icons-png.flaticon.com/512/1046/1046784.png",
    gas_station: "https://cdn-icons-png.flaticon.com/512/2933/2933914.png",
    bank: "https://cdn-icons-png.flaticon.com/512/3135/3135706.png",
    pharmacy: "https://cdn-icons-png.flaticon.com/512/2969/2969375.png",
    bus_station: "https://cdn-icons-png.flaticon.com/512/61/61088.png",
    city_hall: "https://cdn-icons-png.flaticon.com/512/148/148947.png",
    local_government_office: "https://cdn-icons-png.flaticon.com/512/148/148947.png"
  };

// ---------------------- 공통 드래그 함수 (이동만) ----------------------
function makeDraggableAndResizable(element) {
  let isDragging = false, offsetX, offsetY;

  // PC 마우스
  element.addEventListener('mousedown', e => {
    isDragging = true;
    offsetX = e.clientX - element.offsetLeft;
    offsetY = e.clientY - element.offsetTop;
    element.style.right = "";
  });
  document.addEventListener('mousemove', e => {
    if (isDragging) {
      element.style.left = (e.clientX - offsetX) + 'px';
      element.style.top = (e.clientY - offsetY) + 'px';
    }
  });
  document.addEventListener('mouseup', () => isDragging = false);

  // 모바일 터치 (이동만)
  element.addEventListener('touchstart', e => {
    if (e.touches.length === 1) {
      isDragging = true;
      offsetX = e.touches[0].clientX - element.offsetLeft;
      offsetY = e.touches[0].clientY - element.offsetTop;
      element.style.right = "";
    }
  });
  document.addEventListener('touchmove', e => {
    if (isDragging && e.touches.length === 1) {
      element.style.left = (e.touches[0].clientX - offsetX) + 'px';
      element.style.top = (e.touches[0].clientY - offsetY) + 'px';
    }
  });
  document.addEventListener('touchend', () => isDragging = false);
}


  // ---------------------- 닫기/재열기 버튼 로직 ----------------------
  const locationBox = document.getElementById("locationBox");
  const reopenBtn = document.getElementById("reopenBtn");

  // 닫기 버튼 클릭 시
  document.addEventListener("click", e => {
    if (e.target && e.target.id === "closeBtn") {
      locationBox.style.display = "none";
      reopenBtn.style.display = "block";
    }
  });

  // 재열기 버튼 클릭 시
  reopenBtn.addEventListener("click", () => {
    locationBox.style.display = "block";
    reopenBtn.style.display = "none";
  });

// ---------------------- 부채꼴 레이더 (수정) ----------------------
function updateRadarPolygon(myPos, heading) {
  // heading 값이 없으면 마지막 heading 유지
  if (heading === null || heading === undefined || heading === 0) {
    if (lastHeading !== null) {
      heading = lastHeading;
    } else {
      heading = 0; // 기본값 북쪽
    }
  } else {
    lastHeading = heading; // 새로운 heading 저장
  }

  if (!radarEnabled) {
    if (radarPolygon) radarPolygon.setMap(null);
    return;
  }

  const angle = 90; // 시야각 범위
  const points = [];
  const radiusInDegrees = radarRadiusMeters / 111000;

  for (let a = -angle/2; a <= angle/2; a += 5) {
    const rad = (heading + a) * Math.PI / 180;
    const latOffset = radiusInDegrees * Math.cos(rad);
    const lngOffset = radiusInDegrees * Math.sin(rad);
    points.push({ lat: myPos.lat + latOffset, lng: myPos.lng + lngOffset });
  }
  points.unshift(myPos);

  if (radarPolygon) {
    radarPolygon.setPath(points);
  } else {
    radarPolygon = new google.maps.Polygon({
      paths: points,
      strokeColor: "#00BFFF",
      strokeOpacity: 0.8,
      strokeWeight: 2,
      fillColor: "#00BFFF",
      fillOpacity: 0.25,
      map: map
    });
  }
}


  // ---------------------- 방향 라벨 계산 ----------------------
  function getDirectionLabel(heading) {
    if (heading === null || heading === undefined) return "방향 없음";
    if (heading >= 0 && heading < 45) return "북";
    if (heading >= 45 && heading < 90) return "동북방향";
    if (heading >= 90 && heading < 135) return "동";
    if (heading >= 135 && heading < 180) return "동남방향";
    if (heading >= 180 && heading < 225) return "남";
    if (heading >= 225 && heading < 270) return "남서방향";
    if (heading >= 270 && heading < 315) return "서";
    if (heading >= 315 && heading <= 360) return "서북방향";
    return "방향 없음";
  }

  function updateLocationDisplay(lat, lng, heading) {
    const directionLabel = getDirectionLabel(heading);
    const display = document.getElementById("locationDisplay");
    display.innerText = `현재 위치: (${lat.toFixed(5)}, ${lng.toFixed(5)}) / 방향: ${directionLabel}`;
  }

  // ---------------------- 경로 안내 ----------------------
  function showRouteToDestination(destination) {
    if (!directionsService) {
      directionsService = new google.maps.DirectionsService();
    }
    if (!directionsRenderer) {
      directionsRenderer = new google.maps.DirectionsRenderer({ map: map });
    }
    const request = {
      origin: { lat: currentLat, lng: currentLng },
      destination: destination,
      travelMode: google.maps.TravelMode.WALKING
    };
    directionsService.route(request, (result, status) => {
      if (status === google.maps.DirectionsStatus.OK) {
        directionsRenderer.setDirections(result);
      } else {
        alert("경로를 가져올 수 없습니다: " + status);
      }
    });
  }

// 거리 계산 함수 (Haversine 공식)
function getDistance(lat1, lng1, lat2, lng2) {
  const R = 6371000; // 지구 반지름 (m)
  const toRad = (value) => (value * Math.PI) / 180;

  const dLat = toRad(lat2 - lat1);
  const dLng = toRad(lng2 - lng1);

  const a =
    Math.sin(dLat / 2) * Math.sin(dLat / 2) +
    Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) *
    Math.sin(dLng / 2) * Math.sin(dLng / 2);

  const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
  return R * c; // 거리(m)
}


  // ---------------------- 상대방 위치 표시 ----------------------
  function showOtherLocation(otherLat, otherLng) {
    if (otherMarker) otherMarker.setMap(null);
    const otherPos = { lat: otherLat, lng: otherLng };
    otherMarker = new google.maps.Marker({
      position: otherPos,
      map: map,
      icon: {
        path: google.maps.SymbolPath.CIRCLE,
        scale: 6,
        fillColor: "#00FFFF",
        fillOpacity: 0.9,
        strokeWeight: 1
      },
      animation: google.maps.Animation.BOUNCE
    });
    setTimeout(() => { otherMarker.setAnimation(null); }, 3000);

    // ✅ 내 위치와 상대방 위치 거리 계산
    const myPos = { lat: currentLat, lng: currentLng };
    const distance = calculateDistance(myPos, otherPos);
    document.getElementById("distanceBox").innerText =
      `상대방까지 거리: ${distance.toFixed(1)} m`;

    // ✅ 경로 안내 실행
    showRouteToDestination(otherPos);
  }

  // ---------------------- 위치 공유 함수 ----------------------
  function shareLocation(data) {
    console.log("내 위치 공유:", data);
    // 실제 구현에서는 서버/소켓을 통해 상대방에게 전달
  } 

  // ---------------------- 지도 초기화 ----------------------
  function initMap() {
    map = new google.maps.Map(document.getElementById("map"), {
      zoom: 18,
      gestureHandling: "greedy",
      mapTypeId: "roadmap"
    });

    // ✅ 초기 스타일 적용
    updateMapStyle(map);

    // ✅ 지도 타입 변경 시 자동 적용
    map.addListener("maptypeid_changed", () => {
      updateMapStyle(map);
    });

    // ✅ 경로 Polyline 생성
    pathPolyline = new google.maps.Polyline({
      path: pathCoords,
      geodesic: true,
      strokeColor: "#1976d2", // 파란색
      strokeOpacity: 1.0,
      strokeWeight: 5,        // 두꺼운 선
      map: map
    });

    // 내 위치를 가져와서 지도 중심으로 설정
    if (navigator.geolocation) {
      navigator.geolocation.getCurrentPosition(
        position => {
          const userPos = {
            lat: position.coords.latitude,
            lng: position.coords.longitude
          };
          map.setCenter(userPos);
          map.setZoom(18);

          // 내 위치 마커 표시
          myMarker = new google.maps.Marker({
            position: userPos,
            map: map,
            title: "내 위치"
          });

          drawMultipleCircles(userPos);
          startTracking();
        },
        error => {
          console.error("위치 가져오기 실패:", error);
          const fallbackPos = { lat: 34.954691, lng: 127.512740 };
          map.setCenter(fallbackPos);
          map.setZoom(18);
          startTracking();
        },
        { enableHighAccuracy: true }
      );
    } else {
      alert("이 브라우저는 위치 추적을 지원하지 않습니다.");
      const fallbackPos = { lat: 34.954691, lng: 127.512740 };
      map.setCenter(fallbackPos);
      map.setZoom(18);
      startTracking();
    }
  }

  // ---------------------- 지도 타입에 따라 스타일 자동 전환 ----------------------
  function updateMapStyle(map) {
    const body = document.body;
    body.classList.remove("map-roadmap", "map-satellite");

    const type = map.getMapTypeId();
    if (type === "roadmap") {
      body.classList.add("map-roadmap");
    } else if (type === "satellite") {
      body.classList.add("map-satellite");
    }
  }

// ---------------------- 위치 추적 ----------------------
function startTracking() {
  const geocoder = new google.maps.Geocoder();

  if (navigator.geolocation) {
    navigator.geolocation.watchPosition(
      (pos) => {
        currentLat = pos.coords.latitude;
        currentLng = pos.coords.longitude;
        const myPos = { lat: currentLat, lng: currentLng };
        const heading = pos.coords.heading || 0;
        const directionLabel = getDirectionLabel(heading);

        const now = new Date();
        const timeString = now.toLocaleTimeString("ko-KR", {hour:"2-digit",minute:"2-digit"});

        // ✅ 처음 메시지를 좌표 박스로 교체
        const content = document.getElementById("locationContent");
        if (!document.getElementById("latBox") || content.innerText.includes("위치 정보를 가져오는 중")) {
          content.innerHTML = `
            <span id="latBox"></span>
            <span id="lngBox"></span>
            <small id="directionBox"></small>
            <small id="timeBox"></small>
            <div id="addressBox"></div>
          `;
        }

        // ✅ 위치정보 갱신
        document.getElementById("latBox").innerText = `위도: ${currentLat.toFixed(6)}`;
        document.getElementById("lngBox").innerText = `경도: ${currentLng.toFixed(6)}`;
        document.getElementById("directionBox").innerText = `현재 방향: ${directionLabel}`;
        document.getElementById("timeBox").innerText = `갱신 시간: ${timeString}`;

        document.getElementById("shareBtn").onclick = showPopup;

        // ✅ 주소 변환 주기 (1분마다 갱신)
        if (Date.now() - lastGeocodeTime > geocodeInterval) {
          geocoder.geocode({ location: myPos }, (results, status) => {
            if (status === "OK" && results[0]) {
              let address = results[0].formatted_address;

              // ✅ 대한민국 표기 제거 (앞/뒤에 붙은 경우 모두 제거)
              address = address.replace(/^대한민국\s*,?\s*/, "");   // 맨 앞 제거
              address = address.replace(/\s*,?\s*대한민국$/, "");   // 맨 뒤 제거

              document.getElementById("addressBox").innerHTML = `<small>주소: ${address}</small>`;
            }
          });
          lastGeocodeTime = Date.now();
        }

        updateLocationDisplay(currentLat, currentLng, heading);

        // 마커 갱신
        if (!myMarker) {
          myMarker = new google.maps.Marker({
            position: myPos,
            map: map,
            title: "내 위치",
            icon: {
              url: "https://cdn-icons-png.flaticon.com/512/684/684908.png",
              scaledSize: new google.maps.Size(40, 40),
              anchor: new google.maps.Point(20, 40)
            }
          });
        } else {
          myMarker.setPosition(myPos);
        }

        drawMultipleCircles(myPos);
        updateRadarPolygon(myPos, heading);
        map.setCenter(myPos);

        // ✅ 경로 갱신 (3m 이상 이동 시만 추가)
        if (pathCoords.length > 0) {
          const lastPoint = pathCoords[pathCoords.length - 1];
          const distance = getDistance(lastPoint.lat(), lastPoint.lng(), currentLat, currentLng);
        
          if (distance >= 3) {   // ← 여기서 3m 기준
            pathCoords.push(new google.maps.LatLng(currentLat, currentLng));
            pathPolyline.setPath(pathCoords);
          }
        } else {
          // 첫 좌표는 무조건 추가
          pathCoords.push(new google.maps.LatLng(currentLat, currentLng));
          pathPolyline.setPath(pathCoords);
        }

        // ✅ 경로가 생기면 초기화 버튼 표시
        if (pathCoords.length > 1) {
          document.getElementById("resetPathBtn").style.display = "inline-block";
        }
      },
      (err) => {
        document.getElementById("locationContent").innerText =
          "위치 정보를 가져올 수 없습니다: " + err.message;
      },
      { enableHighAccuracy: true }
    );
  }
}

// ---------------------- 경로 초기화 버튼 로직 ----------------------
document.getElementById("resetPathBtn").addEventListener("click", () => {
  pathCoords = [];
  pathPolyline.setPath([]);
  document.getElementById("resetPathBtn").style.display = "none";
});


  // ---------------------- 닫기/재열기 버튼 ----------------------
  document.getElementById("closeBtn").addEventListener("click", () => {
    document.getElementById("locationBox").style.display = "none";
    document.getElementById("reopenBtn").style.display = "block";
  });
  document.getElementById("reopenBtn").addEventListener("click", () => {
    document.getElementById("locationBox").style.display = "block";
    document.getElementById("reopenBtn").style.display = "none";
  });


 // ---------------------- 속도 와 거리 계산 ----------------------
navigator.geolocation.watchPosition((pos) => {
  const currentLat = pos.coords.latitude;
  const currentLng = pos.coords.longitude;

  // ✅ 속도 표시
  const speed = pos.coords.speed; 
  if (speed !== null && !isNaN(speed)) {
    document.getElementById("speedBox").innerText = 
      `속도: ${(speed * 3.6).toFixed(1)} km/h`;
  }

  // ✅ 총 이동 거리 계산
  if (pathCoords.length > 0) {
    const lastPoint = pathCoords[pathCoords.length - 1];
    const distance = getDistance(lastPoint.lat(), lastPoint.lng(), currentLat, currentLng);

    if (distance >= 3) { // 3m 이상 이동 시만 추가
      totalDistance += distance;
      document.getElementById("distanceBox").innerText = 
        `총 이동 거리: ${(totalDistance/1000).toFixed(2)} km`;
    }
  }

  // 기존 경로 기록 로직
  pathCoords.push(new google.maps.LatLng(currentLat, currentLng));
  pathPolyline.setPath(pathCoords);

}, (err) => {
  console.error(err);
});

  
  // ---------------------- 원형 표시 ----------------------
  function drawMultipleCircles(myPos) {
    const circleStyles = [
      { radius: 100, strokeColor: "#FF6666" },
      { radius: 200, strokeColor: "#FF9999" }
    ];

    if (circles.length === 0) {
      circleStyles.forEach(style => {
        const circle = new google.maps.Circle({
          center: myPos,
          radius: style.radius,
          strokeColor: style.strokeColor,
          strokeOpacity: 0.8,
          strokeWeight: 2,
          fillOpacity: 0,
          map: map
        });
        circles.push(circle);
      });
    } else {
      circles.forEach(circle => {
        circle.setCenter(myPos);
      });
    }
  }

  // ---------------------- 공유 팝업 ----------------------
  async function showPopup() {
    if (!currentLat || !currentLng) {
      alert("위치 정보를 먼저 가져와야 합니다.");
      return;
    }

    const shareUrl = `https://www.google.com/maps/search/?api=1&query=${currentLat},${currentLng}`;
    await navigator.clipboard.writeText(shareUrl);

    const popup = document.getElementById("popupMessage");
    popup.style.display = "block";
    popup.style.opacity = "0";
    popup.style.top = "80px";
    document.getElementById("notifySound").play();

    setTimeout(() => { 
      popup.style.opacity = "1";
      popup.style.top = "100px";
    }, 10);

    setTimeout(() => {
      popup.style.opacity = "0";
      popup.style.top = "80px";
      setTimeout(() => { popup.style.display = "none"; }, 500);
    }, 3000);
  }

// ---------------------- 드래그 가능 ----------------------
function makeDraggableAndResizable(element) {
  let isDragging = false, offsetX, offsetY;

  // PC 마우스
  element.addEventListener('mousedown', e => {
    isDragging = true;
    offsetX = e.clientX - element.offsetLeft;
    offsetY = e.clientY - element.offsetTop;
    element.style.right = "";
  });
  document.addEventListener('mousemove', e => {
    if (isDragging) {
      element.style.left = (e.clientX - offsetX) + 'px';
      element.style.top = (e.clientY - offsetY) + 'px';
    }
  });
  document.addEventListener('mouseup', () => isDragging = false);

  // 모바일 터치
  element.addEventListener('touchstart', e => {
    if (e.touches.length === 1) {
      isDragging = true;
      offsetX = e.touches[0].clientX - element.offsetLeft;
      offsetY = e.touches[0].clientY - element.offsetTop;
      element.style.right = "";
    }
  });
  document.addEventListener('touchmove', e => {
    if (isDragging && e.touches.length === 1) {
      element.style.left = (e.touches[0].clientX - offsetX) + 'px';
      element.style.top = (e.touches[0].clientY - offsetY) + 'px';
    }
  });
  document.addEventListener('touchend', () => isDragging = false);
}

// ✅ 페이지 로드 시 초기화
window.onload = () => {
  initMap();
  makeDraggableAndResizable(document.getElementById("locationBox"));
  makeDraggableAndResizable(document.getElementById("reopenBtn"));
  makeDraggableAndResizable(document.getElementById("resetPathBtn")); // 경로 초기화 버튼도 드래그 가능
};
</script>
