<script>  
// ---------------------- 전역 변수 ----------------------
let map, myMarker, pathPolyline;
let pathCoords = [];
let lastGeocodeTime = 0;
let geocodeInterval = 60000;
let radarPolygon = null;
let radarRadiusMeters = 100;   // 기본 레이더 반경 (100m)
let radarEnabled = true;
let lastHeading = null;
let poiMarkers = [];
let compassMarkers = [];
let infoWindow;
let directionsService, directionsRenderer;  // 기존 경로 안내용 (일반 목적)
let currentLat, currentLng;
let otherMarker;
let circles = [];
let totalDistance = 0;
let modalQueue = [];
let modalTimer = null;

// 최근 알림 시간을 저장할 변수
let lastSchoolZoneAlertTime = 0;
let lastDynamicZoneAlertTime = 0;  
let lastSpeedLimitAlertTime = 0;

// 속도 기록
let speedHistory = [];
let startTime = Date.now();

/* ---------------------- 추가된 전역 변수 ---------------------- */
// 실시간 이동 경로 렌더러 (내 위치를 따라가며 그려지는 경로)
let livePathRenderer = null;

// 목적지 안내 경로 렌더러 (목적지를 설정했을 때 고정된 안내 경로)
let destinationRenderer = null;


  
const poiIcons = {
  cafe: "https://cdn-icons-png.flaticon.com/512/415/415733.png",
  convenience_store: "https://cdn-icons-png.flaticon.com/512/1076/1076327.png",
  restaurant: "https://cdn-icons-png.flaticon.com/512/1046/1046784.png",
  gas_station: "https://cdn-icons-png.flaticon.com/512/2933/2933914.png",
  bank: "https://cdn-icons-png.flaticon.com/512/3135/3135706.png",
  pharmacy: "https://cdn-icons-png.flaticon.com/512/2969/2969375.png",
  bus_station: "https://cdn-icons-png.flaticon.com/512/61/61088.png",
  city_hall: "https://cdn-icons-png.flaticon.com/512/148/148947.png",
  local_government_office: "https://cdn-icons-png.flaticon.com/512/148/148947.png"
};

// ---------------------- 유틸 함수 ----------------------
function getDistance(lat1, lng1, lat2, lng2) {
  const R = 6371000;
  const toRad = (v) => (v * Math.PI) / 180;
  const dLat = toRad(lat2 - lat1);
  const dLng = toRad(lng2 - lng1);
  const a = Math.sin(dLat/2)**2 +
            Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) *
            Math.sin(dLng/2)**2;
  const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
  return R * c;
}

function getDirectionLabel(heading) {
  if (heading == null) return "방향 없음";
  if (heading < 45) return "북";
  if (heading < 90) return "동북방향";
  if (heading < 135) return "동";
  if (heading < 180) return "동남방향";
  if (heading < 225) return "남";
  if (heading < 270) return "남서방향";
  if (heading < 315) return "서";
  if (heading <= 360) return "서북방향";
  return "방향 없음";
}

function updateLocationDisplay(lat, lng, heading) {
  const directionLabel = getDirectionLabel(heading);
  document.getElementById("locationDisplay").innerText =
    `현재 위치: (${lat.toFixed(5)}, ${lng.toFixed(5)}) / 방향: ${directionLabel}`;
}

function makeDraggableAndResizable(element) {
  let isDragging = false, offsetX, offsetY;
  element.addEventListener('mousedown', e => {
    isDragging = true;
    offsetX = e.clientX - element.offsetLeft;
    offsetY = e.clientY - element.offsetTop;
    element.style.right = "";
  });
  document.addEventListener('mousemove', e => {
    if (isDragging) {
      element.style.left = (e.clientX - offsetX) + 'px';
      element.style.top = (e.clientY - offsetY) + 'px';
    }
  });
  document.addEventListener('mouseup', () => isDragging = false);
  element.addEventListener('touchstart', e => {
    if (e.touches.length === 1) {
      isDragging = true;
      offsetX = e.touches[0].clientX - element.offsetLeft;
      offsetY = e.touches[0].clientY - element.offsetTop;
      element.style.right = "";
    }
  });
  document.addEventListener('touchmove', e => {
    if (isDragging && e.touches.length === 1) {
      element.style.left = (e.touches[0].clientX - offsetX) + 'px';
      element.style.top = (e.touches[0].clientY - offsetY) + 'px';
    }
  });
  document.addEventListener('touchend', () => isDragging = false);
}

// ---------------------- 지도 초기화 ----------------------
function initMap() {
  map = new google.maps.Map(document.getElementById("map"), {
    zoom: 18,
    gestureHandling: "greedy",
    mapTypeId: "roadmap"
  });

  updateMapStyle(map);

  map.addListener("maptypeid_changed", () => {
    updateMapStyle(map);
    // ✅ 지도 타입 변경 시에도 로딩 메시지가 다시 나타나지 않도록 처리
    const loadingMsg = document.getElementById("loadingMessage");
    if (loadingMsg) {
      loadingMsg.style.display = "none";   // 레이아웃에서 제거
      loadingMsg.classList.add("hidden");  // CSS 강제 숨김
    }
  });

  pathPolyline = new google.maps.Polyline({
    path: pathCoords,
    geodesic: true,
    strokeColor: "#1976d2",
    strokeOpacity: 1.0,
    strokeWeight: 5,
    map: map
  });

  if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(
      pos => {
        const userPos = { lat: pos.coords.latitude, lng: pos.coords.longitude };
        map.setCenter(userPos);
        myMarker = new google.maps.Marker({ position: userPos, map, title: "내 위치" });
        drawMultipleCircles(userPos);
        startTracking();

        // ✅ 위치정보 가져오기 성공 시 로딩 메시지 완전히 제거
        const loadingMsg = document.getElementById("loadingMessage");
        if (loadingMsg) {
          loadingMsg.style.display = "none";
          loadingMsg.classList.add("hidden");
        }
      },
      () => {
        startTracking();
        // 실패 시에는 로딩 메시지를 그대로 두거나 에러 메시지 표시
      },
      { enableHighAccuracy: true }
    );
  }
}



function updateMapStyle(map) {
  const body = document.body;
  body.classList.remove("map-roadmap", "map-satellite");
  const type = map.getMapTypeId();
  body.classList.add(type === "roadmap" ? "map-roadmap" : "map-satellite");
}

// ---------------------- 위치 추적 ----------------------
function startTracking() {
  const geocoder = new google.maps.Geocoder();
  navigator.geolocation.watchPosition(pos => {
    currentLat = pos.coords.latitude;
    currentLng = pos.coords.longitude;
    const myPos = { lat: currentLat, lng: currentLng };
    const heading = pos.coords.heading || 0;
    const directionLabel = getDirectionLabel(heading);
    const now = new Date();
    const timeString = now.toLocaleTimeString("ko-KR",{hour:"2-digit",minute:"2-digit"});
    document.getElementById("latBox").innerText = `위도: ${currentLat.toFixed(6)}`;
    document.getElementById("lngBox").innerText = `경도: ${currentLng.toFixed(6)}`;
    document.getElementById("directionBox").innerText = `현재 방향: ${directionLabel}`;
    document.getElementById("timeBox").innerText = `갱신 시간: ${timeString}`;
    document.getElementById("shareBtn").onclick = showPopup;
    if (Date.now() - lastGeocodeTime > geocodeInterval) {
      geocoder.geocode({ location: myPos }, (results, status) => {
        if (status === "OK" && results[0]) {
          let address = results[0].formatted_address.replace(/^대한민국\s*,?\s*/, "").replace(/\s*,?\s*대한민국$/, "");
          document.getElementById("addressBox").innerHTML = `<small>주소: ${address}</small>`;
        }
      });
      lastGeocodeTime = Date.now();
    }
    updateLocationDisplay(currentLat, currentLng, heading);
    if (!myMarker) {
      myMarker = new google.maps.Marker({ position: myPos, map, title: "내 위치" });
    } else {
      myMarker.setPosition(myPos);
    }
    drawMultipleCircles(myPos);
    updateRadarPolygon(myPos, heading);
    map.setCenter(myPos);
    if (pathCoords.length > 0) {
      const lastPoint = pathCoords[pathCoords.length-1];
      const distance = getDistance(lastPoint.lat(), lastPoint.lng(), currentLat, currentLng);
      if (distance >= 3) {
        pathCoords.push(new google.maps.LatLng(currentLat, currentLng));
        pathPolyline.setPath(pathCoords);
      }
    } else {
      pathCoords.push(new google.maps.LatLng(currentLat, currentLng));
      pathPolyline.setPath(pathCoords);
    }
    if (pathCoords.length > 1) {
      document.getElementById("resetPathBtn").style.display = "inline-block";
    }
    updateTravelStats(pos);
    checkSpeedLimit(currentLat, currentLng, pos.coords.speed);
    checkSchoolZones(currentLat, currentLng);
    checkDynamicSpeedZones(currentLat, currentLng, pos.coords.speed);

    // ✅ 레이더 반경 내 사물 탐지 추가
    checkRadarPOIs(myPos);
  });
}

// ---------------------- 기타 기능 ----------------------

// 경로 안내
function showRouteToDestination(destination) {
  if (!directionsService) directionsService = new google.maps.DirectionsService();
  if (!directionsRenderer) directionsRenderer = new google.maps.DirectionsRenderer({ map });

  const request = {
    origin: { lat: currentLat, lng: currentLng },
    destination,
    travelMode: google.maps.TravelMode.WALKING
  };

  directionsService.route(request, (result, status) => {
    if (status === google.maps.DirectionsStatus.OK) {
      directionsRenderer.setDirections(result);
    } else {
      alert("경로를 가져올 수 없습니다: " + status);
    }
  });
}

// 원형 표시
function drawMultipleCircles(myPos) {
  const circleStyles = [
    { radius: 100, strokeColor: "#FF6666" },
    { radius: 200, strokeColor: "#FF9999" }
  ];
  if (circles.length === 0) {
    circleStyles.forEach(style => {
      const circle = new google.maps.Circle({
        center: myPos,
        radius: style.radius,
        strokeColor: style.strokeColor,
        strokeOpacity: 0.8,
        strokeWeight: 2,
        fillOpacity: 0,
        map
      });
      circles.push(circle);
    });
  } else {
    circles.forEach(circle => circle.setCenter(myPos));
  }
}

// 레이더 표시
function updateRadarPolygon(myPos, heading) {
  if (heading == null || heading === 0) heading = lastHeading ?? 0;
  else lastHeading = heading;

  if (!radarEnabled) {
    if (radarPolygon) radarPolygon.setMap(null);
    return;
  }

  const angle = 90;
  const points = [];
  const radiusInDegrees = radarRadiusMeters / 111000;

  for (let a = -angle/2; a <= angle/2; a += 5) {
    const rad = (heading + a) * Math.PI / 180;
    const latOffset = radiusInDegrees * Math.cos(rad);
    const lngOffset = radiusInDegrees * Math.sin(rad);
    points.push({ lat: myPos.lat + latOffset, lng: myPos.lng + lngOffset });
  }
  points.unshift(myPos);

  if (radarPolygon) radarPolygon.setPath(points);
  else {
    radarPolygon = new google.maps.Polygon({
      paths: points,
      strokeColor: "#00BFFF",
      strokeOpacity: 0.8,
      strokeWeight: 2,
      fillColor: "#00BFFF",
      fillOpacity: 0.25,
      map
    });
  }
}

// ---------------------- 모달 큐 표시 ----------------------
function showQueuedModal(title, message, actions = []) {
  modalQueue.push({ title, message, actions });
  if (!modalTimer) {
    modalTimer = setInterval(() => {
      if (modalQueue.length > 0) {
        const next = modalQueue.shift();
        document.getElementById("modalTitle").innerText = next.title;
        // 메시지를 HTML로 넣어야 <div>, <p> 태그가 적용됨
        document.getElementById("modalMessage").innerHTML = next.message;
        const actionsBox = document.getElementById("modalActions");
        actionsBox.innerHTML = "";
        next.actions.forEach(action => {
          const btn = document.createElement("button");
          btn.innerText = action.label;
          btn.onclick = action.onClick;
          actionsBox.appendChild(btn);
        });
        document.getElementById("popupModal").style.display = "block";
      } else {
        clearInterval(modalTimer);
        modalTimer = null;
      }
    }, 5000);
  }
}

// ---------------------- 보호구역/속도 제한 알림 ----------------------
function showZoneAlert(zoneName, distance, limit, currentKmh, lastAlertTimeVar) {
  const now = Date.now();

  if (distance <= 50 && distance > 20) {
    if (now - lastAlertTimeVar.value > 60000) {
      const message = `<div class="alert-message">
        <p>앞으로 50m 이내에 ${zoneName}이 있습니다.</p>
        ${limit ? `<p class="speed-warning">제한속도: ${limit} km/h</p>` : ""}
      </div>`;
      showQueuedModal(`${zoneName} 접근`, message);
      playAlertSound();
      lastAlertTimeVar.value = now;
    }
  }

  if (distance <= 20) {
    if (now - lastAlertTimeVar.value > 60000) {
      let message;
      if (limit && currentKmh > limit) {
        message = `<div class="alert-message">
          <p class="speed-warning">현재 제한속도: ${limit} km/h</p>
          <p class="speed-warning">현재 속도: ${currentKmh.toFixed(1)} km/h</p>
        </div>`;
        showQueuedModal(`${zoneName} 초과`, message);
      } else {
        message = `<div class="alert-message">
          ${limit ? `<p>현재 제한속도: ${limit} km/h</p>` : ""}
          <p>주의하세요!</p>
        </div>`;
        showQueuedModal(`${zoneName} 진입`, message);
      }
      playAlertSound();
      lastAlertTimeVar.value = now;
    }
  }
}

// 어린이 보호구역
function checkSchoolZones(currentLat, currentLng) {
  const service = new google.maps.places.PlacesService(map);
  service.nearbySearch({
    location: { lat: currentLat, lng: currentLng },
    radius: 2000,
    type: 'school'
  }, (results, status) => {
    if (status === google.maps.places.PlacesServiceStatus.OK) {
      results.forEach(school => {
        const zoneCenter = school.geometry.location;
        const distance = google.maps.geometry.spherical.computeDistanceBetween(
          new google.maps.LatLng(currentLat, currentLng),
          zoneCenter
        );
        showZoneAlert("어린이 보호구역", distance, 30, null, lastSchoolZoneAlertTime);
      });
    }
  });
}

// 동적 속도 제한 구역
async function checkDynamicSpeedZones(currentLat, currentLng, currentSpeed) {
  const currentKmh = currentSpeed * 3.6;
  try {
    const response = await fetch(`https://api.data.go.kr/openapi/tn_pubr_public_speed_limit_zone_api?serviceKey=YOUR_SERVICE_KEY&numOfRows=10&pageNo=1&latitude=${currentLat}&longitude=${currentLng}`);
    const data = await response.json();
    if (data?.response?.body?.items) {
      data.response.body.items.forEach(zone => {
        const limit = zone.lmtSpd;
        const zoneLat = parseFloat(zone.lat);
        const zoneLng = parseFloat(zone.lng);
        const distance = getDistance(zoneLat, zoneLng, currentLat, currentLng);
        showZoneAlert("속도 제한 구역", distance, limit, currentKmh, lastDynamicZoneAlertTime);
      });
    }
  } catch (err) {
    console.error("속도 제한 구역 API 호출 오류:", err);
  }
}

// 일반 속도 제한
function checkSpeedLimit(currentLat, currentLng, currentSpeed) {
  const snapUrl = `https://roads.googleapis.com/v1/snapToRoads?path=${currentLat},${currentLng}&key=YOUR_API_KEY`;
  fetch(snapUrl)
    .then(res => res.json())
    .then(data => {
      if (data.snappedPoints?.length > 0) {
        const placeId = data.snappedPoints[0].placeId;
        return fetch(`https://roads.googleapis.com/v1/speedLimits?placeId=${placeId}&key=YOUR_API_KEY`);
      }
    })
    .then(res => res.json())
    .then(limitData => {
      if (limitData.speedLimits?.length > 0) {
        const limit = limitData.speedLimits[0].speedLimit;
        const currentKmh = currentSpeed * 3.6;
        // 거리 정보가 없으므로 distance를 20 이하로 가정해 진입 알림만 표시
        showZoneAlert("속도 제한 구역", 20, limit, currentKmh, lastSpeedLimitAlertTime);
      }
    })
    .catch(err => console.error(err));
}

// ---------------------- 모달창 드래그 가능하게 만들기 ----------------------
function makeDraggableModal(element) {
  let isDragging = false, offsetX, offsetY;

  // PC용 (마우스 이벤트)
  element.addEventListener('mousedown', e => {
    isDragging = true;
    element.style.transform = "none"; // 중앙정렬 transform 제거
    offsetX = e.clientX - element.offsetLeft;
    offsetY = e.clientY - element.offsetTop;
  });

  document.addEventListener('mousemove', e => {
    if (isDragging) {
      element.style.left = (e.clientX - offsetX) + 'px';
      element.style.top = (e.clientY - offsetY) + 'px';
    }
  });

  document.addEventListener('mouseup', () => {
    isDragging = false;
  });

  // 📱 모바일용 (터치 이벤트)
  element.addEventListener('touchstart', e => {
    isDragging = true;
    element.style.transform = "none"; // 중앙정렬 transform 제거
    const touch = e.touches[0];
    offsetX = touch.clientX - element.offsetLeft;
    offsetY = touch.clientY - element.offsetTop;
  });

  document.addEventListener('touchmove', e => {
    if (isDragging) {
      const touch = e.touches[0];
      element.style.left = (touch.clientX - offsetX) + 'px';
      element.style.top = (touch.clientY - offsetY) + 'px';
    }
  });

  document.addEventListener('touchend', () => {
    isDragging = false;
  });
}

/* ---------------------- 목적지 검색 기능 연결 ---------------------- */
document.getElementById("searchDestinationBtn").addEventListener("click", async () => {
  const name = document.getElementById("destinationInput").value;
  if (!name) {
    document.getElementById("destinationResult").innerText = "목적지를 입력하세요.";
    return;
  }

  try {
    // 사용자 서버 호출 → 관리자 서버 데이터 가져오기
    const response = await fetch("/api/location?mode=getLocations");
    const data = await response.json();   // JSON 배열

    // 입력값 정규화
    const inputName = name.trim().toLowerCase();

    // phone 값과 입력값 매칭 (부분 일치 허용)
    const match = data.find(item =>
      String(item.phone).trim().toLowerCase().includes(inputName)
    );

    if (match) {
      const destLat = parseFloat(match.lat);
      const destLng = parseFloat(match.lng);

      // ✅ 목적지 마커 표시
      new google.maps.Marker({
        position: { lat: destLat, lng: destLng },
        map: map,
        icon: "http://maps.google.com/mapfiles/ms/icons/blue-dot.png",
        title: match.phone
      });

      // ✅ 거리 계산
      const distanceMeters = getDistance(currentLat, currentLng, destLat, destLng);
      const distanceKm = (distanceMeters / 1000).toFixed(2);

      // ✅ 예상 도착 시간
      let avgSpeed = 30;
      if (speedHistory.length > 0) {
        avgSpeed = speedHistory.reduce((a, b) => a + b, 0) / speedHistory.length;
      }
      const estimatedMinutes = ((distanceKm / avgSpeed) * 60).toFixed(1);

      // ✅ 결과 표시
      document.getElementById("destinationResult").innerHTML =
        `목적지(별명): ${match.phone}<br>
         좌표: (${destLat.toFixed(5)}, ${destLng.toFixed(5)})<br>
         직선 거리: ${distanceKm} km<br>
         예상 도착 시간: ${estimatedMinutes} 분`;

      // ✅ 경로 안내 호출
      showRouteToDestination({ lat: destLat, lng: destLng });
    } else {
      document.getElementById("destinationResult").innerText = "목적지를 찾을 수 없습니다.";
    }
  } catch (err) {
    console.error("목적지 조회 오류:", err);
    document.getElementById("destinationResult").innerText = "서버 요청 실패";
  }
});

/* ---------------------- 경로 안내 메시지 ---------------------- */
function showRouteToDestination(destination) {
  if (!directionsService) directionsService = new google.maps.DirectionsService();

  if (destinationRenderer) {
    destinationRenderer.setMap(null);
    destinationRenderer = null;
  }
  destinationRenderer = new google.maps.DirectionsRenderer({ map });

  const request = {
    origin: { lat: currentLat, lng: currentLng },
    destination,
    travelMode: google.maps.TravelMode.WALKING
  };

  directionsService.route(request, (result, status) => {
    if (status === google.maps.DirectionsStatus.OK) {
      destinationRenderer.setDirections(result);

      const steps = result.routes[0].legs[0].steps;
      let instructions = "<div style='text-align:left; font-size:14px;'>";
      steps.forEach((step, idx) => {
        instructions += `<p>${idx + 1}. ${step.instructions} (${(step.distance.value/1000).toFixed(2)} km)</p>`;
      });
      instructions += "</div>";

      showQueuedModal("경로 안내", instructions);
    }
  });
}

/* ---------------------- 레이더 반경 내 탐지 ---------------------- */
function checkRadarPOIs(myPos) {
  const service = new google.maps.places.PlacesService(map);

  service.nearbySearch({
    location: myPos,
    radius: radarRadiusMeters,
    type: ["cafe", "restaurant", "pharmacy", "gas_station"]
  }, (results, status) => {
    if (status === google.maps.places.PlacesServiceStatus.OK) {
      results.forEach(place => {
        const poiPos = place.geometry.location;

        const distance = google.maps.geometry.spherical.computeDistanceBetween(
          new google.maps.LatLng(currentLat, currentLng),
          poiPos
        );

        if (distance <= radarRadiusMeters) {
          const message = `<div class="alert-message">
            <p>📍 레이더 반경 내 탐지: ${place.name}</p>
            <p>거리: ${distance.toFixed(1)} m</p>
          </div>`;
          showQueuedModal("레이더 탐지", message);
        }
      });
    }
  });
}
