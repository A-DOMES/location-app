<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>지도 버튼</title>
  <style>
    .button-group {
      display: flex;
      justify-content: center;
      gap: 12px;
      margin: 20px auto;
      max-width: 420px;
    }
    .map-btn {
      width: 60px;
      height: 60px;
      cursor: pointer;
    }
    #map { width:100%; height:100vh; }
  </style>
  <!-- Google Maps API (API 키 필요) -->
  <script async defer
    src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCOmWcR48yf1sp2RABZFQ52qnDCoWc8AJY">
  </script>
</head>
<body>
  <div class="button-group">
    <!-- 지도 버튼: 위치전송 버튼 왼쪽 -->
    <img src="btn-current.png" alt="지도 버튼" class="map-btn" onclick="showCurrentLocation()">

    <!-- 위치 전송 버튼 -->
    <button type="button" id="sendBtn">위치 전송</button>
  </div>

  <div id="map"></div>

  <script>
    let map;

    function showCurrentLocation() {
      if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(function(pos) {
          const latlng = {lat: pos.coords.latitude, lng: pos.coords.longitude};
          map = new google.maps.Map(document.getElementById("map"), {
            center: latlng,
            zoom: 14
          });
          new google.maps.Marker({
            position: latlng,
            map: map,
            title: "현재 위치"
          });
        }, function(err) {
          alert("위치 정보를 가져올 수 없습니다: " + err.message);
        });
      }
    }
  </script>
</body>
</html>
