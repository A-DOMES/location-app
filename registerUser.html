<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>회원가입</title>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&family=Noto+Sans+KR&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Noto Sans KR', 'Roboto', sans-serif;
      background: linear-gradient(135deg, #74ebd5, #ACB6E5);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    .register-box {
      position: relative;
      background: #fff;
      padding: 40px 30px;
      border-radius: 20px;
      box-shadow: 0 12px 32px rgba(0,0,0,0.2);
      width: 420px;
      text-align: center;
      animation: fadeIn 1s ease-in-out;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .register-box h2 {
      margin-bottom: 15px;
      color: #2c3e50;
      font-size: 26px;
      font-weight: 700;
      text-align: left;
    }
    .register-box p {
      color:#7f8c8d;
      font-size:14px;
      margin-bottom:20px;
      text-align: left;
      line-height: 1.6;
    }
    label {
      display:block;
      margin-top:15px;
      font-weight:500;
      color:#2c3e50;
      text-align:left;
    }
    .input-group {
      display: flex;
      align-items: center;
      margin: 12px 0;
    }
    .input-group input {
      flex: 1;
      padding: 14px;
      border: 1.5px solid #bdc3c7;
      border-radius: 10px 0 0 10px;
      font-size: 15px;
    }
    .check-btn {
      padding: 14px 20px;
      border: none;
      border-radius: 0 10px 10px 0;
      background: linear-gradient(to right, #3498db, #2980b9);
      color: #fff;
      cursor: pointer;
      font-weight: 500;
    }
    .register-box input {
      width: 90%;
      padding: 14px;
      margin: 12px auto;
      border: 1.5px solid #bdc3c7;
      border-radius: 10px;
      font-size: 15px;
      display:block;
    }
    .btn-group {
      display: flex;
      justify-content: space-between;
      margin-top: 20px;
    }
    .btn-group button {
      flex: 1;
      margin: 0 5px;
      padding: 12px;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      cursor: pointer;
      font-weight: 500;
    }
    .primary-btn {
      background: linear-gradient(to right, #3498db, #2980b9);
      color: #fff;
    }
    .secondary-btn {
      background: #bdc3c7;
      color: #2c3e50;
    }
    #idMessage, #message {
      margin-top: 10px;
      font-size: 14px;
      font-weight: bold;
    }
    .close-btn {
      position: absolute;
      top: 15px;
      right: 20px;
      background: none;
      border: none;
      font-size: 20px;
      color: #7f8c8d;
      cursor: pointer;
    }
    .close-btn:hover {
      color: #e74c3c;
    }

    /* ✅ 체크박스 그룹 스타일 */
    .checkbox-group {
      margin-left: 15px;
      display: inline-flex;
      align-items: center;
      white-space: nowrap;
      margin-bottom: 12px;
    }
    .checkbox-group input[type="checkbox"] {
      margin-right: 5px; /* 체크박스와 문구 사이 5px 간격 */
    }

    /* ✅ 반응형 처리 */
    @media (max-width: 600px) {
      .register-box {
        width: 95%;
        padding: 20px;
      }
      .register-box h2 {
        font-size: 22px;
      }
      .register-box p {
        font-size: 13px;
      }
      .checkbox-group span {
        font-size: 0.95rem;
      }
    }
  </style>
</head>
<body>
  <div class="register-box">
    <!-- 닫기 버튼 -->
    <button class="close-btn" onclick="closeRegister()">✖</button>

    <h2>📍 A-DOMES | 위치정보시스템</h2>
    <p>현재 위치와 이동 경로를 확인할 수 있는 스마트 위치정보 앱입니다.<br>
       아래 정보를 입력하여 계정을 생성하세요.</p>

    <!-- 아이디 입력 -->
    <label for="id">회원 ID 입력</label>
    <div class="input-group">
      <input type="text" id="id" placeholder="아이디 (5~20자, 영문 소문자/숫자/-,_)">
      <button class="check-btn" onclick="checkId()">확인</button>
    </div>
    <div id="idMessage"></div>

    <!-- 비밀번호 입력 -->
    <label for="pw">비밀번호 입력</label>
    <input type="password" id="pw" placeholder="비밀번호 (8~16자, 영문/숫자/특수문자)">
    
    <!-- 비밀번호 확인 -->
    <label for="pwConfirm">비밀번호 확인</label>
    <input type="password" id="pwConfirm" placeholder="비밀번호 확인">

    <!-- 표시 이름 입력 -->
    <label for="name">표시 이름 입력</label>
    <input type="text" id="name" placeholder="다른 사용자에게 보여질 이름">

    <!-- 약관 동의 -->
    <div class="terms" style="text-align:left; margin-top:15px;">
      <label style="margin-bottom:6px;">이용약관 동의</label>
      <div class="checkbox-group">
        <input type="checkbox" id="agree1">
        <span>이용약관에 동의합니다</span>
      </div>

      <label style="margin-bottom:6px; margin-top:15px;">개인정보 수집 및 이용 동의</label>
      <div class="checkbox-group">
        <input type="checkbox" id="agree2">
        <span>개인정보 수집 및 이용동의에 수락합니다</span>
      </div>
    </div>

    <!-- 회원가입 등록 / 취소 -->
    <div class="btn-group">
      <button class="primary-btn" onclick="register()">회원가입 등록</button>
      <button class="secondary-btn" onclick="closeRegister()">취소</button>
    </div>

    <div id="message"></div>
    
    <!-- ✅ 하단 앱 설명 -->
    <p style="color:#2c3e50; font-size:13px; margin-top:25px; line-height:1.6; text-align:left;">
      A-DOMES | 위치정보시스템은 현재 위치를 확인하고<br>
      이동 경로를 기록·분석할 수 있는 서비스입니다.<br>
      안전한 이동과 생활 편의를 위해 회원가입 후 이용해 주세요.
    </p>
  </div>

<script>
  function checkId() {
    var id = document.getElementById("id").value.trim();
    var msg = document.getElementById("idMessage");

    // ============================
    // 📌 1. 아이디 규칙 검사 (정규식)
    // ============================
    const idRegex = /^[a-z0-9-_]{5,20}$/;
    if (!idRegex.test(id)) {
      msg.style.color = "red";
      msg.innerText = "⚠️ 아이디는 5~20자, 영문 소문자/숫자/-,_만 가능합니다.";
      return;
    }

    // ============================
    // 📌 2. 중복검사 진행 안내 메시지
    // ============================
    msg.style.color = "#2980b9";
    msg.innerText = "⏳ 아이디 중복 검사 중...";

    // ============================
    // 📌 3. 서버와 통신 (Google Apps Script)
    //     checkUserId(id) 함수 호출
    // ============================
    google.script.run
      .withSuccessHandler(function(result) {
        // ============================
        // 📌 4. 검사 결과 처리
        // ============================
        if (result.result === "exists") {
          msg.style.color = "red";
          msg.innerText = "⚠️ 이미 사용 중인 아이디입니다.";
        } else if (result.result === "available") {
          msg.style.color = "green";
          msg.innerText = "✅ 사용 가능한 아이디입니다.";
        } else if (result.result === "missing") {
          msg.style.color = "orange";
          msg.innerText = "⚠️ 아이디를 입력하세요.";
        } else {
          msg.style.color = "red";
          msg.innerText = "❌ 아이디 검사 실패. 다시 시도하세요.";
        }
      })
      .withFailureHandler(function(error) {
        // 서버 오류 처리
        msg.style.color = "red";
        msg.innerText = "❌ 서버 오류: " + error.message;
      })
      .checkUserId(id); // ✅ 서버측 함수 호출
  }

  function register() {
    var id = document.getElementById("id").value.trim();
    var pw = document.getElementById("pw").value.trim();
    var pwConfirm = document.getElementById("pwConfirm").value.trim();
    var name = document.getElementById("name").value.trim();
    var agree1 = document.getElementById("agree1").checked;
    var agree2 = document.getElementById("agree2").checked;
    var msg = document.getElementById("message");

    // ============================
    // 📌 아이디 규칙 검사
    // ============================
    const idRegex = /^[a-z0-9-_]{5,20}$/;
    if (!idRegex.test(id)) {
      msg.style.color = "red";
      msg.innerText = "⚠️ 아이디는 5~20자, 영문 소문자/숫자/-,_만 가능합니다.";
      return;
    }

    // ============================
    // 📌 비밀번호 규칙 검사
    // ============================
    const pwRegex = /^[A-Za-z0-9!@#$%^&*()_+]{8,16}$/;
    if (!pwRegex.test(pw)) {
      msg.style.color = "red";
      msg.innerText = "⚠️ 비밀번호는 8~16자, 영문/숫자/특수문자 조합이어야 합니다.";
      return;
    }

    // ============================
    // 📌 비밀번호 확인
    // ============================
    if (pw !== pwConfirm) {
      msg.style.color = "red";
      msg.innerText = "⚠️ 비밀번호가 일치하지 않습니다.";
      return;
    }

    // ============================
    // 📌 필수 항목 확인
    // ============================
    if (!id || !pw || !name) {
      msg.style.color = "red";
      msg.innerText = "⚠️ 모든 항목을 입력해야 합니다.";
      return;
    }

    // ============================
    // 📌 약관 동의 확인
    // ============================
    if (!agree1 || !agree2) {
      msg.style.color = "red";
      msg.innerText = "⚠️ 약관에 모두 동의해야 회원가입이 가능합니다.";
      return;
    }

    // ============================
    // 📌 서버와 통신 (회원가입 처리)
    // ============================
    google.script.run
      .withSuccessHandler(function(result) {
        if (result.result === "success") {
          msg.style.color = "#27ae60";
          msg.innerHTML = 
            "✅ " + result.name + "님, 회원가입을 축하드립니다 🎉<br><br>" +
            "<button onclick='goLogin()'>확인</button>";
        } else if (result.result === "exists") {
          msg.style.color = "red";
          msg.innerHTML = "⚠️ 이미 존재하는 아이디입니다.";
        } else if (result.result === "missing") {
          msg.style.color = "red";
          msg.innerHTML = "⚠️ 모든 항목을 입력해야 합니다.";
        } else {
          msg.style.color = "red";
          msg.innerHTML = "❌ 회원가입 실패. 다시 시도하세요.";
        }
      })
      .withFailureHandler(function(error) {
        // 서버 오류 처리
        msg.style.color = "red";
        msg.innerHTML = "❌ 서버 오류: " + error.message;
      })
      .registerUser(id, pw, name);
  }

  function goLogin() {
    window.location.href = "index.html"; // 로그인 화면으로 이동
  }

  function closeRegister() {
    window.location.href = "index.html"; // 회원가입 창 닫기 → 로그인 화면으로 이동
  }
</script>
</body>
</html>
