<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>회원가입</title>
  <!-- 📌 모바일 대응을 위한 뷰포트 태그 -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">

  <!-- 📌 폰트 로딩 -->
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&family=Noto+Sans+KR&display=swap" rel="stylesheet">

  <!-- 📌 Font Awesome 아이콘 -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <!-- 📌 PWA 매니페스트 연결 -->
  <meta name="theme-color" content="#2196F3">  
  
<style>
/* ---------------------- 기본 페이지 ---------------------- */
body {
  display:flex; justify-content:center; align-items:center;
  min-height:100vh;
  background:linear-gradient(135deg,#74ebd5,#ACB6E5); /* 밝은 톤 유지 */
  font-family:'Noto Sans KR','Roboto',sans-serif;
  margin:0; overflow-y:auto;
}

/* ---------------------- 회원가입 박스 ---------------------- */
.register-box {
  position: relative;
  background: #ffffff;                  /* 카드 내부는 순수 흰색 */
  padding: 40px 35px;
  border-radius: 16px;
  border: 2px solid #cccccc;            /* 테두리 색 강조 */
  box-shadow: 0 20px 45px rgba(0,0,0,0.35); /* 그림자 진하게 */
  text-align: center;
  width: 100%;
  max-width: 420px;
  margin: 50px auto;                    /* 카드 주변 여백 */
  animation: fadeIn 0.8s ease-in-out;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(20px); }
  to   { opacity: 1; transform: translateY(0); }
}


/* ---------------------- 헤더 ---------------------- */
.register-box h2 {
  margin-bottom:20px; color:#2c3e50;
  font-size:26px; font-weight:700;
}
.register-box p {
  color:#555; font-size:14px; margin-bottom:20px;
  text-align:left; line-height:1.6;
}

/* ---------------------- 입력 필드 ---------------------- */
label {
  display:block; margin-top:15px; font-weight:500;
  color:#2c3e50; text-align:left;
}
.register-box input {
  width:100%; margin-top:8px; padding:14px;
  font-size:15px; border:1.5px solid #ccc;
  border-radius:8px; background-color:#fafafa;
  transition:border-color .3s, box-shadow .3s;
}
.register-box input:focus {
  border-color:#2980b9;
  box-shadow:0 0 8px rgba(41,128,185,.3);
  outline:none;
}

/* ---------------------- 입력 그룹 ---------------------- */
.input-group {
  display: flex;
  align-items: center;       /* 버튼과 텍스트박스 수직 정렬 */
  margin-top: 12px;
  gap: 8px;
}

.input-group input {
  flex: 1;                   /* 입력창만 가로폭 늘리기 */
  height: 44px;              /* 입력창 높이 */
  padding: 0 12px;
  font-size: 15px;
  border: 1.5px solid #ccc;
  border-radius: 8px;
  background-color: #f9f9f9;
  box-shadow: inset 0 2px 4px rgba(0,0,0,0.08);
  text-align: left;
  box-sizing: border-box;
}

.input-group button {
  min-width: 80px;           /* 버튼은 최소 너비만 유지 */
  border: none;
  border-radius: 8px;
  background: linear-gradient(to right,#3498db,#2980b9);
  color: #fff;
  cursor: pointer;
  font-weight: 600;
  font-size: 14px;
  padding: 10px 16px;        /* 버튼은 원래대로 */
  height: auto;              /* 버튼 높이는 자동 */
}

/* 버튼 없는 입력창 더 줄이기 (비밀번호 확인, 이메일) */
.short-input input {
  max-width: calc(100% - 90px);
}


/* ---------------------- 버튼 그룹 ---------------------- */
.btn-group {
  display:flex; justify-content:space-between;
  gap:15px; margin-top:25px;
}
.btn-group button {
  flex:1; padding:16px; border:none; border-radius:10px;
  font-size:16px; font-weight:600; cursor:pointer;
}
.primary-btn {
  background:linear-gradient(to right,#3498db,#2980b9);
  color:#fff;
}
.primary-btn:hover {
  background:linear-gradient(to right,#2980b9,#1c5980);
}
.secondary-btn {
  background:#e74c3c;   /* 밝은 빨강 */
  color:#fff;
}
.secondary-btn:hover {
  background:#c0392b;   /* hover 시 조금 더 진한 빨강 */
}

/* ---------------------- 체크박스 그룹 ---------------------- */
.terms-wrapper {
  margin-top: 25px;
  width: auto;        /* 내용 크기만큼만 폭 차지 */
  text-align: left;   /* 좌측 정렬 */
}

.terms {
  width: 100%;
  text-align: left;
}

.terms label {
  display: block;     /* 제목 라벨은 블록으로 */
  font-weight: 600;
  margin-top: 15px;
  margin-bottom: 8px;
  color: #2c3e50;
}

.checkbox-group {
  display: inline-flex;   /* 내용 크기만큼만 차지 */
  align-items: center;
  justify-content: flex-start;
  margin-bottom: 10px;
  width: auto;            /* 박스 폭 자동 */
}

.checkbox-group label {
  display: flex;          /* 체크박스와 텍스트 한 줄 */
  align-items: center;
  font-size: 15px;
  color: #2c3e50;
}

.checkbox-group input[type="checkbox"] {
  width: 16px;            /* 체크박스 크기 줄이기 */
  height: 16px;
  margin-right: 8px;      /* 체크박스와 텍스트 간격 */
}


/* ---------------------- 닫기 버튼 ---------------------- */
.close-btn {
  position: absolute;
  top: -10px;              /* 카드 바깥쪽으로 살짝 이동 */
  right: -10px;
  background: #fff;        /* 카드와 같은 흰색 배경 */
  border: 1px solid #ccc;  /* 카드와 구분되는 테두리 */
  border-radius: 50%;      /* 동그란 버튼 */
  width: 28px; height: 28px;
  font-size: 18px;
  color: #7f8c8d;
  cursor: pointer;
  box-shadow: 0 2px 6px rgba(0,0,0,0.2);
  transition: background .3s, color .3s;
}
.close-btn:hover {
  background: #e74c3c;     /* hover 시 빨간색 강조 */
  color: #fff;
}


/* ---------------------- 모달 ---------------------- */
.modal {
  display:none; position:fixed; z-index:999;
  left:0; top:0; width:100%; height:100%;
  background-color:rgba(0,0,0,0.4);
}
.modal-content {
  background:#fff; margin:20% auto; padding:2rem;
  border-radius:12px; width:90%; max-width:450px;
  text-align:center; box-shadow:0 4px 15px rgba(0,0,0,0.3);
  position:relative;
}
.modal-content h2 { font-size:1.5rem; margin-bottom:1rem; color:#2c3e50; }
.modal-content p { font-size:1.2rem; color:#555; margin-bottom:1.5rem; }

/* ---------------------- 모바일 최적화 ---------------------- */
@media (max-width:600px) {
  .register-box {
    max-width: 100%; 
    padding: 30px 20px; /* 여백 줄여서 화면 조금 작게 */
  }
  .register-box h2 { font-size: 24px; }
  .register-box p { font-size: 14px; line-height: 1.6; }

  /* 입력창만 높이 조정 */
  .register-box input {
    height: 44px;
    font-size: 15px;
    padding: 0 12px;     /* 좌우만 여백 */
    box-sizing: border-box;
  }

  /* 버튼은 원래 스타일 유지 */
  .input-group button,
  .btn-group button {
    font-size: 14px;
    padding: 10px 16px;
    height: auto;        /* 버튼은 자동 높이 */
  }
}

.input-group {
  display: flex;
  align-items: center; /* 세로 중앙 맞춤 */
}




  </style>
</head>

<body>
  <div class="register-box">
    <h2>📍 A-DOMES | 회원 가입</h2>
    <p>현재 위치와 이동 경로를 확인할 수 있는 스마트 위치정보 앱입니다.<br>
       아래 정보를 입력하여 계정을 생성하세요.</p>
    
    <!-- 회원 ID 입력 -->
    <label for="id">👤 회원 ID 입력</label>
    <div class="input-group">
      <input type="text" id="id" 
             placeholder="아이디 (5~20자, 영문 소문자/숫자/-,_)" 
             style="text-align:left;">
      <button class="check-btn" onclick="checkId()">확인</button>
    </div>
    <div id="idMessage"></div>
    
    <!-- 비밀번호 입력 -->
    <label for="pw" style="margin-top:20px;">🔒 비밀번호 입력</label>
    <div class="input-group">
      <input type="password" id="pw" placeholder="비밀번호 (6~16자, 영문/숫자/특수문자)">
      <button id="toggleBtn" onclick="togglePassword()">보이기</button>
    </div>
    
    <!-- 비밀번호 확인 -->
    <label for="pwConfirm" style="margin-top:15px;">🔑 비밀번호 확인</label>
    <div class="input-group short-input">
      <input type="password" id="pwConfirm" placeholder="비밀번호 확인">
    </div>
    
    <!-- 이메일 입력 -->
    <label for="email" style="margin-top:15px;">📧 이메일 입력</label>
    <div class="input-group short-input">
      <input type="email" id="email" placeholder="이메일 주소 입력" onblur="verifyEmailFormat()">
    </div>
    <span id="emailMessage"></span>
    
    <!-- 닉네임 입력 -->
    <label for="name" style="margin-top:15px;">🌟 닉네임 입력</label>
    <div class="input-group">
      <input type="text" id="name" placeholder="다른 사용자에게 보여질 이름">
      <button onclick="checkNickname()">확인</button>
    </div>
    <span id="nameMessage"></span>

    <!-- 약관 동의 (좌측 정렬) -->
    <div class="terms-wrapper">
      <div class="terms">
        <!-- 타이틀 라벨 -->
        <label for="agree1">이용약관 동의</label>
        <!-- 체크박스 + 설명 -->
        <div class="checkbox-group">
          <label>
            <input type="checkbox" id="agree1">
            이용약관에 동의합니다
          </label>
        </div>
    
        <!-- 타이틀 라벨 -->
        <label for="agree2">개인정보 수집 및 이용 동의</label>
        <!-- 체크박스 + 설명 -->
        <div class="checkbox-group">
          <label>
            <input type="checkbox" id="agree2">
            개인정보 수집 및 이용동의에 수락합니다
          </label>
        </div>
      </div>
    </div>



    <!-- 회원가입 등록 / 취소 버튼 -->
    <div class="btn-group">
      <button class="primary-btn" onclick="register()">회원가입 등록</button>
      <button class="secondary-btn" onclick="close()">취소</button>
    </div>

    <div id="message"></div>
    
    <!-- 하단 설명 -->
    <p style="color:#2c3e50; font-size:13px; margin-top:25px; line-height:1.6; text-align:left;">
      A-DOMES | 위치정보시스템은 현재 위치를 확인하고<br>
      이동 경로를 기록·분석할 수 있는 서비스입니다.<br>
      안전한 이동과 생활 편의를 위해 회원가입 후 이용해 주세요.
    </p>
  </div>

  <!-- 모달 HTML 구조 -->
  <div id="Modal" class="modal">
    <div class="modal-content">
      <h2>회원가입 완료 🎉</h2>
      <p id="modalMessage"></p>
    </div>
  </div>

  <!-- 대기 모달 -->
  <div id="loadingModal" class="modal">
    <div class="modal-content">
      <h2>처리 중입니다 ⏳</h2>
      <p>잠시만 기다려주세요...</p>
    </div>
  </div>
</body>


  
<!-- config.js 먼저 불러오기 -->
<script src="config.js"></script>
<script>
  // 상태 변수 (중복검사 결과 저장)
  let idChecked = false;
  let nameChecked = false;

  /* ============================
     📌 아이디 중복검사
     ============================ */
  function checkId() {
    var id = document.getElementById("id").value.trim();
    var msg = document.getElementById("idMessage");

    if (!msg) return;

    const idRegex = /^[a-z0-9-_]{5,20}$/;
    if (!idRegex.test(id)) {
      msg.style.color = "red";
      msg.innerText = "⚠️ 아이디 규칙 오류";
      idChecked = false;
      return;
    }

    msg.style.color = "#2980b9";
    msg.innerText = "⏳ 중복 검사 중...";

    fetch(`${CONFIG.USER_URL}?mode=checkUserId&id=${encodeURIComponent(id)}`)
      .then(res => res.json())
      .then(result => {
        if (result.result === "exists") {
          msg.style.color = "red";
          msg.innerText = "⚠️ 이미 사용 중인 아이디입니다.";
          idChecked = false;
        } else if (result.result === "available") {
          msg.style.color = "green";
          msg.innerText = "✅ 사용 가능한 아이디입니다.";
          idChecked = true;
        } else {
          msg.style.color = "red";
          msg.innerText = "❌ 알 수 없는 응답";
          idChecked = false;
        }
      })
      .catch(err => {
        msg.style.color = "red";
        msg.innerText = "❌ 서버 오류: " + err.message;
        idChecked = false;
      });
  }

  /* ============================
     📌 닉네임 중복검사
     ============================ */
  function checkNickname() {
    var name = document.getElementById("name").value.trim();
    var msg = document.getElementById("nameMessage");

    if (!name) {
      msg.style.color = "red";
      msg.innerText = "⚠️ 닉네임을 입력하세요.";
      nameChecked = false;
      return;
    }

    msg.style.color = "#2980b9";
    msg.innerText = "⏳ 닉네임 검사 중...";

    fetch(`${CONFIG.USER_URL}?mode=checkNickname&name=${encodeURIComponent(name)}`)
      .then(res => res.json())
      .then(result => {
        if (result.result === "exists") {
          msg.style.color = "red";
          msg.innerText = "⚠️ 이미 사용 중인 닉네임입니다.";
          nameChecked = false;
        } else if (result.result === "available") {
          msg.style.color = "green";
          msg.innerText = "✅ 사용 가능한 닉네임입니다.";
          nameChecked = true;
        } else {
          msg.style.color = "red";
          msg.innerText = "❌ 알 수 없는 응답";
          nameChecked = false;
        }
      })
      .catch(err => {
        msg.style.color = "red";
        msg.innerText = "❌ 서버 오류: " + err.message;
        nameChecked = false;
      });
  }

  /* ============================
     📌 회원가입 처리 (디버깅 버전, GET 방식)
     ============================ */
  function register() {
    const id = document.getElementById("id").value.trim();
    const pw = document.getElementById("pw").value.trim();
    const pwConfirm = document.getElementById("pwConfirm").value.trim();
    const name = document.getElementById("name").value.trim();
    const email = document.getElementById("email").value.trim();
    const agree1 = document.getElementById("agree1").checked;
    const agree2 = document.getElementById("agree2").checked;
    const msg = document.getElementById("message");
  
    if (!msg) return;
  
    // 기본 유효성 검사
    if (!id || !pw || !name || !email || !agree1 || !agree2 || !idChecked || !nameChecked) {
      msg.style.color = "red";
      msg.innerText = "⚠️ 모든 항목을 입력하고 중복검사를 완료해야 합니다.";
      return;
    }
    if (pw !== pwConfirm) {
      msg.style.color = "red";
      msg.innerText = "⚠️ 비밀번호가 일치하지 않습니다.";
      return;
    }
  
    // 대기 모달 표시
    document.getElementById("loadingModal").style.display = "block";
  
    // 서버 요청 (GET 방식)
    const params = new URLSearchParams({
      mode: "registerUser",
      id,
      pw,
      name,
      realname: name,
      phone: "N/A",
      carNo: "N/A",
      deviceId: "N/A",
      email
    });
  
    fetch(`${CONFIG.USER_URL}?${params.toString()}`)
      .then(res => res.json())
      .then(result => {
        document.getElementById("loadingModal").style.display = "none";
  
        if (result.result === "pending") {
          document.getElementById("modalMessage").innerHTML =
            `${result.name || ""}님, 회원가입 신청이 완료되었습니다 🎉<br>
             이메일 인증을 위해 메일함을 확인해주세요.<br>
             인증을 완료해야 로그인할 수 있습니다.<br>
             잠시 후 로그인 화면으로 이동합니다...`;
  
          document.getElementById("registerModal").style.display = "block";
          setTimeout(() => { goLogin(); }, 3000);
  
        } else if (result.result === "exists") {
          msg.style.color = "red";
          msg.innerText = "⚠️ 이미 사용 중인 아이디입니다.";
        } else {
          msg.style.color = "red";
          msg.innerText = "❌ 회원가입 실패. 다시 시도하세요.";
        }
      })
      .catch(err => {
        document.getElementById("loadingModal").style.display = "none";
        msg.style.color = "red";
        msg.innerText = "❌ 서버 오류: " + err.message;
      });
  }

  /* ============================
     📌 로그인 처리
     ============================ */
  function login() {
    var id = document.getElementById("id").value.trim();
    var pw = document.getElementById("pw").value.trim();
    var msg = document.getElementById("loginMessage");

    if (!id || !pw) {
      msg.style.color = "red";
      msg.innerText = "⚠️ 아이디와 비밀번호를 입력하세요.";
      return;
    }

    fetch(`${CONFIG.USER_URL}?mode=login&id=${encodeURIComponent(id)}&pw=${encodeURIComponent(pw)}`)
      .then(res => res.json())
      .then(result => {
        console.log("로그인 응답:", result);

        if (result.result === "success") {
          if (result.email_verified === "true") {
            localStorage.setItem("nickname", result.name);
            localStorage.setItem("token", result.token);
            window.location.href = "main.html";
          } else {
            msg.style.color = "red";
            msg.innerText = "⚠️ 이메일 인증을 완료해야 로그인할 수 있습니다.";
          }
        } else if (result.result === "invalid") {
          msg.style.color = "red";
          msg.innerText = "❌ 아이디 또는 비밀번호가 잘못되었습니다.";
        } else {
          msg.style.color = "red";
          msg.innerText = "❌ 로그인 실패. 다시 시도하세요.";
        }
      })
      .catch(err => {
        msg.style.color = "red";
        msg.innerText = "❌ 서버 오류: " + err.message;
      });
  }

  /* ============================
     📌 화면 이동
     ============================ */
  function goLogin() {
    window.location.href = "index.html";
  }
  function closeRegister() {
    window.location.href = "index.html";
  }

  /* ============================
     📌 비밀번호 보이기 기능
     ============================ */
  function togglePassword() {
    const pwField = document.getElementById("pw");
    const pwConfirmField = document.getElementById("pwConfirm");
    const toggleBtn = document.getElementById("toggleBtn");

    if (pwField.type === "password") {
      pwField.type = "text";
      pwConfirmField.type = "text";
      toggleBtn.innerText = "숨기기";
    } else {
      pwField.type = "password";
      pwConfirmField.type = "password";
      toggleBtn.innerText = "보이기";
    }
  }

/* ============================
   📌 이메일 인증 안내
   ============================ */
function verifyEmailFormat() {
  var email = document.getElementById("email").value.trim();
  var msg = document.getElementById("emailMessage");

  // 이메일 형식 검사 (간단한 정규식)
  const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

  if (!emailRegex.test(email)) {
    msg.style.color = "red";
    msg.innerText = "⚠️ 올바른 이메일 형식을 입력하세요.";
  } else {
    msg.style.color = "#2980b9";
