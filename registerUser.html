<!-- config.js 먼저 불러오기 -->
<script src="config.js"></script>
<script>
  /* ============================
     📌 아이디 중복검사
     ============================ */
  function checkId() {
    var id = document.getElementById("id").value.trim();
    var msg = document.getElementById("idMessage");

    if (!msg) return;

    const idRegex = /^[a-z0-9-_]{5,20}$/;
    if (!idRegex.test(id)) {
      msg.style.color = "red";
      msg.innerText = "⚠️ 아이디 규칙 오류";
      return;
    }

    msg.style.color = "#2980b9";
    msg.innerText = "⏳ 중복 검사 중...";

    fetch(`${CONFIG.USER_URL}?mode=checkUserId&id=${encodeURIComponent(id)}`)
      .then(res => res.json())
      .then(result => {
        if (result.result === "exists") {
          msg.style.color = "red";
          msg.innerText = "⚠️ 이미 사용 중인 아이디입니다.";
        } else if (result.result === "available") {
          msg.style.color = "green";
          msg.innerText = "✅ 사용 가능한 아이디입니다.";
        } else {
          msg.style.color = "red";
          msg.innerText = "❌ 알 수 없는 응답";
        }
      })
      .catch(err => {
        msg.style.color = "red";
        msg.innerText = "❌ 서버 오류: " + err.message;
      });
  }

  /* ============================
     📌 회원가입 처리
     ============================ */
  function register() {
    var id = document.getElementById("id").value.trim();
    var pw = document.getElementById("pw").value.trim();
    var pwConfirm = document.getElementById("pwConfirm").value.trim();
    var name = document.getElementById("name").value.trim();
    var email = document.getElementById("email").value.trim();   // ✅ 이메일 추가
    var agree1 = document.getElementById("agree1").checked;
    var agree2 = document.getElementById("agree2").checked;
    var msg = document.getElementById("message");

    if (!msg) return;

    // 아이디/비밀번호 규칙 검사
    const idRegex = /^[a-z0-9-_]{5,20}$/;
    if (!idRegex.test(id)) {
      msg.style.color = "red";
      msg.innerText = "⚠️ 아이디 규칙 오류";
      return;
    }

    const pwRegex = /^[A-Za-z0-9!@#$%^&*()_+]{6,16}$/;
    if (!pwRegex.test(pw) || /[ㄱ-ㅎㅏ-ㅣ가-힣]/.test(pw)) {
      msg.style.color = "red";
      msg.innerText = "⚠️ 비밀번호 규칙 오류";
      return;
    }

    if (pw !== pwConfirm) {
      msg.style.color = "red";
      msg.innerText = "⚠️ 비밀번호가 일치하지 않습니다.";
      return;
    }

    if (!id || !pw || !name || !email || !agree1 || !agree2) {
      msg.style.color = "red";
      msg.innerText = "⚠️ 모든 항목을 입력하고 약관에 동의해야 합니다.";
      return;
    }

    // ✅ 대기 모달 띄우기
    document.getElementById("loadingModal").style.display = "block";

    // ✅ 서버 호출
    fetch(`${CONFIG.USER_URL}?mode=registerUser&id=${encodeURIComponent(id)}&pw=${encodeURIComponent(pw)}&name=${encodeURIComponent(name)}&email=${encodeURIComponent(email)}`)
      .then(res => res.json())
      .then(result => {
        document.getElementById("loadingModal").style.display = "none";
        console.log("회원가입 응답:", result);

        if (result.result === "pending") {
          // ✅ 이메일 인증 안내 메시지
          document.getElementById("modalMessage").innerHTML =
            `${result.name || ""}님, 회원가입 신청이 완료되었습니다 🎉<br>
             이메일 인증을 위해 메일함을 확인해주세요.<br>
             인증을 완료해야 로그인할 수 있습니다.`;

          document.getElementById("registerModal").style.display = "block";

          // 로그인 화면으로 이동
          setTimeout(() => { goLogin(); }, 3000);
        } else if (result.result === "exists") {
          msg.style.color = "red";
          msg.innerText = "⚠️ 이미 사용 중인 아이디입니다.";
        } else if (result.result === "missing") {
          msg.style.color = "red";
          msg.innerText = "⚠️ 모든 항목을 입력해야 합니다.";
        } else {
          msg.style.color = "red";
          msg.innerText = "❌ 회원가입 실패. 다시 시도하세요.";
        }
      })
      .catch(err => {
        document.getElementById("loadingModal").style.display = "none";
        msg.style.color = "red";
        msg.innerText = "❌ 서버 오류: " + err.message;
      });
  }

  /* ============================
     📌 로그인 처리
     ============================ */
  function login() {
    var id = document.getElementById("id").value.trim();
    var pw = document.getElementById("pw").value.trim();
    var msg = document.getElementById("loginMessage");

    if (!id || !pw) {
      msg.style.color = "red";
      msg.innerText = "⚠️ 아이디와 비밀번호를 입력하세요.";
      return;
    }

    fetch(`${CONFIG.USER_URL}?mode=login&id=${encodeURIComponent(id)}&pw=${encodeURIComponent(pw)}`)
      .then(res => res.json())
      .then(result => {
        console.log("로그인 응답:", result);

        if (result.result === "success") {
          if (result.email_verified === "true") {
            localStorage.setItem("nickname", result.name);
            localStorage.setItem("token", result.token);
            window.location.href = "main.html";   // 로그인 성공 후 메인 페이지 이동
          } else {
            msg.style.color = "red";
            msg.innerText = "⚠️ 이메일 인증을 완료해야 로그인할 수 있습니다.";
          }
        } else if (result.result === "invalid") {
          msg.style.color = "red";
          msg.innerText = "❌ 아이디 또는 비밀번호가 잘못되었습니다.";
        } else {
          msg.style.color = "red";
          msg.innerText = "❌ 로그인 실패. 다시 시도하세요.";
        }
      })
      .catch(err => {
        msg.style.color = "red";
        msg.innerText = "❌ 서버 오류: " + err.message;
      });
  }

  /* ============================
     📌 화면 이동
     ============================ */
  function goLogin() {
    window.location.href = "index.html";
  }
  function closeRegister() {
    window.location.href = "index.html";
  }

  /* ============================
     📌 비밀번호 보이기 기능
     ============================ */
  function togglePassword() {
    const pwField = document.getElementById("pw");
    const pwConfirmField = document.getElementById("pwConfirm");
    const toggleBtn = document.getElementById("toggleBtn");

    if (pwField.type === "password") {
      pwField.type = "text";
      pwConfirmField.type = "text";
      toggleBtn.innerText = "숨기기";
    } else {
      pwField.type = "password";
      pwConfirmField.type = "password";
      toggleBtn.innerText = "보이기";
    }
  }

  /* ============================
   📌 이메일 인증
   ============================ */
function verifyEmail() {
  var email = document.getElementById("email").value.trim();
  var msg = document.getElementById("emailMessage");

  // 이메일 형식 검사
  const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
  if (!emailRegex.test(email)) {
    msg.style.color = "red";
    msg.innerText = "⚠️ 올바른 이메일 형식이 아닙니다.";
    return;
  }

  msg.style.color = "#2980b9";
  msg.innerText = "⏳ 인증 메일 발송 중...";

  // 서버 호출 (메일 발송)
  fetch(`${CONFIG.USER_URL}?mode=sendVerifyEmail&email=${encodeURIComponent(email)}`)
    .then(res => res.json())
    .then(result => {
      if (result.result === "sent") {
        msg.style.color = "green";
        msg.innerText = "✅ 인증 메일을 확인하세요.";
      } else {
        msg.style.color = "red";
        msg.innerText = "❌ 메일 발송 실패.";
      }
    })
    .catch(err => {
      msg.style.color = "red";
      msg.innerText = "❌ 서버 오류: " + err.message;
    });
}

/* ============================
   📌 닉네임 중복검사
   ============================ */
function checkNickname() {
  var name = document.getElementById("name").value.trim();
  var msg = document.getElementById("nameMessage");

  if (!name) {
    msg.style.color = "red";
    msg.innerText = "⚠️ 닉네임을 입력하세요.";
    return;
  }

  msg.style.color = "#2980b9";
  msg.innerText = "⏳ 닉네임 검사 중...";

  // 서버 호출 (닉네임 중복검사)
  fetch(`${CONFIG.USER_URL}?mode=checkNickname&name=${encodeURIComponent(name)}`)
    .then(res => res.json())
    .then(result => {
      if (result.result === "exists") {
        msg.style.color = "red";
        msg.innerText = "⚠️ 이미 사용 중인 닉네임입니다.";
      } else if (result.result === "available") {
        msg.style.color = "green";
        msg.innerText = "✅ 사용 가능한 닉네임입니다.";
      } else {
        msg.style.color = "red";
        msg.innerText = "❌ 알 수 없는 응답";
      }
    })
    .catch(err => {
      msg.style.color = "red";
      msg.innerText = "❌ 서버 오류: " + err.message;
    });
}

</script>
</body>
</html>
