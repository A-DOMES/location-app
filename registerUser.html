<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>회원가입</title>
  <!-- FontAwesome 아이콘 -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    body {
      font-family: 'Noto Sans KR', sans-serif;
      padding: 20px;
    }
    input {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
      box-sizing: border-box;
    }
    .password-wrapper {
      position: relative;
    }
    .password-wrapper i {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      cursor: pointer;
      font-size: 18px;
      color: #555;
    }
    button {
      padding: 10px 20px;
      margin-top: 10px;
      background: #2980b9;
      color: #fff;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }
    button:hover {
      background: #1f6690;
    }

    /* 모달창 스타일 */
    .modal {
      display: none;
      position: fixed;
      z-index: 999;
      left: 0; top: 0;
      width: 100%; height: 100%;
      background-color: rgba(0,0,0,0.5);
    }
    .modal-content {
      background: #fff;
      margin: 15% auto;
      padding: 30px;
      border-radius: 12px;
      width: 90%;
      max-width: 450px;
      text-align: center;
      box-shadow: 0 4px 15px rgba(0,0,0,0.3);
    }
    .modal-content h2 {
      font-size: 24px;
      margin-bottom: 20px;
      color: #2c3e50;
    }
    .modal-content p {
      font-size: 18px;
      margin-bottom: 20px;
      color: #555;
    }
    .modal-content button {
      font-size: 16px;
      padding: 10px 20px;
      border: none;
      background: #27ae60;
      color: #fff;
      border-radius: 6px;
      cursor: pointer;
    }
    .modal-content button:hover {
      background: #219150;
    }
    .close {
      float: right;
      font-size: 26px;
      cursor: pointer;
      color: #aaa;
    }
    .close:hover {
      color: #000;
    }
  </style>
</head>
<body>

  <h1>회원가입</h1>
  <input type="text" id="id" placeholder="아이디">
  <div id="idMessage"></div>

  <div class="password-wrapper">
    <input type="password" id="pw" placeholder="비밀번호">
    <i class="fa-solid fa-eye" id="togglePw" onclick="togglePassword('pw','togglePw')"></i>
  </div>

  <div class="password-wrapper">
    <input type="password" id="pwConfirm" placeholder="비밀번호 확인">
    <i class="fa-solid fa-eye" id="togglePwConfirm" onclick="togglePassword('pwConfirm','togglePwConfirm')"></i>
  </div>

  <input type="text" id="name" placeholder="이름">
  <label><input type="checkbox" id="agree1"> 약관 동의 1</label><br>
  <label><input type="checkbox" id="agree2"> 약관 동의 2</label><br>

  <button onclick="checkId()">아이디 중복검사</button>
  <button onclick="register()">회원가입</button>
  <div id="message"></div>

  <!-- 회원가입 완료 모달 -->
  <div id="registerModal" class="modal">
    <div class="modal-content">
      <span class="close" onclick="closeModal()">&times;</span>
      <h2>회원가입 완료 🎉</h2>
      <p id="modalMessage"></p>
      <button onclick="goLogin()">로그인 화면으로 이동</button>
    </div>
  </div>

<script>
  const WEBAPP_URL = "https://script.google.com/macros/s/AKfycbxzUmUkR6-7UwDR6ZgYz9Ctl_IhXP2TTz4aiXavfh7GrPJ_SI8iww2BCd7wUc6ygRt_6Q/exec";

  function checkId() {
    var id = document.getElementById("id").value.trim();
    var msg = document.getElementById("idMessage");

    if (!msg) return;

    const idRegex = /^[a-z0-9-_]{5,20}$/;
    if (!idRegex.test(id)) {
      msg.style.color = "red";
      msg.innerText = "⚠️ 아이디는 5~20자, 영문 소문자/숫자/-,_만 가능합니다.";
      return;
    }

    msg.style.color = "#2980b9";
    msg.innerText = "⏳ 아이디 중복 검사 중...";

    fetch(`${WEBAPP_URL}?mode=checkUserId&id=${encodeURIComponent(id)}`)
      .then(response => response.json())
      .then(result => {
        if (result.result === "exists") {
          msg.style.color = "red";
          msg.innerText = "⚠️ 이미 사용 중인 아이디입니다.";
        } else if (result.result === "available") {
          msg.style.color = "green";
          msg.innerText = "✅ 사용 가능한 아이디입니다.";
        } else {
          msg.style.color = "red";
          msg.innerText = "❌ 오류 발생";
        }
      })
      .catch(error => {
        msg.style.color = "red";
        msg.innerText = "❌ 서버 오류: " + error.message;
      });
  }

  function register() {
    var id = document.getElementById("id").value.trim();
    var pw = document.getElementById("pw").value.trim();
    var pwConfirm = document.getElementById("pwConfirm").value.trim();
    var name = document.getElementById("name").value.trim();
    var agree1 = document.getElementById("agree1").checked;
    var agree2 = document.getElementById("agree2").checked;

    var msg = document.getElementById("message");

    if (!id || !pw || !name) {
      msg.style.color = "red";
      msg.innerText = "⚠️ 모든 항목을 입력해야 합니다.";
      return;
    }
    if (pw !== pwConfirm) {
      msg.style.color = "red";
      msg.innerText = "⚠️ 비밀번호가 일치하지 않습니다.";
      return;
    }
    if (!agree1 || !agree2) {
      msg.style.color = "red";
      msg.innerText = "⚠️ 약관에 모두 동의해야 합니다.";
      return;
    }

    fetch(`${WEBAPP_URL}?mode=registerUser&id=${encodeURIComponent(id)}&pw=${encodeURIComponent(pw)}&name=${encodeURIComponent(name)}`)
      .then(response => response.json())
      .then(result => {
        if (result.result === "success") {
          document.getElementById("modalMessage").innerText =
            `${result.name || ""}님, 회원가입을 축하드립니다 🎉`;
          document.getElementById("registerModal").style.display = "block";
        } else if (result.result === "exists") {
          msg.style.color = "red";
          msg.innerText = "⚠️ 이미 사용 중인 아이디입니다.";
        } else {
          msg.style.color = "red";
          msg.innerText = "❌ 회원가입 실패";
        }
      })
      .catch(error => {
        msg.style.color = "red";
        msg.innerText = "❌ 서버 오류: " + error.message;
      });
  }

  function goLogin() {
    window.location.href = "index.html";
  }
  function closeModal() {
    document.getElementById("registerModal").style.display = "none";
  }

  function togglePassword(fieldId, iconId) {
    const field = document.getElementById(fieldId);
    const icon = document.getElementById(iconId);

    if (field.type === "password") {
      field.type = "text";
      icon.classList.remove("fa-eye");
      icon.classList.add("fa-eye-slash");
    } else {
      field.type = "password";
      icon.classList.remove("fa-eye-slash");
      icon.classList.add("fa-eye");
    }
  }
</script>

</body>
</html>
