<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>회원가입</title>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&family=Noto+Sans+KR&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Noto Sans KR', 'Roboto', sans-serif;
      background: linear-gradient(135deg, #74ebd5, #ACB6E5);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    .register-box {
      position: relative;
      background: #fff;
      padding: 40px 30px;
      border-radius: 20px;
      box-shadow: 0 12px 32px rgba(0,0,0,0.2);
      width: 420px;
      text-align: center;
      animation: fadeIn 1s ease-in-out;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .register-box h2 {
      margin-bottom: 15px;
      color: #2c3e50;
      font-size: 26px;
      font-weight: 700;
      text-align: left;
    }
    .register-box p {
      color:#7f8c8d;
      font-size:14px;
      margin-bottom:20px;
      text-align: left;
      line-height: 1.6;
    }
    label {
      display:block;
      margin-top:15px;
      font-weight:500;
      color:#2c3e50;
      text-align:left;
    }

    /* ✅ 아이디 입력창과 버튼 스타일 */
    .input-group {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .input-group input {
      width: 70%;
      padding: 14px;
      border: 1.5px solid #bdc3c7;
      border-radius: 10px;
      font-size: 15px;
      text-align: left;
      background-color: #f0f8ff; /* ✅ 동일 배경색 */
    }
    .check-btn {
      padding: 14px 20px;
      border: none;
      border-radius: 10px;
      background: linear-gradient(to right, #3498db, #2980b9);
      color: #fff;
      cursor: pointer;
      font-weight: 500;
      font-size: 16px;
      white-space: nowrap;
    }

.register-box input {
  width: 90%;
  padding: 14px;
  margin: 12px auto;
  border: 1.5px solid #bdc3c7;
  border-radius: 10px;
  font-size: 15px;
  display:block;
  background-color: #f0f8ff; /* ✅ 동일 배경색 */
}
    
    .btn-group {
      display: flex;
      justify-content: space-between;
      margin-top: 20px;
    }
    .btn-group button {
      flex: 1;
      margin: 0 5px;
      padding: 12px;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      cursor: pointer;
      font-weight: 500;
    }
    .primary-btn {
      background: linear-gradient(to right, #3498db, #2980b9);
      color: #fff;
    }
    .secondary-btn {
      background: #bdc3c7;
      color: #2c3e50;
    }
    #idMessage, #message {
      margin-top: 10px;
      font-size: 14px;
      font-weight: bold;
    }
    .close-btn {
      position: absolute;
      top: 15px;
      right: 20px;
      background: none;
      border: none;
      font-size: 20px;
      color: #7f8c8d;
      cursor: pointer;
    }
    .close-btn:hover {
      color: #e74c3c;
    }

    .checkbox-group {
      margin-left: 15px;
      display: inline-flex;
      align-items: center;
      white-space: nowrap;
      margin-bottom: 12px;
    }
    .checkbox-group input[type="checkbox"] {
      margin-right: 10px;
    }

    @media (max-width: 600px) {
      .register-box {
        width: 95%;
        padding: 20px;
      }
      .register-box h2 {
        font-size: 22px;
      }
      .register-box p {
        font-size: 13px;
      }
      .checkbox-group span {
        font-size: 0.95rem;
      }
    }

    /* ============================
       📌 회원가입 성공 모달 추가 (팝업창)
       ============================ */
    .modal {
      display: none;
      position: fixed;
      z-index: 999;
      left: 0; top: 0;
      width: 100%; height: 100%;
      background-color: rgba(0,0,0,0.4);
    }
    .modal-content {
      background: #fff;
      margin: 20% auto;
      padding: 2rem;
      border-radius: 12px;
      width: 90%;
      max-width: 450px;
      text-align: center;
      box-shadow: 0 4px 15px rgba(0,0,0,0.3);
    }
    .modal-content h2 {
      font-size: 1.5rem;
      margin-bottom: 1rem;
      color: #2c3e50;
    }
    .modal-content p {
      font-size: 1.2rem;
      color: #555;
      margin-bottom: 1.5rem;
    }
  </style>
</head>
<body>
  <div class="register-box">
    <!-- 닫기 버튼 -->
    <button class="close-btn" onclick="closeRegister()">✖</button>

    <h2>📍 A-DOMES | 위치정보시스템</h2>
    <p>현재 위치와 이동 경로를 확인할 수 있는 스마트 위치정보 앱입니다.<br>
       아래 정보를 입력하여 계정을 생성하세요.</p>

    <!-- 아이디 입력 -->
    <label for="id">회원 ID 입력</label>
    <div class="input-group">
      <input type="text" id="id" 
             placeholder="아이디 (5~20자, 영문 소문자/숫자/-,_)" 
             style="text-align:left;">
      <button class="check-btn" onclick="checkId()">확인</button>
    </div>
    <div id="idMessage"></div>

<!-- 비밀번호 입력 라벨 + 버튼 -->
<div style="display:flex; align-items:center; width:90%; margin-top:25px;">
  <label for="pw" style="margin:0;">비밀번호 입력</label>
  <button type="button" id="toggleBtn" onclick="togglePassword()" 
          style="margin-left:auto; position:relative; left:30px;
                 padding:6px 12px; font-size:13px; border:none; border-radius:6px; 
                 background:#3498db; color:#fff; cursor:pointer;">
    보이기
  </button>
</div>
<!-- 비밀번호 입력 텍스트박스 -->
<div style="margin-top:12px; width:90%;">
  <input type="password" id="pw" placeholder="비밀번호 (6~16자, 영문/숫자/특수문자)" style="width:100%;">
</div>

<!-- 비밀번호 확인 (그대로 유지) -->
<label for="pwConfirm" style="margin-top:15px;">비밀번호 확인</label>
<input type="password" id="pwConfirm" placeholder="비밀번호 확인" style="width:90%;">




    <!-- 닉네임 입력 -->
    <label for="name">닉네임 입력</label>
    <input type="text" id="name" placeholder="다른 사용자에게 보여질 이름">

    <!-- 약관 동의 -->
    <div class="terms" style="text-align:left; margin-top:15px;">
      <label style="margin-bottom:6px;">이용약관 동의</label>
      <div class="checkbox-group">
        <input type="checkbox" id="agree1">
        <span>이용약관에 동의합니다</span>
      </div>

      <label style="margin-bottom:6px; margin-top:15px;">개인정보 수집 및 이용 동의</label>
      <div class="checkbox-group">
        <input type="checkbox" id="agree2">
        <span>개인정보 수집 및 이용동의에 수락합니다</span>
      </div>
    </div>

    <!-- 회원가입 등록 / 취소 버튼 -->
    <div class="btn-group">
      <button class="primary-btn" onclick="register()">회원가입 등록</button>
      <button class="secondary-btn" onclick="closeRegister()">취소</button>
    </div>

    <div id="message"></div>
    
    <!-- 하단 설명 -->
    <p style="color:#2c3e50; font-size:13px; margin-top:25px; line-height:1.6; text-align:left;">
      A-DOMES | 위치정보시스템은 현재 위치를 확인하고<br>
      이동 경로를 기록·분석할 수 있는 서비스입니다.<br>
      안전한 이동과 생활 편의를 위해 회원가입 후 이용해 주세요.
    </p>
  </div>

  <!-- 모달 HTML 구조 -->
  <div id="registerModal" class="modal">
    <div class="modal-content">
      <h2>회원가입 완료 🎉</h2>
      <p id="modalMessage"></p>
    </div>
  </div>

  
<script>
  // Google Apps Script 웹앱 URL (배포 후 얻은 URL로 교체하세요)
  const WEBAPP_URL = "https://script.google.com/macros/s/AKfycbz9mPcqXx35uQnOixPm5gGuGw8GF63rfEubJvdSFU-i7IFq66TXW57S3Wxl5-S8-AM2Sw/exec";

  /* ============================
     📌 아이디 중복검사 (존재 여부만 확인)
     ============================ */
  function checkId() {
    var id = document.getElementById("id").value.trim();
    var msg = document.getElementById("idMessage");

    if (!msg) {
      alert("⚠️ idMessage 요소가 없습니다. <div id='idMessage'></div> 추가하세요.");
      return;
    }

    // 아이디 규칙 검사
    const idRegex = /^[a-z0-9-_]{5,20}$/;
    if (!idRegex.test(id)) {
      msg.style.color = "red";
      msg.innerText = "⚠️ 아이디는 5~20자, 영문 소문자/숫자/-,_만 가능합니다.";
      return;
    }

    msg.style.color = "#2980b9";
    msg.innerText = "⏳ 아이디 중복 검사 중...";

    // ✅ 중복검사 모드 호출
    fetch(`${WEBAPP_URL}?mode=checkUserId&id=${encodeURIComponent(id)}`)
      .then(response => response.json())
      .then(result => {
        if (result.result === "exists") {
          msg.style.color = "red";
          msg.innerText = "⚠️ 이미 사용 중인 아이디입니다.";
        } else if (result.result === "available") {
          msg.style.color = "green";
          msg.innerText = "✅ 사용 가능한 아이디입니다.";
        } else {
          msg.style.color = "red";
          msg.innerText = "❌ 알 수 없는 응답";
        }
      })
      .catch(error => {
        msg.style.color = "red";
        msg.innerText = "❌ 서버 오류: " + error.message;
      });
  }

  /* ============================
     📌 회원가입 처리 (모달 적용)
     ============================ */
  function register() {
    var id = document.getElementById("id").value.trim();
    var pw = document.getElementById("pw").value.trim();
    var pwConfirm = document.getElementById("pwConfirm").value.trim();
    var name = document.getElementById("name").value.trim();
    var agree1 = document.getElementById("agree1").checked;
    var agree2 = document.getElementById("agree2").checked;
    var msg = document.getElementById("message");

    if (!msg) {
      alert("⚠️ message 요소가 없습니다. <div id='message'></div> 추가하세요.");
      return;
    }

    // 아이디 규칙 검사
    const idRegex = /^[a-z0-9-_]{5,20}$/;
    if (!idRegex.test(id)) {
      msg.style.color = "red";
      msg.innerText = "⚠️ 아이디 규칙 오류";
      return;
    }

    // 비밀번호 규칙 검사
    const pwRegex = /^[A-Za-z0-9!@#$%^&*()_+]{6,16}$/;
    if (!pwRegex.test(pw) || /[ㄱ-ㅎㅏ-ㅣ가-힣]/.test(pw)) {
      msg.style.color = "red";
      msg.innerText = "⚠️ 비밀번호는 6~16자, 영문/숫자/특수문자만 가능합니다. (한글 제외)";
      return;
    }

    if (pw !== pwConfirm) {
      msg.style.color = "red";
      msg.innerText = "⚠️ 비밀번호가 일치하지 않습니다.";
      return;
    }

    if (!id || !pw || !name) {
      msg.style.color = "red";
      msg.innerText = "⚠️ 모든 항목을 입력해야 합니다.";
      return;
    }

    if (!agree1 || !agree2) {
      msg.style.color = "red";
      msg.innerText = "⚠️ 약관에 모두 동의해야 회원가입이 가능합니다.";
      return;
    }

    // fetch()로 서버 호출
    fetch(`${WEBAPP_URL}?mode=registerUser&id=${encodeURIComponent(id)}&pw=${encodeURIComponent(pw)}&name=${encodeURIComponent(name)}`)
      .then(response => response.json())
      .then(result => {
        console.log("회원가입 응답:", result);

        switch (result.result) {
          case "success":
            // ✅ 모달창 띄우기
            document.getElementById("modalMessage").innerHTML =
              `${result.name || ""}님, 회원가입을 축하드립니다 🎉<br>잠시 후 로그인 화면으로 이동합니다...`;
            document.getElementById("registerModal").style.display = "block";

            // ✅ 자동 이동 (1.5초 후)
            setTimeout(() => {
              goLogin();
            }, 1500);
            break;
          case "exists":
            msg.style.color = "red";
            msg.innerText = "⚠️ 이미 사용 중인 아이디입니다.";
            break;
          case "missing":
            msg.style.color = "red";
            msg.innerText = "⚠️ 모든 항목을 입력해야 합니다.";
            break;
          default:
            msg.style.color = "red";
            msg.innerText = "❌ 회원가입 실패. 다시 시도하세요.";
            break;
        }
      })
      .catch(error => {
        msg.style.color = "red";
        msg.innerText = "❌ 서버 오류: " + error.message;
      });
  }

  /* ============================
     📌 화면 이동 함수
     ============================ */
  function goLogin() {
    window.location.href = "index.html";
  }
  function closeRegister() {
    window.location.href = "index.html";
  }

  /* ============================
     📌 비밀번호 보이기 기능
     ============================ */
  function togglePassword() {
    const pwField = document.getElementById("pw");
    const pwConfirmField = document.getElementById("pwConfirm");
    const toggleBtn = document.getElementById("toggleBtn");
  
    if (pwField.type === "password") {
      pwField.type = "text";
      pwConfirmField.type = "text";
      toggleBtn.innerText = "숨기기"; // ✅ 상태 표시 변경
    } else {
      pwField.type = "password";
      pwConfirmField.type = "password";
      toggleBtn.innerText = "보이기"; // ✅ 상태 표시 변경
    }
  }

</script>

</body>
</html>
