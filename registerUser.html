<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>회원가입</title>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&family=Noto+Sans+KR&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Noto Sans KR', 'Roboto', sans-serif;
      background: linear-gradient(135deg, #74ebd5, #ACB6E5);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    .register-box {
      background: #fff;
      padding: 40px 30px;
      border-radius: 20px;
      box-shadow: 0 12px 32px rgba(0,0,0,0.2);
      width: 380px;
      text-align: center;
      animation: fadeIn 1s ease-in-out;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .register-box h2 {
      margin-bottom: 25px;
      color: #2c3e50;
      font-size: 26px;
      font-weight: 600;
    }
    .register-box input {
      width: 100%;
      padding: 14px;
      margin: 12px 0;
      border: 1.5px solid #bdc3c7;
      border-radius: 10px;
      font-size: 15px;
      transition: border-color 0.3s, box-shadow 0.3s;
    }
    .register-box input:focus {
      border-color: #2980b9;
      box-shadow: 0 0 8px rgba(41, 128, 185, 0.3);
      outline: none;
    }
    .btn-group {
      display: flex;
      justify-content: space-between;
      margin-top: 20px;
    }
    .btn-group button {
      flex: 1;
      margin: 0 5px;
      padding: 12px;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      cursor: pointer;
      font-weight: 500;
      transition: transform 0.2s, background 0.3s;
    }
    .primary-btn {
      background: linear-gradient(to right, #3498db, #2980b9);
      color: #fff;
    }
    .primary-btn:hover {
      background: linear-gradient(to right, #2980b9, #1f6391);
      transform: scale(1.03);
    }
    .secondary-btn {
      background: #bdc3c7;
      color: #2c3e50;
    }
    .secondary-btn:hover {
      background: #95a5a6;
      transform: scale(1.03);
    }
    #message {
      margin-top: 20px;
      font-weight: bold;
      color: #27ae60;
    }
    #message button {
      margin-top: 15px;
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      background: linear-gradient(to right, #2ecc71, #27ae60);
      color: #fff;
      font-size: 15px;
      cursor: pointer;
      transition: transform 0.2s, background 0.3s;
    }
    #message button:hover {
      background: linear-gradient(to right, #27ae60, #1e8449);
      transform: scale(1.05);
    }
  </style>
</head>
<body>
  <div class="register-box">
    <h2>회원가입</h2>
    <input type="text" id="id" placeholder="아이디">
    <input type="password" id="pw" placeholder="비밀번호">
    <input type="text" id="name" placeholder="표시 이름">
    <div class="btn-group">
      <button class="primary-btn" onclick="register()">회원가입 완료</button>
      <button class="secondary-btn" onclick="cancelRegister()">취소</button>
    </div>
    <div id="message"></div>
  </div>

  <script>
    function register() {
      var id = document.getElementById("id").value.trim();
      var pw = document.getElementById("pw").value.trim();
      var name = document.getElementById("name").value.trim();

      google.script.run.withSuccessHandler(function(result) {
        if (result.result === "success") {
          document.getElementById("message").style.color = "#27ae60";
          document.getElementById("message").innerHTML = 
            "✅ " + result.name + "님, 회원가입을 축하드립니다 🎉<br><br>" +
            "<button onclick='goLogin()'>확인</button>";
        } else if (result.result === "exists") {
          document.getElementById("message").style.color = "red";
          document.getElementById("message").innerHTML = "⚠️ 이미 존재하는 아이디입니다.";
        } else if (result.result === "missing") {
          document.getElementById("message").style.color = "red";
          document.getElementById("message").innerHTML = "⚠️ 모든 항목을 입력해야 합니다.";
        } else {
          document.getElementById("message").style.color = "red";
          document.getElementById("message").innerHTML = "❌ 회원가입 실패. 다시 시도하세요.";
        }
      }).registerUser(id, pw, name);
    }

    function goLogin() {
      window.location.href = "index.html"; // 로그인 화면으로 이동
    }

    function cancelRegister() {
      document.getElementById("id").value = "";
      document.getElementById("pw").value = "";
      document.getElementById("name").value = "";
      document.getElementById("message").innerHTML = "";
    }
  </script>
</body>
</html>
