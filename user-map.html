<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>사용자용 내 경로 보기</title>
  <style>
    #map {
      width: 100%;
      height: 500px;
      margin-top: 20px;
      border: 2px solid #ccc;
      border-radius: 8px;
    }
  </style>
  <!-- ✅ 구글 지도 API 키 교체 -->
  <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCOmWcR48yf1sp2RABZFQ52qnDCoWc8AJY"></script>
</head>
<body>
  <header>
    <h2>내 이동 경로</h2>
  </header>

  <div id="map"></div>

  <script>
    let map;

    function initMap() {
      // ✅ URL 파라미터에서 phone 값 읽기
      const phone = new URLSearchParams(location.search).get("phone");
      if (!phone) {
        alert("전화번호가 필요합니다. 예: user-map.html?phone=01012345678");
        return;
      }

      fetch("https://script.google.com/macros/s/AKfycbxp-bLvA6F3tyXyDcMH_5F8MQ9Zx1KvkDlABcl5nulf1dTSzZI07GR4n7S9MdZY19_1fQ/exec")
        .then(response => response.json())
        .then(data => {
          // ✅ 해당 사용자 데이터만 필터링
          const record = data.find(item => item.phone === phone);
          if (!record) {
            alert("해당 사용자의 데이터가 없습니다.");
            return;
          }

          // ✅ 기본 위치 (D, E열)
          const baseLat = parseFloat(record.lat);
          const baseLng = parseFloat(record.lng);

          // ✅ 누적 좌표 (path 배열)
          const pathCoords = [];
          if (record.path && record.path.length > 0) {
            record.path.forEach(p => {
              pathCoords.push({lat: parseFloat(p[0]), lng: parseFloat(p[1])});
            });
          }

          // ✅ 지도 초기화 (첫 위치 기준)
          map = new google.maps.Map(document.getElementById("map"), {
            center: {lat: baseLat, lng: baseLng},
            zoom: 13
          });

          // ✅ 경로 표시 (누적 좌표 + 현재 위치)
          if (pathCoords.length > 0) {
            new google.maps.Polyline({
              path: pathCoords,
              geodesic: true,
              strokeColor: "#2196F3",
              strokeOpacity: 1.0,
              strokeWeight: 3,
              map: map
            });
          }

          // ✅ 최신 위치 마커 표시
          new google.maps.Marker({
            position: {lat: baseLat, lng: baseLng},
            map: map,
            icon: "http://maps.google.com/mapfiles/ms/icons/blue-dot.png",
            title: "현재 위치 (" + record.time + ")"
          });
        })
        .catch(err => { alert("데이터 불러오기 실패: " + err.message); });
    }

    window.onload = initMap;
  </script>
</body>
</html>
