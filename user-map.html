<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>사용자용 내 경로 보기</title>
  <style>
    #map {
      width: 100%;
      height: 500px;
      margin-top: 20px;
      border: 2px solid #ccc;
      border-radius: 8px;
    }
  </style>
  <!-- ✅ 구글 지도 API 키 교체 -->
  <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCOmWcR48yf1sp2RABZFQ52qnDCoWc8AJY"></script>
</head>
<body>
  <header>
    <h2>내 이동 경로</h2>
  </header>

  <div id="map"></div>

  <script>
    let map;

    function initMap() {
      // ✅ URL 파라미터에서 phone 값 읽기
      const phone = new URLSearchParams(location.search).get("phone");
      if (!phone) {
        alert("전화번호가 필요합니다. 예: user-map.html?phone=01012345678");
        return;
      }

      fetch("https://script.google.com/macros/s/AKfycbz9iB9twX-qqwGYJ6HbVjTeVqEIMjVRByU_rc4XBQHZaqbzo2mBzTN5CTZsLwPZqtYdZQ/exec")
        .then(response => response.json())
        .then(data => {
          // ✅ 해당 사용자 데이터만 필터링
          const records = data.filter(item => item.phone === phone);
          if (records.length === 0) {
            alert("해당 사용자의 데이터가 없습니다.");
            return;
          }

          // 시간순 정렬
          records.sort((a, b) => new Date(a.time) - new Date(b.time));

          // 지도 초기화 (첫 위치 기준)
          map = new google.maps.Map(document.getElementById("map"), {
            center: {lat: parseFloat(records[0].lat), lng: parseFloat(records[0].lng)},
            zoom: 13
          });

          // ✅ 경로 표시
          const pathCoords = records.map(item => ({
            lat: parseFloat(item.lat),
            lng: parseFloat(item.lng)
          }));

          new google.maps.Polyline({
            path: pathCoords,
            geodesic: true,
            strokeColor: "#2196F3",
            strokeOpacity: 1.0,
            strokeWeight: 3,
            map: map
          });

          // ✅ 최신 위치 마커 표시
          const latest = records[records.length - 1];
          new google.maps.Marker({
            position: {lat: parseFloat(latest.lat), lng: parseFloat(latest.lng)},
            map: map,
            icon: "http://maps.google.com/mapfiles/ms/icons/blue-dot.png",
            title: "현재 위치 (" + latest.time + ")"
          });
        })
        .catch(err => { alert("데이터 불러오기 실패: " + err.message); });
    }

    window.onload = initMap;
  </script>
</body>
</html>
